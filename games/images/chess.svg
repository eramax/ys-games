<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e17"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="boardFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a3a1f"/>
      <stop offset="1" stop-color="#2c1810"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.4"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="url(#bg)"/>
  <circle cx="320" cy="180" r="240" fill="url(#glow)"/>

  <!-- Decorative diagonal grid lines (very subtle) -->
  <g stroke="rgba(59,130,246,0.06)" stroke-width="1">
    <line x1="0" y1="0" x2="640" y2="360"/>
    <line x1="640" y1="0" x2="0" y2="360"/>
  </g>

  <!-- Board frame (3D-ish) -->
  <g transform="translate(60,28)">
    <rect x="-8" y="-8" width="316" height="316" rx="8" fill="url(#boardFrame)"/>
    <rect x="0" y="0" width="300" height="300" rx="3" fill="#1a120b"/>

    <!-- 8x8 board -->
    <g>
      <!-- Light squares -->
      <g fill="#f0d9b5">
        <rect x="0"   y="0"   width="37.5" height="37.5"/>
        <rect x="75"  y="0"   width="37.5" height="37.5"/>
        <rect x="150" y="0"   width="37.5" height="37.5"/>
        <rect x="225" y="0"   width="37.5" height="37.5"/>
        <rect x="37.5"  y="37.5"  width="37.5" height="37.5"/>
        <rect x="112.5" y="37.5"  width="37.5" height="37.5"/>
        <rect x="187.5" y="37.5"  width="37.5" height="37.5"/>
        <rect x="262.5" y="37.5"  width="37.5" height="37.5"/>
        <rect x="0"   y="75"  width="37.5" height="37.5"/>
        <rect x="75"  y="75"  width="37.5" height="37.5"/>
        <rect x="150" y="75"  width="37.5" height="37.5"/>
        <rect x="225" y="75"  width="37.5" height="37.5"/>
        <rect x="37.5"  y="112.5" width="37.5" height="37.5"/>
        <rect x="112.5" y="112.5" width="37.5" height="37.5"/>
        <rect x="187.5" y="112.5" width="37.5" height="37.5"/>
        <rect x="262.5" y="112.5" width="37.5" height="37.5"/>
        <rect x="0"   y="150" width="37.5" height="37.5"/>
        <rect x="75"  y="150" width="37.5" height="37.5"/>
        <rect x="150" y="150" width="37.5" height="37.5"/>
        <rect x="225" y="150" width="37.5" height="37.5"/>
        <rect x="37.5"  y="187.5" width="37.5" height="37.5"/>
        <rect x="112.5" y="187.5" width="37.5" height="37.5"/>
        <rect x="187.5" y="187.5" width="37.5" height="37.5"/>
        <rect x="262.5" y="187.5" width="37.5" height="37.5"/>
        <rect x="0"   y="225" width="37.5" height="37.5"/>
        <rect x="75"  y="225" width="37.5" height="37.5"/>
        <rect x="150" y="225" width="37.5" height="37.5"/>
        <rect x="225" y="225" width="37.5" height="37.5"/>
        <rect x="37.5"  y="262.5" width="37.5" height="37.5"/>
        <rect x="112.5" y="262.5" width="37.5" height="37.5"/>
        <rect x="187.5" y="262.5" width="37.5" height="37.5"/>
        <rect x="262.5" y="262.5" width="37.5" height="37.5"/>
      </g>
      <!-- Dark squares -->
      <g fill="#b58863">
        <rect x="37.5"  y="0"    width="37.5" height="37.5"/>
        <rect x="112.5" y="0"    width="37.5" height="37.5"/>
        <rect x="187.5" y="0"    width="37.5" height="37.5"/>
        <rect x="262.5" y="0"    width="37.5" height="37.5"/>
        <rect x="0"     y="37.5" width="37.5" height="37.5"/>
        <rect x="75"    y="37.5" width="37.5" height="37.5"/>
        <rect x="150"   y="37.5" width="37.5" height="37.5"/>
        <rect x="225"   y="37.5" width="37.5" height="37.5"/>
        <rect x="37.5"  y="75"  width="37.5" height="37.5"/>
        <rect x="112.5" y="75"  width="37.5" height="37.5"/>
        <rect x="187.5" y="75"  width="37.5" height="37.5"/>
        <rect x="262.5" y="75"  width="37.5" height="37.5"/>
        <rect x="0"     y="112.5" width="37.5" height="37.5"/>
        <rect x="75"    y="112.5" width="37.5" height="37.5"/>
        <rect x="150"   y="112.5" width="37.5" height="37.5"/>
        <rect x="225"   y="112.5" width="37.5" height="37.5"/>
        <rect x="37.5"  y="150" width="37.5" height="37.5"/>
        <rect x="112.5" y="150" width="37.5" height="37.5"/>
        <rect x="187.5" y="150" width="37.5" height="37.5"/>
        <rect x="262.5" y="150" width="37.5" height="37.5"/>
        <rect x="0"     y="187.5" width="37.5" height="37.5"/>
        <rect x="75"    y="187.5" width="37.5" height="37.5"/>
        <rect x="150"   y="187.5" width="37.5" height="37.5"/>
        <rect x="225"   y="187.5" width="37.5" height="37.5"/>
        <rect x="37.5"  y="225" width="37.5" height="37.5"/>
        <rect x="112.5" y="225" width="37.5" height="37.5"/>
        <rect x="187.5" y="225" width="37.5" height="37.5"/>
        <rect x="262.5" y="225" width="37.5" height="37.5"/>
        <rect x="0"     y="262.5" width="37.5" height="37.5"/>
        <rect x="75"    y="262.5" width="37.5" height="37.5"/>
        <rect x="150"   y="262.5" width="37.5" height="37.5"/>
        <rect x="225"   y="262.5" width="37.5" height="37.5"/>
      </g>
    </g>

    <!-- Pieces: Black back rank (top) -->
    <g font-family="'Segoe UI Symbol','Arial Unicode MS',sans-serif" font-size="32" text-anchor="middle" fill="#1a1a1a" filter="url(#softShadow)">
      <text x="18.75"  y="32">♜</text>
      <text x="56.25"  y="32">♞</text>
      <text x="93.75"  y="32">♝</text>
      <text x="131.25" y="32">♛</text>
      <text x="168.75" y="32">♚</text>
      <text x="206.25" y="32">♝</text>
      <text x="243.75" y="32">♞</text>
      <text x="281.25" y="32">♜</text>
      <!-- Black pawns -->
      <text x="18.75"  y="70">♟</text>
      <text x="56.25"  y="70">♟</text>
      <text x="93.75"  y="70">♟</text>
      <text x="131.25" y="70">♟</text>
      <text x="168.75" y="70">♟</text>
      <text x="206.25" y="70">♟</text>
      <text x="243.75" y="70">♟</text>
      <text x="281.25" y="70">♟</text>
    </g>

    <!-- Pieces: White back rank (bottom) -->
    <g font-family="'Segoe UI Symbol','Arial Unicode MS',sans-serif" font-size="32" text-anchor="middle" fill="#ffffff" filter="url(#softShadow)" style="paint-order: stroke; stroke: rgba(0,0,0,0.4); stroke-width: 1.2px">
      <text x="18.75"  y="260">♟</text>
      <text x="56.25"  y="260">♟</text>
      <text x="93.75"  y="260">♟</text>
      <text x="131.25" y="260">♟</text>
      <text x="168.75" y="260">♟</text>
      <text x="206.25" y="260">♟</text>
      <text x="243.75" y="260">♟</text>
      <text x="281.25" y="260">♟</text>
      <text x="18.75"  y="295">♖</text>
      <text x="56.25"  y="295">♘</text>
      <text x="93.75"  y="295">♗</text>
      <text x="131.25" y="295">♕</text>
      <text x="168.75" y="295">♔</text>
      <text x="206.25" y="295">♗</text>
      <text x="243.75" y="295">♘</text>
      <text x="281.25" y="295">♖</text>
    </g>
  </g>

  <!-- Title text -->
  <g transform="translate(420,60)">
    <text x="0" y="0" font-family="Inter,Arial,sans-serif" font-size="42" font-weight="800" fill="#f3f4f6" letter-spacing="1">CHESS</text>
    <text x="0" y="34" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="2">TWO PLAYERS · SAME DEVICE</text>

    <!-- Decorative feature pills -->
    <g transform="translate(0,60)">
      <rect x="0" y="0" width="86" height="24" rx="12" fill="rgba(59,130,246,.15)" stroke="rgba(59,130,246,.4)"/>
      <text x="43" y="16" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#93c5fd" text-anchor="middle" letter-spacing="1">FULL RULES</text>
    </g>
    <g transform="translate(0,92)">
      <rect x="0" y="0" width="92" height="24" rx="12" fill="rgba(139,92,246,.15)" stroke="rgba(139,92,246,.4)"/>
      <text x="46" y="16" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#c4b5fd" text-anchor="middle" letter-spacing="1">CLICK MOVES</text>
    </g>
    <g transform="translate(0,124)">
      <rect x="0" y="0" width="76" height="24" rx="12" fill="rgba(251,191,36,.15)" stroke="rgba(251,191,36,.4)"/>
      <text x="38" y="16" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#fcd34d" text-anchor="middle" letter-spacing="1">TIMERS</text>
    </g>
    <g transform="translate(0,156)">
      <rect x="0" y="0" width="84" height="24" rx="12" fill="rgba(34,197,94,.15)" stroke="rgba(34,197,94,.4)"/>
      <text x="42" y="16" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#86efac" text-anchor="middle" letter-spacing="1">UN &amp; RESIGN</text>
    </g>
  </g>
</svg>
