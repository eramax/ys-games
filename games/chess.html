<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e17">
<title>شطرنج · لاعبين</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e17;
  --bg-2:#0f172a;
  --panel:rgba(17,24,39,.78);
  --border:rgba(255,255,255,.08);
  --border-strong:rgba(255,255,255,.18);
  --text:#f3f4f6;
  --text-muted:#9ca3af;
  --accent:#3b82f6;
  --accent-2:#8b5cf6;
  --light-sq:#f0d9b5;
  --dark-sq:#b58863;
  --selected:#cdd26b;
  --last-move:rgba(205,210,107,.5);
  --check:rgba(239,68,68,.78);
  --valid-move:rgba(0,0,0,.38);
  --valid-capture:rgba(0,0,0,.5);
  --win:#fbbf24;
  --font-ar:'Cairo','Tajawal',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font-ar);color:var(--text);background:var(--bg);-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
body{background-image:radial-gradient(circle at 12% 18%,rgba(59,130,246,.07) 0,transparent 45%),radial-gradient(circle at 88% 82%,rgba(139,92,246,.07) 0,transparent 45%);}
button{font-family:inherit}
.svg-sprite{position:absolute;width:0;height:0;overflow:hidden}

/* ===== App layout (flex column on mobile, 3-col grid on desktop) ===== */
#app{
  display:flex;flex-direction:column;
  height:100vh;height:100dvh;
  width:100%;
  max-width:1100px;
  margin:0 auto;
  gap:8px;
  padding:8px;
  overflow:hidden;
}

/* ===== Header ===== */
header{
  flex:0 0 auto;
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 10px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  gap:6px;
  flex-wrap:wrap;
}
.title{font-size:1.05rem;font-weight:800;letter-spacing:.5px;display:flex;align-items:center;gap:6px;min-width:0}
.title-main{background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.title-sub{color:var(--text-muted);font-size:.7rem;font-weight:500;display:none}
.header-actions{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.btn{
  background:rgba(59,130,246,.12);
  border:1px solid rgba(59,130,246,.35);
  color:#93c5fd;
  padding:5px 9px;
  border-radius:8px;
  font-weight:700;
  font-size:.72rem;
  cursor:pointer;
  transition:all .2s;
  display:inline-flex;align-items:center;gap:4px;
  white-space:nowrap;
}
.btn:hover{background:rgba(59,130,246,.25);transform:translateY(-1px)}
.btn:active{transform:translateY(0) scale(.97)}
.btn.danger{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.35);color:#fca5a5}
.btn.danger:hover{background:rgba(239,68,68,.25)}
.btn.ghost{background:rgba(255,255,255,.04);border-color:var(--border-strong);color:var(--text-muted)}
.btn.ghost:hover{background:rgba(255,255,255,.1);color:var(--text)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.sound-btn{
  background:rgba(255,255,255,.04);
  border:1px solid var(--border-strong);
  color:var(--text);
  padding:5px 8px;
  border-radius:8px;
  font-size:.9rem;
  cursor:pointer;
  transition:all .2s;
  line-height:1;
}
.sound-btn:hover{background:rgba(255,255,255,.1);transform:translateY(-1px)}
.sound-btn.muted{opacity:.45}

/* ===== Player bar (horizontal on mobile, vertical on desktop) ===== */
.player-bar{
  flex:0 0 auto;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  padding:6px 10px;
  display:flex;align-items:center;gap:10px;
  min-width:0;
}
.player-info{display:flex;align-items:center;gap:8px;min-width:0;flex:1;min-width:0}
.player-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,.25);box-shadow:0 0 0 1px rgba(0,0,0,.4) inset}
.player-name{flex:1;min-width:0}
.player-name input{
  width:100%;background:transparent;border:none;color:var(--text);
  font-weight:700;font-size:.85rem;outline:none;padding:2px 0;
  border-bottom:1px solid transparent;transition:border-color .2s;
  font-family:inherit;
}
.player-name input:focus{border-bottom-color:var(--accent)}
.player-name input::placeholder{color:var(--text-muted)}
.player-meta{font-size:.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-top:1px}
.timer{
  font-size:1.15rem;font-weight:800;font-variant-numeric:tabular-nums;
  letter-spacing:1px;color:var(--text);
  font-family:'Cairo','Courier New',monospace;
  line-height:1;
  flex-shrink:0;
}
.captured{
  display:flex;flex-wrap:wrap;gap:0;
  font-size:1.1rem;line-height:1;
  min-height:18px;align-items:center;
  max-width:35%;
  overflow:hidden;
}
.captured svg{width:18px;height:18px;flex-shrink:0;display:block}
.material{
  font-size:.7rem;font-weight:700;color:var(--text-muted);
  letter-spacing:.5px;flex-shrink:0;min-width:22px;text-align:left;
}
.material.up{color:#22c55e}
.material.down{color:#ef4444}

/* ===== Board ===== */
.board-container{
  flex:1 1 0;
  min-height:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  padding:2px 0;
}
.board-wrapper{
  display:flex;align-items:stretch;justify-content:center;gap:3px;
  max-width:100%;max-height:100%;
}
.coord-col{
  display:flex;flex-direction:column;justify-content:space-around;
  font-size:.65rem;color:var(--text-muted);font-weight:700;
  letter-spacing:0;font-family:inherit;
  width:16px;text-align:center;
  flex-shrink:0;
}
.coord-row{
  display:grid;grid-template-columns:repeat(8,1fr);justify-items:center;
  font-size:.65rem;color:var(--text-muted);font-weight:700;
  letter-spacing:0;margin-top:3px;
  font-family:inherit;
  direction:ltr;
  height:14px;
  flex-shrink:0;
}
.board-stack{display:flex;flex-direction:column;align-items:stretch;min-width:0;max-height:100%}
.board{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  width:min(100%,calc(100dvh - 230px),calc(100vw - 32px),640px);
  max-width:640px;
  max-height:calc(100dvh - 230px);
  aspect-ratio:1;
  border-radius:6px;
  overflow:hidden;
  box-shadow:0 10px 32px rgba(0,0,0,.55),0 0 0 4px #2c1810,0 0 0 5px #5a3a1f;
  background:#2c1810;
  direction:ltr;
  flex-shrink:1;
}
.square{
  display:flex;align-items:center;justify-content:center;
  position:relative;cursor:pointer;
  transition:background-color .12s;
  min-width:0;min-height:0;
}
.square.light{background:var(--light-sq)}
.square.dark{background:var(--dark-sq)}
.square.selected{background:var(--selected) !important}
.square.last-move::before{
  content:"";position:absolute;inset:0;
  background:var(--last-move);
  pointer-events:none;z-index:0;
}
.square.check::after{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle,transparent 22%,var(--check) 28%,var(--check) 36%,transparent 42%);
  animation:checkPulse 1.1s ease-in-out infinite;
  pointer-events:none;z-index:1;
}
@keyframes checkPulse{0%,100%{opacity:.85}50%{opacity:1}}
/* Legal-move dot: dark center with a white ring so it's visible on both light and dark squares */
.square.legal-target::after{
  content:"";position:absolute;
  top:50%;left:50%;
  width:30%;height:30%;
  border-radius:50%;
  background:rgba(20,20,30,.78);
  transform:translate(-50%,-50%);
  pointer-events:none;z-index:1;
  box-shadow:0 0 0 2px rgba(255,255,255,.55), 0 1px 3px rgba(0,0,0,.3);
}
/* Legal-capture ring: dark border with a white inner glow so it pops on both square colors */
.square.legal-capture::after{
  content:"";position:absolute;inset:5%;
  border-radius:50%;
  border:4px solid rgba(20,20,30,.82);
  box-shadow:0 0 0 1px rgba(255,255,255,.5), inset 0 0 0 1px rgba(255,255,255,.25);
  pointer-events:none;z-index:1;
  box-sizing:border-box;
}
.square:hover{filter:brightness(1.05)}

.piece{
  width:92%;height:92%;
  pointer-events:none;
  display:block;margin:auto;
  z-index:2;
  /* Light shadow + subtle white halo so white pieces stay bright on light squares */
  filter:drop-shadow(0 1px 1px rgba(0,0,0,.25)) drop-shadow(0 0 0.4px rgba(255,255,255,.5));
  transition:transform .15s;
}
.square:hover .piece{transform:scale(1.04)}

/* ===== Status bar ===== */
.status-bar{
  flex:0 0 auto;
  padding:6px 12px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  text-align:center;
  font-size:.82rem;font-weight:700;
  color:var(--text-muted);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;gap:6px;
  min-height:34px;
}
.status-bar .dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:statusPulse 1.6s ease-in-out infinite}
@keyframes statusPulse{0%,100%{opacity:.5;transform:scale(.9)}50%{opacity:1;transform:scale(1.1)}}
.status-bar.check{color:#f87171}
.status-bar.checkmate,.status-bar.stalemate,.status-bar.resigned{color:var(--win);font-size:.9rem}

/* ===== Move history (collapsible) ===== */
.history{
  flex:0 0 auto;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  overflow:hidden;
}
.history summary{
  list-style:none;
  cursor:pointer;
  padding:6px 12px;
  font-size:.75rem;font-weight:700;color:var(--text-muted);
  display:flex;justify-content:space-between;align-items:center;
  letter-spacing:.5px;
  user-select:none;
}
.history summary::-webkit-details-marker{display:none}
.history summary::after{content:"▾";transition:transform .2s;font-size:.75rem}
.history[open] summary::after{transform:rotate(180deg)}
.history .pill{font-size:.6rem;background:rgba(59,130,246,.15);color:#93c5fd;padding:2px 7px;border-radius:99px;font-weight:700;margin-right:6px}
.move-history{
  max-height:120px;overflow-y:auto;
  display:flex;flex-direction:column;gap:1px;
  padding:0 6px 6px;
  direction:ltr;
}
.move-history::-webkit-scrollbar{width:4px}
.move-history::-webkit-scrollbar-track{background:transparent}
.move-history::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
.mh-row{
  display:grid;grid-template-columns:22px 1fr 1fr;
  align-items:center;padding:1px 3px;border-radius:3px;
  font-family:'Cairo',monospace;font-size:.72rem;gap:3px;
}
.mh-num{color:var(--text-muted);font-size:.62rem}
.mh-move{padding:1px 4px;border-radius:3px;color:var(--text)}
.mh-move.current{background:rgba(59,130,246,.2);color:#93c5fd;font-weight:700}
.mh-move.empty{color:rgba(255,255,255,.12);font-style:italic}

/* ===== Modals ===== */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.78);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.modal-overlay.active{opacity:1;pointer-events:auto}
.modal{
  background:linear-gradient(160deg,#1e293b 0%,#0f172a 100%);
  border:1px solid var(--border-strong);
  border-radius:18px;
  padding:20px;max-width:92%;width:360px;
  text-align:center;
  transform:scale(.88) translateY(20px);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 30px 80px rgba(0,0,0,.6);
}
.modal-overlay.active .modal{transform:scale(1) translateY(0)}
.modal h2{
  font-size:1.4rem;margin-bottom:6px;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6,#ec4899);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  font-weight:800;letter-spacing:.5px;
}
.modal h2.win{background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.modal h2.draw{background:linear-gradient(135deg,#9ca3af,#d1d5db);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.modal-sub{color:var(--text-muted);font-size:.82rem;margin-bottom:10px}
.promotion-choices{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}
.promotion-choices button{
  aspect-ratio:1;font-size:0;background:rgba(255,255,255,.04);
  border:2px solid var(--border-strong);border-radius:10px;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;
}
.promotion-choices button:hover{background:rgba(59,130,246,.2);border-color:var(--accent);transform:translateY(-3px) scale(1.05);box-shadow:0 8px 20px rgba(59,130,246,.3)}
.promotion-choices svg{width:80%;height:80%;display:block}
.modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;text-align:right}
.modal-stat{background:rgba(255,255,255,.04);border:1px solid var(--border);padding:8px 10px;border-radius:10px}
.modal-stat.win{background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(245,158,11,.08));border-color:rgba(251,191,36,.4)}
.modal-stat-name{font-size:.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;display:flex;align-items:center;gap:6px;justify-content:flex-end}
.modal-stat-time{font-size:1.1rem;font-weight:800;font-family:monospace;margin-top:3px;letter-spacing:1px;direction:ltr;text-align:right}
.modal-stat-moves{font-size:.62rem;color:var(--text-muted);margin-top:1px;font-weight:600}
.btn-group{display:flex;gap:8px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.btn-primary{
  background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;
  border:none;padding:9px 18px;border-radius:10px;
  font-weight:700;cursor:pointer;
  box-shadow:0 4px 16px rgba(59,130,246,.35);
  transition:all .2s;font-size:.85rem;font-family:inherit;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(59,130,246,.5)}
.btn-primary:active{transform:translateY(0) scale(.97)}
.btn-secondary{
  background:rgba(255,255,255,.06);color:var(--text);
  border:1px solid var(--border-strong);
  padding:9px 14px;border-radius:10px;
  font-weight:600;cursor:pointer;transition:all .2s;font-size:.85rem;font-family:inherit;
}
.btn-secondary:hover{background:rgba(255,255,255,.12)}

.toast{
  position:fixed;top:18px;left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:rgba(15,23,42,.95);color:var(--text);
  border:1px solid var(--border-strong);
  padding:8px 14px;border-radius:10px;
  font-weight:600;font-size:.82rem;
  z-index:2000;opacity:0;pointer-events:none;
  transition:all .3s;backdrop-filter:blur(8px);
  box-shadow:0 8px 30px rgba(0,0,0,.4);
  display:flex;align-items:center;gap:6px;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media (min-width:720px){
  .title-sub{display:inline}
  #app{padding:12px;gap:10px}
  .btn{padding:7px 12px;font-size:.8rem}
  .timer{font-size:1.55rem}
  .captured{max-width:30%}
  .captured svg{width:22px;height:22px}
  .player-name input{font-size:1rem}
  .coord-col{font-size:.72rem;width:20px}
  .coord-row{font-size:.72rem;height:16px}
  .title{font-size:1.2rem}
  .header-actions{gap:6px}
  .player-bar{padding:8px 14px;gap:14px}
  .status-bar{font-size:.88rem}
}
@media (orientation:landscape) and (max-height:500px){
  .captured svg{width:16px;height:16px}
  .timer{font-size:1rem}
  .player-name input{font-size:.8rem}
  .board{width:min(100%,calc(100dvh - 160px),calc(100vw - 32px),640px);max-height:calc(100dvh - 160px)}
}

/* ===== DESKTOP: side-bar layout (board in center, player bars on left & right) ===== */
@media (min-width:960px){
  #app{
    display:grid;
    grid-template-columns:minmax(190px,230px) 1fr minmax(190px,230px);
    grid-template-rows:auto 1fr auto auto;
    grid-template-areas:
      "header header header"
      "top    board  bottom"
      "status status status"
      "history history history";
    gap:12px;
    padding:14px;
    max-width:1500px;
  }
  header{grid-area:header}
  #bar-top{grid-area:top}
  .board-container{grid-area:board}
  #bar-bottom{grid-area:bottom}
  .status-bar{grid-area:status}
  .history{grid-area:history}

  /* Vertical player cards */
  .player-bar{
    flex-direction:column;
    align-items:center;
    padding:18px 14px;
    gap:14px;
    overflow-y:auto;
    min-height:0;
  }
  .player-bar .player-info{
    flex-direction:column;
    align-items:center;
    gap:8px;
    width:100%;
  }
  .player-bar .player-name{
    text-align:center;
    width:100%;
  }
  .player-bar .player-name input{text-align:center;font-size:1rem}
  .player-bar .player-meta{text-align:center}
  .player-bar .player-dot{width:22px;height:22px}
  .player-bar .timer{font-size:1.85rem}
  .player-bar .captured{
    max-width:100%;
    justify-content:center;
    flex-wrap:wrap;
    gap:2px;
  }
  .player-bar .captured svg{width:24px;height:24px}
  .player-bar .material{
    text-align:center;
    min-width:0;
    font-size:.78rem;
  }
}
</style>
</head>

<!-- ===== SVG Sprite: 12 chess pieces (thicker stroke on white = clearer on light squares) ===== -->
<svg class="svg-sprite" aria-hidden="true">
  <defs>
    <!-- ===== WHITE PAWN ===== -->
    <symbol id="wp" viewBox="0 0 100 100">
      <circle cx="50" cy="28" r="13" fill="#ffffff" stroke="#000000" stroke-width="4.5"/>
      <ellipse cx="50" cy="44" rx="14" ry="4" fill="#ffffff" stroke="#000000" stroke-width="3.5"/>
      <path d="M34,50 Q30,62 36,70 L64,70 Q70,62 66,50 Q58,46 50,46 Q42,46 34,50 Z" fill="#ffffff" stroke="#000000" stroke-width="4.5" stroke-linejoin="round"/>
      <path d="M20,70 L80,70 L86,90 L14,90 Z" fill="#ffffff" stroke="#000000" stroke-width="4.5" stroke-linejoin="round"/>
    </symbol>
    <!-- ===== BLACK PAWN ===== -->
    <symbol id="bp" viewBox="0 0 100 100">
      <circle cx="50" cy="28" r="13" fill="#1a1a1a" stroke="#000000" stroke-width="4.5"/>
      <ellipse cx="50" cy="44" rx="14" ry="4" fill="#1a1a1a" stroke="#000000" stroke-width="3.5"/>
      <path d="M34,50 Q30,62 36,70 L64,70 Q70,62 66,50 Q58,46 50,46 Q42,46 34,50 Z" fill="#1a1a1a" stroke="#000000" stroke-width="4.5" stroke-linejoin="round"/>
      <path d="M20,70 L80,70 L86,90 L14,90 Z" fill="#1a1a1a" stroke="#000000" stroke-width="4.5" stroke-linejoin="round"/>
    </symbol>
    <!-- ===== WHITE ROOK ===== -->
    <symbol id="wr" viewBox="0 0 100 100">
      <path d="M12,8 L24,8 L24,22 L32,22 L32,8 L46,8 L46,22 L54,22 L54,8 L68,8 L68,22 L76,22 L76,8 L88,8 L88,32 L12,32 Z" fill="#ffffff" stroke="#000000" stroke-width="4.5" stroke-linejoin="round"/>
      <path d="M18,32 L82,32 L82,42 L18,42 Z" fill="#ffffff" stroke="#000000" stroke-width="4.5" stroke-linejoin="round"/>
      <path d="M22,42 L78,42 L82,72 L18,72 Z" fill="#ffffff" stroke="#000000" stroke-width="4.5" stroke-linejoin="round"/>
      <path d="M10,72 L90,72 L94,90 L6,90 Z" fill="#ffffff" stroke="#000000" stroke-width="4.5" stroke-linejoin="round"/>
    </symbol>
    <!-- ===== BLACK ROOK ===== -->
    <symbol id="br" viewBox="0 0 100 100">
      <path d="M12,8 L24,8 L24,22 L32,22 L32,8 L46,8 L46,22 L54,22 L54,8 L68,8 L68,22 L76,22 L76,8 L88,8 L88,32 L12,32 Z" fill="#1a1a1a" stroke="#000000" stroke-width="4.5" stroke-linejoin="round"/>

<script>
'use strict';

const $ = id => document.getElementById(id);

/* ============================================================
   AUDIO
============================================================ */
const audio = {
  ctx: null,
  enabled: true,
  ensure(){
    if(!this.ctx){
      try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e){ this.enabled = false; return; }
    }
    if(this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },
  beep(freq, dur, type, vol, slideTo){
    if(!this.enabled) return;
    this.ensure();
    if(!this.ctx) return;
    const ctx = this.ctx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    if(slideTo != null){
      osc.frequency.exponentialRampToValueAtTime(slideTo, ctx.currentTime + dur);
    }
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(vol, ctx.currentTime + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + dur + 0.02);
  },
  move()    { this.beep(520, 0.08, 'sine', 0.10); },
  capture() {
    this.beep(220, 0.10, 'triangle', 0.14, 120);
    setTimeout(() => this.beep(360, 0.08, 'triangle', 0.10), 50);
  },
  castle() {
    this.beep(300, 0.06, 'sine', 0.10);
    setTimeout(() => this.beep(420, 0.06, 'sine', 0.10), 50);
    setTimeout(() => this.beep(560, 0.08, 'sine', 0.10), 100);
  },
  promote() {
    this.beep(523, 0.10, 'sine', 0.12);
    setTimeout(() => this.beep(784, 0.16, 'sine', 0.14), 90);
  },
  check() {
    this.beep(700, 0.12, 'square', 0.08);
    setTimeout(() => this.beep(900, 0.10, 'square', 0.08), 90);
  },
  checkmate() {
    this.beep(523, 0.12, 'sine', 0.13);
    setTimeout(() => this.beep(659, 0.12, 'sine', 0.13), 110);
    setTimeout(() => this.beep(784, 0.14, 'sine', 0.14), 220);
    setTimeout(() => this.beep(1047, 0.30, 'sine', 0.16), 360);
  },
  gameStart() { this.beep(660, 0.08, 'sine', 0.10); setTimeout(() => this.beep(880, 0.10, 'sine', 0.10), 80); }
};

/* ============================================================
   CHESS ENGINE
============================================================ */
const PIECE_VALUE = { p:1, n:3, b:3, r:5, q:9, k:0 };

function initialBoard(){
  return [
    ['r','n','b','q','k','b','n','r'],
    ['p','p','p','p','p','p','p','p'],
    [null,null,null,null,null,null,null,null],
    [null,null,null,null,null,null,null,null],
    [null,null,null,null,null,null,null,null],
    [null,null,null,null,null,null,null,null],
    ['P','P','P','P','P','P','P','P'],
    ['R','N','B','Q','K','B','N','R']
  ];
}

class ChessGame {
  constructor(){ this.reset(); }
  reset(){
    this.board = initialBoard();
    this.turn = 'w';
    this.castling = { K:true, Q:true, k:true, q:true };
    this.enPassant = null;
    this.halfmoveClock = 0;
    this.fullmoveNumber = 1;
    this.history = [];
    this.status = 'playing';
    this.winner = null;
  }
  colorOf(p){ return p ? (p === p.toUpperCase() ? 'w' : 'b') : null; }
  typeOf(p){ return p ? p.toLowerCase() : null; }
  inBounds(r,c){ return r>=0 && r<8 && c>=0 && c<8; }

  snapshot(){
    return {
      board: this.board.map(row=>row.slice()),
      castling: { ...this.castling },
      enPassant: this.enPassant ? { ...this.enPassant } : null,
      turn: this.turn,
      halfmoveClock: this.halfmoveClock,
      fullmoveNumber: this.fullmoveNumber
    };
  }
  restore(s){
    this.board = s.board; this.castling = s.castling; this.enPassant = s.enPassant;
    this.turn = s.turn; this.halfmoveClock = s.halfmoveClock; this.fullmoveNumber = s.fullmoveNumber;
  }

  pseudoMoves(row, col){
    const piece = this.board[row][col];
    if(!piece) return [];
    const color = this.colorOf(piece);
    const type = this.typeOf(piece);
    const moves = [];
    const tryAdd = (nr, nc, opts={}) => {
      if(!this.inBounds(nr, nc)) return false;
      const t = this.board[nr][nc];
      if(t && this.colorOf(t) === color) return false;
      moves.push({ to:{row:nr, col:nc}, ...opts });
      return t === null;
    };
    switch(type){
      case 'p': {
        const dir = color === 'w' ? -1 : 1;
        const startRow = color === 'w' ? 6 : 1;
        const promoRow = color === 'w' ? 0 : 7;
        if(this.inBounds(row+dir, col) && !this.board[row+dir][col]){
          if(row+dir === promoRow) moves.push({ to:{row:row+dir,col}, promotion:true });
          else moves.push({ to:{row:row+dir,col} });
          if(row === startRow && !this.board[row+2*dir][col]){
            moves.push({ to:{row:row+2*dir,col}, double:true });
          }
        }
        for(const dc of [-1, 1]){
          const nr = row+dir, nc = col+dc;
          if(!this.inBounds(nr, nc)) continue;
          const t = this.board[nr][nc];
          if(t && this.colorOf(t) !== color){
            if(nr === promoRow) moves.push({ to:{row:nr,col:nc}, promotion:true, capture:true });
            else moves.push({ to:{row:nr,col:nc}, capture:true });
          }
          if(this.enPassant && this.enPassant.row === nr && this.enPassant.col === nc){
            moves.push({ to:{row:nr,col:nc}, enPassant:true, capture:true });
          }
        }
        break;
      }
      case 'n': {
        for(const [dr,dc] of [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]){
          tryAdd(row+dr, col+dc);
        }
        break;
      }
      case 'b': case('r'): case('q'): {
        const dirs = [];
        if(type === 'b' || type === 'q') dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
        if(type === 'r' || type === 'q') dirs.push([-1,0],[1,0],[0,-1],[0,1]);
        for(const [dr,dc] of dirs){
          for(let i=1; i<8; i++){
            if(!tryAdd(row+i*dr, col+i*dc)) break;
          }
        }
        break;
      }
      case 'k': {
        for(let dr=-1; dr<=1; dr++){
          for(let dc=-1; dc<=1; dc++){
            if(dr===0 && dc===0) continue;
            tryAdd(row+dr, col+dc);
          }
        }
        const enemy = color === 'w' ? 'b' : 'w';
        if(color === 'w'){
          if(this.castling.K && !this.board[7][5] && !this.board[7][6]
             && !this.isSquareAttacked(7,4,enemy) && !this.isSquareAttacked(7,5,enemy) && !this.isSquareAttacked(7,6,enemy)
             && this.board[7][4] === 'K' && this.board[7][7] === 'R'){
            moves.push({ to:{row:7,col:6}, castling:'K' });
          }
          if(this.castling.Q && !this.board[7][1] && !this.board[7][2] && !this.board[7][3]
             && !this.isSquareAttacked(7,4,enemy) && !this.isSquareAttacked(7,3,enemy) && !this.isSquareAttacked(7,2,enemy)
             && this.board[7][4] === 'K' && this.board[7][0] === 'R'){
            moves.push({ to:{row:7,col:2}, castling:'Q' });
          }
        } else {
          if(this.castling.k && !this.board[0][5] && !this.board[0][6]
             && !this.isSquareAttacked(0,4,enemy) && !this.isSquareAttacked(0,5,enemy) && !this.isSquareAttacked(0,6,enemy)
             && this.board[0][4] === 'k' && this.board[0][7] === 'r'){
            moves.push({ to:{row:0,col:6}, castling:'k' });
          }
          if(this.castling.q && !this.board[0][1] && !this.board[0][2] && !this.board[0][3]
             && !this.isSquareAttacked(0,4,enemy) && !this.isSquareAttacked(0,3,enemy) && !this.isSquareAttacked(0,2,enemy)
             && this.board[0][4] === 'k' && this.board[0][0] === 'r'){
            moves.push({ to:{row:0,col:2}, castling:'q' });
          }
        }
        break;
      }
    }
    return moves;
  }

  isSquareAttacked(row, col, byColor){
    for(let r=0;r<8;r++){
      for(let c=0;c<8;c++){
        const piece = this.board[r][c];
        if(!piece || this.colorOf(piece) !== byColor) continue;
        const type = this.typeOf(piece);
        if(type === 'p'){
          const dir = byColor === 'w' ? -1 : 1;
          if(r + dir === row && (c-1 === col || c+1 === col)) return true;
          continue;
        }
        if(type === 'n'){
          for(const [dr,dc] of [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]){
            if(r+dr === row && c+dc === col) return true;
          }
          continue;
        }
        if(type === 'k'){
          if(Math.abs(r-row) <= 1 && Math.abs(c-col) <= 1) return true;
          continue;
        }
        if(type === 'b' || type === 'r' || type === 'q'){
          const dirs = [];
          if(type !== 'r') dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
          if(type !== 'b') dirs.push([-1,0],[1,0],[0,-1],[0,1]);
          for(const [dr,dc] of dirs){
            for(let i=1; i<8; i++){
              const nr = r + i*dr, nc = c + i*dc;
              if(!this.inBounds(nr, nc)) break;
              if(nr === row && nc === col) return true;
              if(this.board[nr][nc]) break;
            }
          }
        }
      }
    }
    return false;
  }

  isInCheck(color){
    const king = color === 'w' ? 'K' : 'k';
    let kr=-1, kc=-1;
    for(let r=0;r<8;r++){
      for(let c=0;c<8;c++){
        if(this.board[r][c] === king){ kr=r; kc=c; }
      }
    }
    if(kr<0) return false;
    return this.isSquareAttacked(kr, kc, color === 'w' ? 'b' : 'w');
  }

  legalMoves(row, col){
    const piece = this.board[row][col];
    if(!piece) return [];
    const color = this.colorOf(piece);
    if(color !== this.turn) return [];
    const pseudo = this.pseudoMoves(row, col);
    const legal = [];
    for(const m of pseudo){
      const snap = this.snapshot();
      this.applyMoveRaw(row, col, m);
      const inCheck = this.isInCheck(color);
      this.restore(snap);
      if(!inCheck) legal.push(m);
    }
    return legal;
  }

  hasAnyLegalMove(){
    for(let r=0;r<8;r++){
      for(let c=0;c<8;c++){
        const piece = this.board[r][c];
        if(piece && this.colorOf(piece) === this.turn){
          if(this.legalMoves(r, c).length > 0) return true;
        }
      }
    }
    return false;
  }

  applyMoveRaw(fromRow, fromCol, move){
    const piece = this.board[fromRow][fromCol];
    const color = this.colorOf(piece);
    this.board[fromRow][fromCol] = null;
    if(move.enPassant){
      const capRow = color === 'w' ? move.to.row + 1 : move.to.row - 1;
      this.board[capRow][move.to.col] = null;
    }
    if(move.castling){
      const row = fromRow;
      if(move.castling === 'K' || move.castling === 'k'){
        this.board[row][5] = this.board[row][7];
        this.board[row][7] = null;
      } else {
        this.board[row][3] = this.board[row][0];
        this.board[row][0] = null;
      }
    }
    if(move.promotion){
      this.board[move.to.row][move.to.col] = color === 'w' ? 'Q' : 'q';
    } else {
      this.board[move.to.row][move.to.col] = piece;
    }
    if(piece === 'K'){ this.castling.K = false; this.castling.Q = false; }
    if(piece === 'k'){ this.castling.k = false; this.castling.q = false; }
    if(piece === 'R' && fromRow === 7 && fromCol === 0) this.castling.Q = false;
    if(piece === 'R' && fromRow === 7 && fromCol === 7) this.castling.K = false;
    if(piece === 'r' && fromRow === 0 && fromCol === 0) this.castling.q = false;
    if(piece === 'r' && fromRow === 0 && fromCol === 7) this.castling.k = false;
    if(move.to.row === 7 && move.to.col === 0) this.castling.Q = false;
    if(move.to.row === 7 && move.to.col === 7) this.castling.K = false;
    if(move.to.row === 0 && move.to.col === 0) this.castling.q = false;
    if(move.to.row === 0 && move.to.col === 7) this.castling.k = false;
    this.enPassant = move.double ? { row: (fromRow + move.to.row) / 2, col: fromCol } : null;
  }

  makeMove(fromRow, fromCol, move, promotionPiece){
    const piece = this.board[fromRow][fromCol];
    const color = this.colorOf(piece);
    let captured = this.board[move.to.row][move.to.col];
    if(move.enPassant){
      const capRow = color === 'w' ? move.to.row + 1 : move.to.row - 1;
      captured = this.board[capRow][move.to.col];
    }
    this.applyMoveRaw(fromRow, fromCol, move);
    if(move.promotion){
      const p = (promotionPiece || 'Q');
      this.board[move.to.row][move.to.col] = color === 'w' ? p.toUpperCase() : p.toLowerCase();
    }
    if(captured || this.typeOf(piece) === 'p') this.halfmoveClock = 0;
    else this.halfmoveClock++;
    if(this.turn === 'b') this.fullmoveNumber++;
    this.turn = color === 'w' ? 'b' : 'w';
    const afterStatus = (() => {
      if(!this.hasAnyLegalMove()){
        return this.isInCheck(this.turn) ? 'checkmate' : 'stalemate';
      }
      return this.isInCheck(this.turn) ? 'check' : 'playing';
    })();
    this.history.push({
      from: { row:fromRow, col:fromCol },
      to:   { row:move.to.row, col:move.to.col },
      piece, captured, color,
      castling: move.castling, enPassant: move.enPassant,
      promotion: move.promotion, double: move.double,
      promotionPiece: move.promotion ? this.board[move.to.row][move.to.col] : null,
      resultStatus: afterStatus
    });
    this.updateStatus();
    return true;
  }

  updateStatus(){
    if(!this.hasAnyLegalMove()){
      if(this.isInCheck(this.turn)){
        this.status = 'checkmate';
        this.winner = this.turn === 'w' ? 'b' : 'w';
      } else {
        this.status = 'stalemate';
        this.winner = 'draw';
      }
    } else if(this.isInCheck(this.turn)){
      this.status = 'check';
      this.winner = null;
    } else {
      this.status = 'playing';
      this.winner = null;
    }
  }

  undo(){
    const last = this.history.pop();
    if(!last) return false;
    this.board = initialBoard();
    this.turn = 'w';
    this.castling = { K:true, Q:true, k:true, q:true };
    this.enPassant = null;
    this.halfmoveClock = 0;
    this.fullmoveNumber = 1;
    this.status = 'playing';
    this.winner = null;
    const target = this.history.length;
    for(let i=0;i<target;i++){
      const h = this.history[i];
      this.applyMoveRaw(h.from.row, h.from.col, { to:h.to, castling:h.castling, enPassant:h.enPassant, promotion:h.promotion, double:h.double });
      if(h.promotion) this.board[h.to.row][h.to.col] = h.promotionPiece;
      if(h.captured || this.typeOf(h.piece) === 'p') this.halfmoveClock = 0;
      else this.halfmoveClock++;
      if(this.turn === 'b') this.fullmoveNumber++;
      this.turn = this.turn === 'w' ? 'b' : 'w';
    }
    return true;
  }
}

/* ============================================================
   UI
============================================================ */
const game = new ChessGame();
let selected = null;
let legalForSelected = [];
let pendingPromotion = null;
let flipped = false;
let gameEnded = false;
let resignedBy = null;

const playerNames = { w: 'الأبيض', b: 'الأسود' };
const inputColorMap = { top: 'b', bottom: 'w' };

function bindNameInput(position){
  const input = $(`name-${position}`);
  input.addEventListener('input', (e) => {
    const color = inputColorMap[position];
    const v = e.target.value.trim();
    playerNames[color] = v || (color === 'w' ? 'الأبيض' : 'الأسود');
    renderStatus();
    renderPlayerMeta();
  });
}
bindNameInput('top');
bindNameInput('bottom');

const timer = {
  w: { elapsed: 0, lastStart: 0, running: false },
  b: { elapsed: 0, lastStart: 0, running: false }
};
const captured = { w: [], b: [] };
const moveCount = { w: 0, b: 0 };

const boardEl = $('board');
const statusBar = $('status-bar');
const statusText = $('status-text');
const SVG_NS = 'http://www.w3.org/2000/svg';

function pieceToSymbolId(piece){
  const type = piece.toLowerCase();
  const color = piece === piece.toUpperCase() ? 'w' : 'b';
  return color + type;
}

function isLight(r,c){ return (r+c) % 2 === 1; }

function getDisplayColor(color){
  if(!flipped) return color === 'w' ? 'bottom' : 'top';
  return color === 'w' ? 'top' : 'bottom';
}
function getCardElements(color){
  const pos = getDisplayColor(color);
  return {
    bar: $(`bar-${pos}`),
    timer: $(`timer-${pos}`),
    dot: $(`dot-${pos}`),
    captured: $(`captured-${pos}`),
    meta: $(`meta-${pos}`),
    material: $(`material-${pos}`),
    nameInput: $(`name-${pos}`)
  };
}

function formatTime(ms){
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function renderBoard(){
  boardEl.innerHTML = '';
  for(let r=0; r<8; r++){
    for(let c=0; c<8; c++){
      const sq = document.createElement('div');
      sq.className = 'square ' + (isLight(r,c) ? 'light' : 'dark');
      sq.dataset.row = r;
      sq.dataset.col = c;
      const last = game.history[game.history.length - 1];
      if(last){
        if((last.from.row === r && last.from.col === c) ||
           (last.to.row === r && last.to.col === c)){
          sq.classList.add('last-move');
        }
      }
      if(selected && selected.row === r && selected.col === c) sq.classList.add('selected');
      const legal = legalForSelected.find(m => m.to.row === r && m.to.col === c);
      if(legal) sq.classList.add(legal.capture || legal.enPassant ? 'legal-capture' : 'legal-target');
      if(game.status === 'check' || game.status === 'checkmate'){
        const k = game.turn === 'w' ? 'K' : 'k';
        if(game.board[r][c] === k && game.isInCheck(game.turn)) sq.classList.add('check');
      }
      const piece = game.board[r][c];
      if(piece){
        const svg = document.createElementNS(SVG_NS, 'svg');
        svg.setAttribute('viewBox', '0 0 100 100');
        svg.classList.add('piece');
        const use = document.createElementNS(SVG_NS, 'use');
        use.setAttribute('href', '#' + pieceToSymbolId(piece));
        svg.appendChild(use);
        sq.appendChild(svg);
      }
      sq.addEventListener('click', () => onSquareClick(r, c));
      boardEl.appendChild(sq);
    }
  }
}

function renderCoordinates(){
  const colLeft = $('coord-col');
  const rowBottom = $('coord-row');
  colLeft.innerHTML = '';
  rowBottom.innerHTML = '';
  const ARABIC_DIGITS = ['١','٢','٣','٤','٥','٦','٧','٨'];
  const ranksDisplay = flipped ? [...ARABIC_DIGITS].reverse() : ARABIC_DIGITS.slice().reverse();
  const files = 'abcdefgh';
  for(const ch of ranksDisplay){
    const d = document.createElement('div');
    d.textContent = ch;
    colLeft.appendChild(d);
  }
  for(const ch of files){
    const d = document.createElement('div');
    d.textContent = ch;
    rowBottom.appendChild(d);
  }
}

function renderCaptured(){
  ['w','b'].forEach(color => {
    const el = getCardElements(color);
    const list = captured[color];
    el.captured.innerHTML = '';
    if(list.length === 0){
      el.captured.innerHTML = '<span style="color:rgba(255,255,255,.2);font-size:.65rem;font-style:italic">—</span>';
    } else {
      const order = { q:0, r:1, b:2, n:3, p:4 };
      const sorted = list.slice().sort((a,b) => (order[a]-order[b]));
      for(const p of sorted){
        const svg = document.createElementNS(SVG_NS, 'svg');
        svg.setAttribute('viewBox', '0 0 100 100');
        const use = document.createElementNS(SVG_NS, 'use');
        use.setAttribute('href', '#' + (color === 'w' ? 'b' : 'w') + p);
        svg.appendChild(use);
        el.captured.appendChild(svg);
      }
    }
    const myValue = list.reduce((sum, p) => sum + PIECE_VALUE[p], 0);
    const enemyValue = captured[color === 'w' ? 'b' : 'w'].reduce((sum, p) => sum + PIECE_VALUE[p], 0);
    const diff = myValue - enemyValue;
    el.material.classList.remove('up', 'down');
    if(diff > 0){ el.material.textContent = `+${diff}`; el.material.classList.add('up'); }
    else if(diff < 0){ el.material.textContent = `${diff}`; el.material.classList.add('down'); }
    else { el.material.textContent = '0'; }
  });
}

function renderTimers(){
  ['w','b'].forEach(color => {
    const el = getCardElements(color);
    const t = timer[color];
    const now = Date.now();
    let total = t.elapsed;
    if(t.running) total += now - t.lastStart;
    el.timer.textContent = formatTime(total);
  });
}

function renderPlayerMeta(){
  ['w','b'].forEach(color => {
    const el = getCardElements(color);
    const sideName = color === 'w' ? 'الأبيض' : 'الأسود';
    el.meta.textContent = `${sideName} · ${moveCount[color]} ${moveCount[color] === 1 ? 'نقلة' : 'نقلات'}`;
  });
}

function renderPlayerDots(){
  ['w','b'].forEach(color => {
    const el = getCardElements(color);
    el.dot.style.background = color === 'w' ? '#ffffff' : '#1a1a1a';
    el.dot.style.borderColor = color === 'w' ? 'rgba(0,0,0,.35)' : 'rgba(255,255,255,.25)';
  });
}

function getPlayerName(color){
  return playerNames[color] || (color === 'w' ? 'الأبيض' : 'الأسود');
}

function renderStatus(){
  statusBar.className = 'status-bar';
  if(gameEnded){
    if(game.winner === 'draw'){
      statusBar.classList.add('stalemate');
      statusText.textContent = '🤝 تعادل!';
    } else {
      statusBar.classList.add(game.status === 'resigned' ? 'resigned' : 'checkmate');
      const winName = getPlayerName(game.winner);
      statusText.textContent = `🏆 فاز ${winName}!`;
    }
  } else if(game.status === 'check'){
    statusBar.classList.add('check');
    statusText.textContent = `كش! على ${getPlayerName(game.turn)}`;
  } else {
    statusText.textContent = `دور ${getPlayerName(game.turn)}`;
  }
}

function renderMoveHistory(){
  const list = $('move-history');
  const pill = $('move-count-pill');
  pill.textContent = `${game.history.length} ${game.history.length === 1 ? 'نقلة' : 'نقلات'}`;
  if(game.history.length === 0){
    list.innerHTML = '<div style="color:var(--text-muted);font-size:.72rem;text-align:center;padding:8px 0;font-style:italic;direction:rtl">لا توجد نقلات بعد</div>';
    return;
  }
  let html = '';
  for(let i=0; i<game.history.length; i++){
    const num = Math.floor(i/2) + 1;
    const isWhite = i % 2 === 0;
    const h = game.history[i];
    const san = quickSAN(h);
    if(isWhite){
      html += `<div class="mh-row"><span class="mh-num">${num}.</span><span class="mh-move${i === game.history.length - 1 ? ' current' : ''}">${san}</span>`;
    } else {
      html += `<span class="mh-move${i === game.history.length - 1 ? ' current' : ''}">${san}</span></div>`;
    }
  }
  if(game.history.length % 2 === 1){
    html += '<span class="mh-move empty">…</span></div>';
  }
  list.innerHTML = html;
  list.scrollTop = list.scrollHeight;
}

function quickSAN(h){
  const FILES = 'abcdefgh', RANKS = '87654321';
  const suffix = h.resultStatus === 'checkmate' ? '#' : h.resultStatus === 'check' ? '+' : '';
  if(h.castling === 'K' || h.castling === 'k') return 'O-O' + suffix;
  if(h.castling === 'Q' || h.castling === 'q') return 'O-O-O' + suffix;
  const pieceChar = h.piece.toLowerCase() === 'p' ? '' : h.piece.toUpperCase();
  const cap = h.captured || h.enPassant ? 'x' : '';
  const toSq = FILES[h.to.col] + RANKS[h.to.row];
  let promo = '';
  if(h.promotion && h.promotionPiece) promo = '=' + h.promotionPiece.toUpperCase();
  return pieceChar + cap + toSq + promo + suffix;
}

function renderAll(){
  renderBoard();
  renderCoordinates();
  renderCaptured();
  renderPlayerMeta();
  renderPlayerDots();
  renderStatus();
  renderMoveHistory();
  renderTimers();
}

function tick(){
  renderTimers();
  requestAnimationFrame(tick);
}

function onSquareClick(r, c){
  if(gameEnded) return;
  const piece = game.board[r][c];
  if(selected){
    const move = legalForSelected.find(m => m.to.row === r && m.to.col === c);
    if(move){ attemptMove(selected.row, selected.col, move); return; }
    if(piece && game.colorOf(piece) === game.turn){
      selected = { row: r, col: c };
      legalForSelected = game.legalMoves(r, c);
      renderBoard();
      return;
    }
    selected = null; legalForSelected = []; renderBoard();
    return;
  }
  if(piece && game.colorOf(piece) === game.turn){
    selected = { row: r, col: c };
    legalForSelected = game.legalMoves(r, c);
    renderBoard();
  }
}

function attemptMove(fromRow, fromCol, move){
  if(move.promotion){
    pendingPromotion = { from: { row: fromRow, col: fromCol }, move };
    showPromotionModal(game.turn);
    return;
  }
  finalizeMove(fromRow, fromCol, move, null);
}

function finalizeMove(fromRow, fromCol, move, promotionPiece){
  let capturedPiece = game.board[move.to.row][move.to.col];
  if(move.enPassant){
    const capRow = game.turn === 'w' ? move.to.row + 1 : move.to.row - 1;
    capturedPiece = game.board[capRow][move.to.col];
  }

  if(move.castling)             audio.castle();
  else if(move.promotion)       audio.promote();
  else if(capturedPiece)        audio.capture();
  else                          audio.move();

  game.makeMove(fromRow, fromCol, move, promotionPiece);

  if(capturedPiece){
    const justMoved = game.turn === 'w' ? 'b' : 'w';
    captured[justMoved].push(game.typeOf(capturedPiece));
  }
  selected = null;
  legalForSelected = [];

  if(game.status === 'checkmate'){
    setTimeout(() => audio.checkmate(), 80);
  } else if(game.status === 'check'){
    setTimeout(() => audio.check(), 60);
  }

  if(game.status === 'checkmate' || game.status === 'stalemate') onGameOver();
  switchTimer();
  renderAll();
}

function switchTimer(){
  const justMoved = game.turn === 'w' ? 'b' : 'w';
  const t = timer[justMoved];
  if(t.running){ t.elapsed += Date.now() - t.lastStart; t.running = false; }
  moveCount[justMoved]++;
  const next = game.turn;
  timer[next].running = true;
  timer[next].lastStart = Date.now();
}

function onGameOver(){
  gameEnded = true;
  ['w','b'].forEach(color => {
    const t = timer[color];
    if(t.running){ t.elapsed += Date.now() - t.lastStart; t.running = false; }
  });
  showGameOverModal();
}

function showPromotionModal(color){
  const modal = $('promotion-modal');
  const choices = $('promotion-choices');
  choices.innerHTML = '';
  const pieces = ['q','r','b','n'];
  for(const p of pieces){
    const btn = document.createElement('button');
    const svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('viewBox', '0 0 100 100');
    const use = document.createElementNS(SVG_NS, 'use');
    use.setAttribute('href', '#' + color + p);
    svg.appendChild(use);
    btn.appendChild(svg);
    btn.addEventListener('click', () => {
      modal.classList.remove('active');
      if(pendingPromotion){
        finalizeMove(pendingPromotion.from.row, pendingPromotion.from.col, pendingPromotion.move, p.toUpperCase());
      }
      pendingPromotion = null;
    });
    choices.appendChild(btn);
  }
  modal.classList.add('active');
}

function showGameOverModal(){
  const modal = $('gameover-modal');
  const title = $('gameover-title');
  const sub = $('gameover-subtitle');
  title.classList.remove('win','draw');
  const wName = getPlayerName('w');
  const bName = getPlayerName('b');
  if(game.winner === 'draw'){
    title.textContent = '🤝 تعادل';
    title.classList.add('draw');
    sub.textContent = game.status === 'stalemate' ? 'لا توجد نقلات قانونية (تعادل).' : 'انتهت اللعبة بالتعادل.';
    $('modal-stat-w').classList.remove('win');
    $('modal-stat-b').classList.remove('win');
  } else {
    const winColor = game.winner;
    const winName = winColor === 'w' ? wName : bName;
    title.textContent = `🏆 فاز ${winName}`;
    title.classList.add('win');
    if(resignedBy){
      const loser = resignedBy === 'w' ? wName : bName;
      sub.textContent = `${loser} استسلم. ${winName} يفوز.`;
    } else {
      sub.textContent = `كش ملك! ${winName} يفوز بالمباراة.`;
    }
    $('modal-stat-w').classList.toggle('win', winColor === 'w');
    $('modal-stat-b').classList.toggle('win', winColor === 'b');
  }
  $('modal-name-w').textContent = wName;
  $('modal-name-b').textContent = bName;
  $('modal-time-w').textContent = formatTime(timer.w.elapsed);
  $('modal-time-b').textContent = formatTime(timer.b.elapsed);
  $('modal-moves-w').textContent = `${moveCount.w} ${moveCount.w === 1 ? 'نقلة' : 'نقلات'}`;
  $('modal-moves-b').textContent = `${moveCount.b} ${moveCount.b === 1 ? 'نقلة' : 'نقلات'}`;
  modal.classList.add('active');
}

function newGame(){
  game.reset();
  selected = null; legalForSelected = []; pendingPromotion = null;
  gameEnded = false; resignedBy = null;
  captured.w = []; captured.b = [];
  moveCount.w = 0; moveCount.b = 0;
  timer.w = { elapsed: 0, lastStart: Date.now(), running: true };
  timer.b = { elapsed: 0, lastStart: 0, running: false };
  $('promotion-modal').classList.remove('active');
  $('gameover-modal').classList.remove('active');
  $('btn-undo').disabled = false;
  renderAll();
  if(!window.__tickStarted){ tick(); window.__tickStarted = true; }
  audio.gameStart();
}

function resign(){
  if(gameEnded) return;
  const loser = game.turn;
  resignedBy = loser;
  game.winner = loser === 'w' ? 'b' : 'w';
  game.status = 'resigned';
  gameEnded = true;
  const t = timer[loser];
  if(t.running) t.running = false;
  onGameOver();
  renderAll();
  audio.checkmate();
}

function undo(){
  if(gameEnded) return;
  if(game.history.length === 0){ showToast('لا توجد نقلات للتراجع'); return; }
  const savedNames = { top: $('name-top').value, bottom: $('name-bottom').value };
  game.undo();
  captured.w = []; captured.b = [];
  moveCount.w = 0; moveCount.b = 0;
  for(const h of game.history){
    moveCount[h.color]++;
    if(h.captured) captured[h.color].push(game.typeOf(h.captured));
  }
  ['w','b'].forEach(color => { timer[color].running = false; timer[color].lastStart = 0; });
  timer[game.turn].running = true;
  timer[game.turn].lastStart = Date.now();
  $('name-top').value = savedNames.top;
  $('name-bottom').value = savedNames.bottom;
  selected = null; legalForSelected = [];
  renderAll();
  showToast('تم التراجع');
  audio.move();
}

function flip(){
  flipped = !flipped;
  const oldTop = inputColorMap.top;
  inputColorMap.top = inputColorMap.bottom;
  inputColorMap.bottom = oldTop;
  $('name-top').value = playerNames[inputColorMap.top];
  $('name-bottom').value = playerNames[inputColorMap.bottom];
  renderCoordinates();
  renderCaptured();
  renderPlayerMeta();
  renderPlayerDots();
  renderBoard();
}

function toggleSound(){
  audio.enabled = !audio.enabled;
  const btn = $('btn-sound');
  btn.textContent = audio.enabled ? '🔊' : '🔇';
  btn.classList.toggle('muted', !audio.enabled);
  btn.setAttribute('aria-label', audio.enabled ? 'إيقاف الصوت' : 'تشغيل الصوت');
  if(audio.enabled){
    audio.beep(880, 0.08, 'sine', 0.1);
  }
  try { localStorage.setItem('chess-sound', audio.enabled ? '1' : '0'); } catch(e){}
}

let toastTimer = null;
function showToast(msg){
  const t = $('toast');
  t.innerHTML = `<span>ℹ</span><span>${msg}</span>`;
  t.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

$('btn-new').addEventListener('click', newGame);
$('btn-new-2').addEventListener('click', newGame);
$('btn-resign').addEventListener('click', () => {
  if(gameEnded) return;
  const name = getPlayerName(game.turn);
  if(confirm(`هل يستسلم ${name}؟`)) resign();
});
$('btn-undo').addEventListener('click', undo);
$('btn-flip').addEventListener('click', flip);
$('btn-sound').addEventListener('click', toggleSound);
$('btn-close-gameover').addEventListener('click', () => {
  $('gameover-modal').classList.remove('active');
});

document.addEventListener('keydown', (e) => {
  const tag = e.target && e.target.tagName;
  if(tag === 'INPUT' || tag === 'TEXTAREA') return;
  if(e.key === 'Escape'){
    $('promotion-modal').classList.remove('active');
    $('gameover-modal').classList.remove('active');
  }
  if(e.key === 'n' || e.key === 'N') newGame();
  if(e.key === 'u' || e.key === 'U') undo();
  if(e.key === 'f' || e.key === 'F') flip();
  if(e.key === 'm' || e.key === 'M') toggleSound();
});

function init(){
  try {
    const saved = localStorage.getItem('chess-sound');
    if(saved === '0'){ audio.enabled = false; $('btn-sound').textContent = '🔇'; $('btn-sound').classList.add('muted'); $('btn-sound').setAttribute('aria-label','تشغيل الصوت'); }
  } catch(e){}
  $('name-top').value = playerNames[inputColorMap.top];
  $('name-bottom').value = playerNames[inputColorMap.bottom];
  newGame();
}
init();
</script>
</body>
</html>
