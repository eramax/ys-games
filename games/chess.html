<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chess · Two Players</title>
<style>
:root{
  --bg:#0a0e17;
  --bg-2:#0f172a;
  --panel:rgba(17,24,39,.78);
  --border:rgba(255,255,255,.08);
  --border-strong:rgba(255,255,255,.18);
  --text:#f3f4f6;
  --text-muted:#9ca3af;
  --accent:#3b82f6;
  --accent-2:#8b5cf6;
  --accent-glow:rgba(59,130,246,.45);
  --light-sq:#f0d9b5;
  --dark-sq:#b58863;
  --selected:rgba(255,235,100,.55);
  --last-move:rgba(255,235,100,.32);
  --check:rgba(239,68,68,.75);
  --check-glow:rgba(239,68,68,.55);
  --valid-move:rgba(20,85,30,.45);
  --valid-capture:rgba(220,40,40,.55);
  --win:#fbbf24;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--text);background:var(--bg);-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
body{background-image:radial-gradient(circle at 12% 18%,rgba(59,130,246,.07) 0,transparent 45%),radial-gradient(circle at 88% 82%,rgba(139,92,246,.07) 0,transparent 45%);}
button{font-family:inherit}
#app{display:grid;grid-template-rows:auto 1fr auto;height:100vh;width:100vw;padding:10px;gap:10px;min-height:0}
header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--panel);border:1px solid var(--border);border-radius:14px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);gap:10px;flex-wrap:wrap}
.title{font-size:1.35rem;font-weight:800;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.title-main{background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.title-sub{color:var(--text-muted);font-size:.85rem;font-weight:500}
.header-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.35);color:#93c5fd;padding:8px 12px;border-radius:8px;font-weight:600;font-size:.82rem;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{background:rgba(59,130,246,.25);transform:translateY(-1px)}
.btn:active{transform:translateY(0) scale(.97)}
.btn.danger{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.35);color:#fca5a5}
.btn.danger:hover{background:rgba(239,68,68,.25)}
.btn.ghost{background:rgba(255,255,255,.04);border-color:var(--border-strong);color:var(--text-muted)}
.btn.ghost:hover{background:rgba(255,255,255,.1);color:var(--text)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

main{display:grid;grid-template-columns:230px 1fr 240px;grid-template-rows:1fr 1fr;gap:10px;min-height:0}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:14px;display:flex;flex-direction:column;gap:10px;min-height:0;transition:border-color .25s,box-shadow .25s}
.card.active{border-color:rgba(59,130,246,.5);box-shadow:0 0 24px rgba(59,130,246,.18)}
.card-top{grid-row:1;grid-column:1}
.board-container{grid-row:1/3;grid-column:2;display:flex;align-items:center;justify-content:center;min-height:0;min-width:0}
.card-bottom{grid-row:2;grid-column:1}
.side-panel{grid-row:1/3;grid-column:3}

.player-head{display:flex;align-items:center;gap:10px;min-width:0}
.player-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,.25);box-shadow:0 0 0 1px rgba(0,0,0,.4) inset}
.player-name{flex:1;min-width:0}
.player-name input{width:100%;background:transparent;border:none;color:var(--text);font-weight:700;font-size:1rem;outline:none;padding:4px 0;border-bottom:1px solid transparent;transition:border-color .2s}
.player-name input:focus{border-bottom-color:var(--accent)}
.player-name input::placeholder{color:var(--text-muted)}
.player-meta{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-top:1px}
.player-meta .moves-count{color:#60a5fa;font-weight:700}

.timer{font-size:1.85rem;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1.5px;color:var(--text);font-family:'JetBrains Mono','Courier New',monospace;line-height:1;text-shadow:0 0 20px transparent;transition:color .2s,text-shadow .2s}
.card.active .timer{color:#60a5fa;text-shadow:0 0 24px rgba(96,165,250,.45)}

.captured-wrap{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:8px 10px;min-height:48px;display:flex;flex-direction:column;gap:4px}
.captured-label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.captured{display:flex;flex-wrap:wrap;gap:0;font-size:1.5rem;line-height:1;min-height:24px}
.captured span{display:inline-block;transform:translateY(-1px)}
.captured .pawn{opacity:.85}
.material{margin-top:auto;font-size:.78rem;font-weight:700;color:var(--text-muted);letter-spacing:.5px}
.material.up{color:#22c55e}
.material.down{color:#ef4444}

.board-wrapper{display:flex;align-items:stretch;justify-content:center;gap:6px}
.coord-col{display:flex;flex-direction:column;justify-content:space-around;font-size:.72rem;color:var(--text-muted);font-weight:700;letter-spacing:1px}
.coord-row{display:grid;grid-template-columns:repeat(8,1fr);justify-items:center;font-size:.72rem;color:var(--text-muted);font-weight:700;letter-spacing:1px;margin-top:4px}
.board-stack{display:flex;flex-direction:column;align-items:center;gap:0}

.board{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);width:min(72vh,min(56vw,560px));aspect-ratio:1;border-radius:10px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.55),0 0 0 6px #2c1810,0 0 0 7px #5a3a1f;background:#2c1810}
.square{display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;transition:background-color .12s}
.square.light{background:var(--light-sq)}
.square.dark{background:var(--dark-sq)}
.square.selected::before{content:"";position:absolute;inset:0;background:var(--selected);pointer-events:none}
.square.last-from,.square.last-to::before{content:"";position:absolute;inset:0;background:var(--last-move);pointer-events:none}
.square.check::after{content:"";position:absolute;inset:0;background:radial-gradient(circle,transparent 28%,var(--check) 32%,var(--check) 38%,transparent 42%);animation:checkPulse 1.1s ease-in-out infinite;pointer-events:none}
@keyframes checkPulse{0%,100%{opacity:.85}50%{opacity:1}}
.square.legal-target::after{content:"";position:absolute;top:50%;left:50%;width:30%;height:30%;border-radius:50%;background:rgba(0,0,0,.32);transform:translate(-50%,-50%);pointer-events:none;z-index:1}
.square.legal-capture::after{content:"";position:absolute;inset:5%;border-radius:50%;border:5px solid rgba(0,0,0,.4);pointer-events:none;z-index:1;box-sizing:border-box}
.square:hover{filter:brightness(1.05)}
.square:active{filter:brightness(.95)}
.piece{font-size:68%;line-height:1;cursor:pointer;z-index:2;text-align:center;transform:translateY(-1px);filter:drop-shadow(0 1px 1px rgba(0,0,0,.35))}
.piece.w{color:#fff;text-shadow:0 0 1.5px #000,0 1px 2px rgba(0,0,0,.45)}
.piece.b{color:#1a1a1a;text-shadow:0 1px 0 rgba(255,255,255,.15)}
.square:hover .piece{transform:translateY(-1px) scale(1.06)}
.square.last-from .piece,.square.last-to .piece{transform:translateY(-1px) scale(1.04)}

.side-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.side-head h3{font-size:.78rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.side-head .pill{font-size:.65rem;background:rgba(59,130,246,.15);color:#93c5fd;padding:2px 8px;border-radius:99px;font-weight:700}
.move-history{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:1px;padding-right:4px;min-height:0}
.move-history::-webkit-scrollbar{width:6px}
.move-history::-webkit-scrollbar-track{background:transparent}
.move-history::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
.move-history::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}
.mh-row{display:grid;grid-template-columns:30px 1fr 1fr;align-items:center;padding:3px 4px;border-radius:5px;font-family:'JetBrains Mono','Courier New',monospace;font-size:.82rem;gap:4px}
.mh-row:hover{background:rgba(255,255,255,.04)}
.mh-num{color:var(--text-muted);font-size:.7rem}
.mh-move{padding:2px 6px;border-radius:4px;color:var(--text);cursor:default;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mh-move.current{background:rgba(59,130,246,.2);color:#93c5fd;font-weight:700}
.mh-move.empty{color:rgba(255,255,255,.12);font-style:italic}

.status-bar{padding:11px 16px;background:var(--panel);border:1px solid var(--border);border-radius:14px;text-align:center;font-size:.92rem;font-weight:600;color:var(--text-muted);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;gap:10px;min-height:48px}
.status-bar .dot{width:8px;height:8px;border-radius:50%;background:currentColor;animation:statusPulse 1.6s ease-in-out infinite}
@keyframes statusPulse{0%,100%{opacity:.5;transform:scale(.9)}50%{opacity:1;transform:scale(1.1)}}
.status-bar.check{color:#f87171}
.status-bar.checkmate{color:var(--win);font-size:1rem}
.status-bar.stalemate{color:var(--win);font-size:1rem}
.status-bar.resigned{color:var(--win);font-size:1rem}
.status-bar .turn-name{color:#f3f4f6}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.active{opacity:1;pointer-events:auto}
.modal{background:linear-gradient(160deg,#1e293b 0%,#0f172a 100%);border:1px solid var(--border-strong);border-radius:18px;padding:24px;max-width:90%;width:400px;text-align:center;transform:scale(.88) translateY(20px);transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal-overlay.active .modal{transform:scale(1) translateY(0)}
.modal h2{font-size:1.6rem;margin-bottom:6px;background:linear-gradient(135deg,#3b82f6,#8b5cf6,#ec4899);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-weight:800;letter-spacing:.5px}
.modal h2.win{background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.modal h2.draw{background:linear-gradient(135deg,#9ca3af,#d1d5db);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.modal-sub{color:var(--text-muted);font-size:.9rem;margin-bottom:14px}
.promotion-choices{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}
.promotion-choices button{aspect-ratio:1;font-size:2.2rem;background:rgba(255,255,255,.04);border:2px solid var(--border-strong);border-radius:10px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;color:#fff}
.promotion-choices button:hover{background:rgba(59,130,246,.2);border-color:var(--accent);transform:translateY(-3px) scale(1.05);box-shadow:0 8px 20px rgba(59,130,246,.3)}
.modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0;text-align:left}
.modal-stat{background:rgba(255,255,255,.04);border:1px solid var(--border);padding:10px 12px;border-radius:10px}
.modal-stat.win{background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(245,158,11,.08));border-color:rgba(251,191,36,.4)}
.modal-stat-name{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;font-weight:700;display:flex;align-items:center;gap:6px}
.modal-stat-time{font-size:1.35rem;font-weight:800;font-family:'JetBrains Mono','Courier New',monospace;margin-top:4px;letter-spacing:1px}
.modal-stat-moves{font-size:.7rem;color:var(--text-muted);margin-top:2px;font-weight:600}
.btn-group{display:flex;gap:8px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(59,130,246,.35);transition:all .2s;font-size:.9rem}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(59,130,246,.5)}
.btn-primary:active{transform:translateY(0) scale(.97)}
.btn-secondary{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border-strong);padding:10px 16px;border-radius:10px;font-weight:600;cursor:pointer;transition:all .2s;font-size:.9rem}
.btn-secondary:hover{background:rgba(255,255,255,.12)}

.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(15,23,42,.95);color:var(--text);border:1px solid var(--border-strong);padding:10px 18px;border-radius:10px;font-weight:600;font-size:.88rem;z-index:2000;opacity:0;pointer-events:none;transition:all .3s;backdrop-filter:blur(8px);box-shadow:0 8px 30px rgba(0,0,0,.4);display:flex;align-items:center;gap:8px}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media (max-width:960px){
  #app{padding:8px;gap:8px}
  header{padding:8px 10px}
  .title{font-size:1.1rem}
  .title-sub{display:none}
  .btn{padding:7px 10px;font-size:.78rem}
  main{grid-template-columns:1fr;grid-template-rows:auto auto auto auto;overflow-y:auto}
  .card-top,.card-bottom{grid-column:1;grid-row:auto}
  .board-container{grid-column:1;grid-row:auto;padding:6px 0}
  .side-panel{grid-column:1;grid-row:auto;max-height:240px}
  .card-top,.card-bottom{flex-direction:row;flex-wrap:wrap;align-items:center;gap:12px}
  .card-top .player-head,.card-bottom .player-head{flex:0 0 auto}
  .card-top .timer,.card-bottom .timer{font-size:1.4rem;margin-left:auto}
  .card-top .captured-wrap,.card-bottom .captured-wrap{flex:1 1 100%;min-width:0;order:10}
  .board{width:min(94vw,min(72vw,480px))}
  .timer{font-size:1.55rem}
  .move-history{max-height:140px}
}
@media (max-width:480px){
  .btn span.lbl{display:none}
  .btn{padding:7px 9px}
  .modal-stat-time{font-size:1.1rem}
  .modal-stats{gap:6px}
  .modal{padding:18px;width:92%}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="title">
      <span style="font-size:1.5rem">♛</span>
      <span class="title-main">Chess</span>
      <span class="title-sub">— Two Players · Same Device</span>
    </div>
    <div class="header-actions">
      <button class="btn ghost" id="btn-undo" title="Take back the last move"><span>↩</span><span class="lbl">Undo</span></button>
      <button class="btn ghost" id="btn-flip" title="Flip the board"><span>⇅</span><span class="lbl">Flip</span></button>
      <button class="btn danger" id="btn-resign" title="Resign the current side"><span>🏳</span><span class="lbl">Resign</span></button>
      <button class="btn" id="btn-new" title="Start a new game"><span>↻</span><span class="lbl">New Game</span></button>
    </div>
  </header>

  <main>
    <div class="card card-top" id="card-top">
      <div class="player-head">
        <div class="player-dot" id="dot-top" style="background:#1a1a1a"></div>
        <div class="player-name">
          <input type="text" id="name-top" placeholder="Player Name">
          <div class="player-meta"><span id="meta-top">BLACK · 0 MOVES</span></div>
        </div>
      </div>
      <div class="timer" id="timer-top">00:00</div>
      <div class="captured-wrap">
        <div class="captured-label">Captured by <span id="cap-top-label">Black</span></div>
        <div class="captured" id="captured-top"></div>
      </div>
      <div class="material" id="material-top"></div>
    </div>

    <div class="board-container">
      <div class="board-wrapper">
        <div class="coord-col" id="coord-col-left"></div>
        <div class="board-stack">
          <div class="board" id="board"></div>
          <div class="coord-row" id="coord-row-bottom"></div>
        </div>
      </div>
    </div>

    <div class="card card-bottom" id="card-bottom">
      <div class="player-head">
        <div class="player-dot" id="dot-bottom" style="background:#fff"></div>
        <div class="player-name">
          <input type="text" id="name-bottom" placeholder="Player Name">
          <div class="player-meta"><span id="meta-bottom">WHITE · 0 MOVES</span></div>
        </div>
      </div>
      <div class="timer" id="timer-bottom">00:00</div>
      <div class="captured-wrap">
        <div class="captured-label">Captured by <span id="cap-bottom-label">White</span></div>
        <div class="captured" id="captured-bottom"></div>
      </div>
      <div class="material" id="material-bottom"></div>
    </div>

    <div class="card side-panel">
      <div class="side-head">
        <h3>Move History</h3>
        <span class="pill" id="move-count-pill">0 moves</span>
      </div>
      <div class="move-history" id="move-history">
        <div style="color:var(--text-muted);font-size:.82rem;text-align:center;padding:14px 0;font-style:italic">No moves yet</div>
      </div>
    </div>
  </main>

  <div class="status-bar" id="status-bar">
    <span class="dot"></span>
    <span id="status-text">White to move</span>
  </div>
</div>

<div class="modal-overlay" id="promotion-modal">
  <div class="modal">
    <h2>Promote Pawn</h2>
    <p class="modal-sub">Choose a piece to promote your pawn to:</p>
    <div class="promotion-choices" id="promotion-choices"></div>
  </div>
</div>

<div class="modal-overlay" id="gameover-modal">
  <div class="modal">
    <h2 id="gameover-title">Game Over</h2>
    <p class="modal-sub" id="gameover-subtitle"></p>
    <div class="modal-stats">
      <div class="modal-stat" id="modal-stat-w">
        <div class="modal-stat-name"><span class="player-dot" style="background:#fff;width:10px;height:10px"></span><span id="modal-name-w">White</span></div>
        <div class="modal-stat-time" id="modal-time-w">00:00</div>
        <div class="modal-stat-moves" id="modal-moves-w">0 moves</div>
      </div>
      <div class="modal-stat" id="modal-stat-b">
        <div class="modal-stat-name"><span class="player-dot" style="background:#1a1a1a;width:10px;height:10px"></span><span id="modal-name-b">Black</span></div>
        <div class="modal-stat-time" id="modal-time-b">00:00</div>
        <div class="modal-stat-moves" id="modal-moves-b">0 moves</div>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn-secondary" id="btn-close-gameover">Close</button>
      <button class="btn-primary" id="btn-new-2">Play Again</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

const $ = id => document.getElementById(id);

/* ============================================================
   CHESS ENGINE
   Board: 8x8 array; null = empty
   Pieces: 'KQRBNP' = white, 'kqrbnp' = black
============================================================ */

const FILES = 'abcdefgh';
const RANKS = '87654321';

const PIECE_GLYPH = {
  K:'♔', Q:'♕', R:'♖', B:'♗', N:'♘', P:'♙',
  k:'♚', q:'♛', r:'♜', b:'♝', n:'♞', p:'♟'
};
const PIECE_VALUE = { p:1, n:3, b:3, r:5, q:9, k:0 };
const PIECE_NAME = { k:'King', q:'Queen', r:'Rook', b:'Bishop', n:'Knight', p:'Pawn' };

function initialBoard(){
  return [
    ['r','n','b','q','k','b','n','r'],
    ['p','p','p','p','p','p','p','p'],
    [null,null,null,null,null,null,null,null],
    [null,null,null,null,null,null,null,null],
    [null,null,null,null,null,null,null,null],
    [null,null,null,null,null,null,null,null],
    ['P','P','P','P','P','P','P','P'],
    ['R','N','B','Q','K','B','N','R']
  ];
}

class ChessGame {
  constructor(){ this.reset(); }

  reset(){
    this.board = initialBoard();
    this.turn = 'w';
    this.castling = { K:true, Q:true, k:true, q:true }; // K=kingside white, Q=queenside white
    this.enPassant = null; // { row, col } of the square *behind* the just-moved double pawn
    this.halfmoveClock = 0;
    this.fullmoveNumber = 1;
    this.history = [];   // for undo + display
    this.status = 'playing';
    this.winner = null;  // 'w', 'b', 'draw'
  }

  colorOf(p){ return p ? (p === p.toUpperCase() ? 'w' : 'b') : null; }
  typeOf(p){ return p ? p.toLowerCase() : null; }
  inBounds(r,c){ return r>=0 && r<8 && c>=0 && c<8; }

  /* ----------- snapshot / restore for try-move ----------- */
  snapshot(){
    return {
      board: this.board.map(row=>row.slice()),
      castling: { ...this.castling },
      enPassant: this.enPassant ? { ...this.enPassant } : null,
      turn: this.turn,
      halfmoveClock: this.halfmoveClock,
      fullmoveNumber: this.fullmoveNumber
    };
  }
  restore(s){
    this.board = s.board;
    this.castling = s.castling;
    this.enPassant = s.enPassant;
    this.turn = s.turn;
    this.halfmoveClock = s.halfmoveClock;
    this.fullmoveNumber = s.fullmoveNumber;
  }

  /* ----------- pseudo-legal moves for a single piece ----------- */
  pseudoMoves(row, col){
    const piece = this.board[row][col];
    if(!piece) return [];
    const color = this.colorOf(piece);
    const type = this.typeOf(piece);
    const moves = [];

    const tryAdd = (nr, nc, opts={}) => {
      if(!this.inBounds(nr, nc)) return false;
      const t = this.board[nr][nc];
      if(t && this.colorOf(t) === color) return false;
      moves.push({ to:{row:nr, col:nc}, ...opts });
      return t === null; // keep sliding
    };

    switch(type){
      case 'p': {
        const dir = color === 'w' ? -1 : 1;
        const startRow = color === 'w' ? 6 : 1;
        const promoRow = color === 'w' ? 0 : 7;
        // forward
        if(this.inBounds(row+dir, col) && !this.board[row+dir][col]){
          if(row+dir === promoRow) moves.push({ to:{row:row+dir,col}, promotion:true });
          else moves.push({ to:{row:row+dir,col} });
          // double
          if(row === startRow && !this.board[row+2*dir][col]){
            moves.push({ to:{row:row+2*dir,col}, double:true });
          }
        }
        // captures / en passant
        for(const dc of [-1, 1]){
          const nr = row+dir, nc = col+dc;
          if(!this.inBounds(nr, nc)) continue;
          const t = this.board[nr][nc];
          if(t && this.colorOf(t) !== color){
            if(nr === promoRow) moves.push({ to:{row:nr,col:nc}, promotion:true, capture:true });
            else moves.push({ to:{row:nr,col:nc}, capture:true });
          }
          if(this.enPassant && this.enPassant.row === nr && this.enPassant.col === nc){
            moves.push({ to:{row:nr,col:nc}, enPassant:true, capture:true });
          }
        }
        break;
      }
      case 'n': {
        for(const [dr,dc] of [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]){
          tryAdd(row+dr, col+dc);
        }
        break;
      }
      case 'b': case('r'): case('q'): {
        const dirs = [];
        if(type === 'b' || type === 'q') dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
        if(type === 'r' || type === 'q') dirs.push([-1,0],[1,0],[0,-1],[0,1]);
        for(const [dr,dc] of dirs){
          for(let i=1; i<8; i++){
            if(!tryAdd(row+i*dr, col+i*dc)) break;
          }
        }
        break;
      }
      case 'k': {
        for(let dr=-1; dr<=1; dr++){
          for(let dc=-1; dc<=1; dc++){
            if(dr===0 && dc===0) continue;
            tryAdd(row+dr, col+dc);
          }
        }
        // Castling
        const enemy = color === 'w' ? 'b' : 'w';
        if(color === 'w'){
          if(this.castling.K && !this.board[7][5] && !this.board[7][6]
             && !this.isSquareAttacked(7,4,enemy) && !this.isSquareAttacked(7,5,enemy) && !this.isSquareAttacked(7,6,enemy)
             && this.board[7][4] === 'K' && this.board[7][7] === 'R'){
            moves.push({ to:{row:7,col:6}, castling:'K' });
          }
          if(this.castling.Q && !this.board[7][1] && !this.board[7][2] && !this.board[7][3]
             && !this.isSquareAttacked(7,4,enemy) && !this.isSquareAttacked(7,3,enemy) && !this.isSquareAttacked(7,2,enemy)
             && this.board[7][4] === 'K' && this.board[7][0] === 'R'){
            moves.push({ to:{row:7,col:2}, castling:'Q' });
          }
        } else {
          if(this.castling.k && !this.board[0][5] && !this.board[0][6]
             && !this.isSquareAttacked(0,4,enemy) && !this.isSquareAttacked(0,5,enemy) && !this.isSquareAttacked(0,6,enemy)
             && this.board[0][4] === 'k' && this.board[0][7] === 'r'){
            moves.push({ to:{row:0,col:6}, castling:'k' });
          }
          if(this.castling.q && !this.board[0][1] && !this.board[0][2] && !this.board[0][3]
             && !this.isSquareAttacked(0,4,enemy) && !this.isSquareAttacked(0,3,enemy) && !this.isSquareAttacked(0,2,enemy)
             && this.board[0][4] === 'k' && this.board[0][0] === 'r'){
            moves.push({ to:{row:0,col:2}, castling:'q' });
          }
        }
        break;
      }
    }
    return moves;
  }

  /* ----------- attack detection ----------- */
  isSquareAttacked(row, col, byColor){
    for(let r=0;r<8;r++){
      for(let c=0;c<8;c++){
        const piece = this.board[r][c];
        if(!piece || this.colorOf(piece) !== byColor) continue;
        const type = this.typeOf(piece);
        if(type === 'p'){
          const dir = byColor === 'w' ? -1 : 1;
          if(r + dir === row && (c-1 === col || c+1 === col)) return true;
          continue;
        }
        if(type === 'n'){
          for(const [dr,dc] of [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]){
            if(r+dr === row && c+dc === col) return true;
          }
          continue;
        }
        if(type === 'k'){
          if(Math.abs(r-row) <= 1 && Math.abs(c-col) <= 1) return true;
          continue;
        }
        if(type === 'b' || type === 'r' || type === 'q'){
          const dirs = [];
          if(type !== 'r') dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
          if(type !== 'b') dirs.push([-1,0],[1,0],[0,-1],[0,1]);
          for(const [dr,dc] of dirs){
            for(let i=1; i<8; i++){
              const nr = r + i*dr, nc = c + i*dc;
              if(!this.inBounds(nr, nc)) break;
              if(nr === row && nc === col) return true;
              if(this.board[nr][nc]) break;
            }
          }
        }
      }
    }
    return false;
  }

  isInCheck(color){
    const king = color === 'w' ? 'K' : 'k';
    let kr=-1, kc=-1;
    for(let r=0;r<8;r++){
      for(let c=0;c<8;c++){
        if(this.board[r][c] === king){ kr=r; kc=c; }
      }
    }
    if(kr<0) return false;
    return this.isSquareAttacked(kr, kc, color === 'w' ? 'b' : 'w');
  }

  /* ----------- legal moves (filter pinned / own-check) ----------- */
  legalMoves(row, col){
    const piece = this.board[row][col];
    if(!piece) return [];
    const color = this.colorOf(piece);
    if(color !== this.turn) return [];
    const pseudo = this.pseudoMoves(row, col);
    const legal = [];
    for(const m of pseudo){
      const snap = this.snapshot();
      this.applyMoveRaw(row, col, m);
      const inCheck = this.isInCheck(color);
      this.restore(snap);
      if(!inCheck) legal.push(m);
    }
    return legal;
  }

  hasAnyLegalMove(){
    for(let r=0;r<8;r++){
      for(let c=0;c<8;c++){
        const piece = this.board[r][c];
        if(piece && this.colorOf(piece) === this.turn){
          if(this.legalMoves(r, c).length > 0) return true;
        }
      }
    }
    return false;
  }

  /* ----------- apply a move permanently (no legality check) ----------- */
  applyMoveRaw(fromRow, fromCol, move){
    const piece = this.board[fromRow][fromCol];
    const color = this.colorOf(piece);
    this.board[fromRow][fromCol] = null;
    if(move.enPassant){
      const capRow = color === 'w' ? move.to.row + 1 : move.to.row - 1;
      this.board[capRow][move.to.col] = null;
    }
    if(move.castling){
      const row = fromRow;
      if(move.castling === 'K' || move.castling === 'k'){
        this.board[row][5] = this.board[row][7];
        this.board[row][7] = null;
      } else {
        this.board[row][3] = this.board[row][0];
        this.board[row][0] = null;
      }
    }
    if(move.promotion){
      // Default queen; will be overridden in makeMove if user picks different
      this.board[move.to.row][move.to.col] = color === 'w' ? 'Q' : 'q';
    } else {
      this.board[move.to.row][move.to.col] = piece;
    }
    // Castling rights
    if(piece === 'K'){ this.castling.K = false; this.castling.Q = false; }
    if(piece === 'k'){ this.castling.k = false; this.castling.q = false; }
    if(piece === 'R' && fromRow === 7 && fromCol === 0) this.castling.Q = false;
    if(piece === 'R' && fromRow === 7 && fromCol === 7) this.castling.K = false;
    if(piece === 'r' && fromRow === 0 && fromCol === 0) this.castling.q = false;
    if(piece === 'r' && fromRow === 0 && fromCol === 7) this.castling.k = false;
    if(move.to.row === 7 && move.to.col === 0) this.castling.Q = false;
    if(move.to.row === 7 && move.to.col === 7) this.castling.K = false;
    if(move.to.row === 0 && move.to.col === 0) this.castling.q = false;
    if(move.to.row === 0 && move.to.col === 7) this.castling.k = false;
    // En passant target
    this.enPassant = move.double ? { row: (fromRow + move.to.row) / 2, col: fromCol } : null;
  }

  /* ----------- play a real move ----------- */
  makeMove(fromRow, fromCol, move, promotionPiece){
    const piece = this.board[fromRow][fromCol];
    const color = this.colorOf(piece);
    // Determine captured piece
    let captured = this.board[move.to.row][move.to.col];
    if(move.enPassant){
      const capRow = color === 'w' ? move.to.row + 1 : move.to.row - 1;
      captured = this.board[capRow][move.to.col];
    }
    this.applyMoveRaw(fromRow, fromCol, move);
    // Apply user's promotion choice
    if(move.promotion){
      const p = (promotionPiece || 'Q');
      this.board[move.to.row][move.to.col] = color === 'w' ? p.toUpperCase() : p.toLowerCase();
    }
    // Clocks
    if(captured || this.typeOf(piece) === 'p') this.halfmoveClock = 0;
    else this.halfmoveClock++;
    if(this.turn === 'b') this.fullmoveNumber++;
    this.turn = color === 'w' ? 'b' : 'w';

    const san = this.makeSAN(fromRow, fromCol, move, piece, captured);
    this.history.push({
      from: { row:fromRow, col:fromCol },
      to:   { row:move.to.row, col:move.to.col },
      piece, captured, color,
      castling: move.castling,
      enPassant: move.enPassant,
      promotion: move.promotion,
      double: move.double,
      promotionPiece: move.promotion ? this.board[move.to.row][move.to.col] : null,
      san
    });
    this.updateStatus();
    return true;
  }

  updateStatus(){
    if(!this.hasAnyLegalMove()){
      if(this.isInCheck(this.turn)){
        this.status = 'checkmate';
        this.winner = this.turn === 'w' ? 'b' : 'w';
      } else {
        this.status = 'stalemate';
        this.winner = 'draw';
      }
    } else if(this.isInCheck(this.turn)){
      this.status = 'check';
      this.winner = null;
    } else {
      this.status = 'playing';
      this.winner = null;
    }
  }

  /* ----------- SAN (basic, no disambiguation) ----------- */
  makeSAN(fromRow, fromCol, move, piece, captured){
    if(move.castling === 'K' || move.castling === 'k') return 'O-O';
    if(move.castling === 'Q' || move.castling === 'q') return 'O-O-O';
    const type = this.typeOf(piece);
    const pieceChar = type === 'p' ? '' : type.toUpperCase();
    const cap = captured || move.enPassant ? 'x' : '';
    const toSq = FILES[move.to.col] + RANKS[move.to.row];
    let promo = '';
    if(move.promotion){
      const p = this.board[move.to.row][move.to.col];
      promo = '=' + this.typeOf(p).toUpperCase();
    }
    let checkSuffix = '';
    if(this.isInCheck(this.turn === 'w' ? 'b' : 'w')){
      checkSuffix = this.hasAnyLegalMove() ? '+' : '#';
    }
    return pieceChar + cap + toSq + promo + checkSuffix;
  }

  /* ----------- undo ----------- */
  undo(){
    const last = this.history.pop();
    if(!last) return false;
    // Reset and replay
    this.board = initialBoard();
    this.turn = 'w';
    this.castling = { K:true, Q:true, k:true, q:true };
    this.enPassant = null;
    this.halfmoveClock = 0;
    this.fullmoveNumber = 1;
    this.status = 'playing';
    this.winner = null;
    const target = this.history.length; // length before pop
    // Replay all remaining
    for(let i=0;i<target;i++){
      const h = this.history[i];
      this.applyMoveRaw(h.from.row, h.from.col, { to:h.to, castling:h.castling, enPassant:h.enPassant, promotion:h.promotion, double:h.double });
      if(h.promotion){
        const p = h.promotionPiece;
        this.board[h.to.row][h.to.col] = p;
      }
      if(h.captured || this.typeOf(h.piece) === 'p') this.halfmoveClock = 0;
      else this.halfmoveClock++;
      if(this.turn === 'b') this.fullmoveNumber++;
      this.turn = this.turn === 'w' ? 'b' : 'w';
    }
    return true;
  }
}

/* ============================================================
   UI / GAME STATE
============================================================ */

const game = new ChessGame();
let selected = null;        // { row, col } or null
let legalForSelected = [];  // array of move objects
let pendingPromotion = null; // { from, move }
let flipped = false;
let gameEnded = false;
let resignedBy = null;      // 'w' or 'b' or null

const playerNames = { w: 'Player 1 (White)', b: 'Player 2 (Black)' };
// Which color each name input is currently representing (flipped on board flip)
const inputColorMap = { top: 'b', bottom: 'w' };

function bindNameInput(position){
  const input = $(`name-${position}`);
  input.addEventListener('input', (e) => {
    const color = inputColorMap[position];
    const v = e.target.value.trim();
    playerNames[color] = v || (color === 'w' ? 'White' : 'Black');
    renderStatus();
    renderPlayerMeta();
    renderCaptured();
  });
}
bindNameInput('top');
bindNameInput('bottom');

const timer = {
  w: { elapsed: 0, lastStart: 0, running: false },
  b: { elapsed: 0, lastStart: 0, running: false }
};

const captured = { w: [], b: [] }; // pieces captured BY each color
const moveCount = { w: 0, b: 0 };

const boardEl = $('board');
const statusBar = $('status-bar');
const statusText = $('status-text');

/* ----------- helpers ----------- */
function sqName(r,c){ return FILES[c] + RANKS[r]; }
function isLight(r,c){ return (r+c) % 2 === 1; }

function getDisplayColor(color){
  // returns which DOM card represents that color (top or bottom)
  // Standard orientation: white at bottom (rows 6,7) → card-bottom = white
  // If flipped, swap
  if(!flipped){
    return color === 'w' ? 'bottom' : 'top';
  } else {
    return color === 'w' ? 'top' : 'bottom';
  }
}

function getCardElements(color){
  const pos = getDisplayColor(color);
  return {
    card: $(`card-${pos}`),
    timer: $(`timer-${pos}`),
    dot: $(`dot-${pos}`),
    captured: $(`captured-${pos}`),
    capLabel: $(`cap-${pos}-label`),
    material: $(`material-${pos}`),
    meta: $(`meta-${pos}`),
    nameInput: $(`name-${pos}`)
  };
}

function formatTime(ms){
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

/* ----------- rendering ----------- */
function renderBoard(){
  boardEl.innerHTML = '';
  for(let r=0; r<8; r++){
    for(let c=0; c<8; c++){
      const sq = document.createElement('div');
      sq.className = 'square ' + (isLight(r,c) ? 'light' : 'dark');
      sq.dataset.row = r;
      sq.dataset.col = c;
      // Last move highlight
      const last = game.history[game.history.length - 1];
      if(last){
        if(last.from.row === r && last.from.col === c) sq.classList.add('last-from');
        if(last.to.row === r && last.to.col === c) sq.classList.add('last-to');
      }
      // Selected
      if(selected && selected.row === r && selected.col === c) sq.classList.add('selected');
      // Legal targets
      const legal = legalForSelected.find(m => m.to.row === r && m.to.col === c);
      if(legal){
        sq.classList.add(legal.capture || legal.enPassant ? 'legal-capture' : 'legal-target');
      }
      // Check
      if(game.status === 'check' || game.status === 'checkmate'){
        const k = game.turn === 'w' ? 'K' : 'k';
        if(game.board[r][c] === k && game.isInCheck(game.turn)){
          sq.classList.add('check');
        }
      }
      // Piece
      const piece = game.board[r][c];
      if(piece){
        const sp = document.createElement('span');
        sp.className = 'piece ' + (piece === piece.toUpperCase() ? 'w' : 'b');
        sp.textContent = PIECE_GLYPH[piece];
        sq.appendChild(sp);
      }
      sq.addEventListener('click', () => onSquareClick(r, c));
      boardEl.appendChild(sq);
    }
  }
}

function renderCoordinates(){
  const colLeft = $('coord-col-left');
  const rowBottom = $('coord-row-bottom');
  colLeft.innerHTML = '';
  rowBottom.innerHTML = '';
  // For ranks: standard orientation is 8 (black back rank) at top, 1 at bottom
  // If flipped, reverse
  const ranksDisplay = flipped ? '12345678' : '87654321';
  const filesDisplay = flipped ? 'hgfedcba' : 'abcdefgh';
  for(const ch of ranksDisplay){
    const d = document.createElement('div');
    d.textContent = ch;
    colLeft.appendChild(d);
  }
  for(const ch of filesDisplay){
    const d = document.createElement('div');
    d.textContent = ch;
    rowBottom.appendChild(d);
  }
}

function renderCaptured(){
  ['w','b'].forEach(color => {
    const el = getCardElements(color);
    const list = captured[color];
    el.captured.innerHTML = '';
    if(list.length === 0){
      el.captured.innerHTML = '<span style="color:rgba(255,255,255,.15);font-size:.78rem;font-style:italic">—</span>';
    } else {
      // sort by piece value descending
      const order = { q:0, r:1, b:2, n:3, p:4 };
      const sorted = list.slice().sort((a,b) => (order[a]-order[b]));
      for(const p of sorted){
        const s = document.createElement('span');
        s.textContent = PIECE_GLYPH[color === 'w' ? p.toUpperCase() : p];
        s.className = PIECE_NAME[p] === 'Pawn' ? 'pawn' : '';
        el.captured.appendChild(s);
      }
    }
    // Material
    const myValue = list.reduce((sum, p) => sum + PIECE_VALUE[p], 0);
    const enemyValue = captured[color === 'w' ? 'b' : 'w'].reduce((sum, p) => sum + PIECE_VALUE[p], 0);
    const diff = myValue - enemyValue;
    el.material.classList.remove('up', 'down');
    if(diff > 0){
      el.material.textContent = `+${diff} material`;
      el.material.classList.add('up');
    } else if(diff < 0){
      el.material.textContent = `${diff} material`;
      el.material.classList.add('down');
    } else {
      el.material.textContent = 'Even material';
    }
  });
}

function renderTimers(){
  ['w','b'].forEach(color => {
    const el = getCardElements(color);
    const t = timer[color];
    const now = Date.now();
    let total = t.elapsed;
    if(t.running) total += now - t.lastStart;
    el.timer.textContent = formatTime(total);
  });
}

function renderPlayerMeta(){
  ['w','b'].forEach(color => {
    const el = getCardElements(color);
    const sideName = color === 'w' ? 'WHITE' : 'BLACK';
    el.meta.innerHTML = `${sideName} · <span class="moves-count">${moveCount[color]} MOVES</span>`;
    el.capLabel.textContent = playerNames[color];
  });
}

function renderCardsActive(){
  ['w','b'].forEach(color => {
    const el = getCardElements(color);
    el.card.classList.toggle('active', !gameEnded && game.turn === color);
  });
}

function renderStatus(){
  statusBar.className = 'status-bar';
  if(gameEnded){
    if(game.winner === 'draw'){
      statusBar.classList.add('stalemate');
      const reason = game.status === 'stalemate' ? 'Stalemate' : 'Draw';
      statusText.textContent = `🤝 ${reason}!`;
    } else {
      statusBar.classList.add(game.status === 'resigned' ? 'resigned' : 'checkmate');
      const winName = getPlayerName(game.winner);
      const loseName = getPlayerName(game.winner === 'w' ? 'b' : 'w');
      const verb = resignedBy ? 'resigned' : (game.status === 'checkmate' ? 'wins by checkmate' : 'wins');
      statusText.textContent = `🏆 ${winName} ${verb}! ${loseName} loses.`;
    }
  } else if(game.status === 'check'){
    statusBar.classList.add('check');
    const name = getPlayerName(game.turn);
    statusText.textContent = `${name} is in check!`;
  } else {
    const name = getPlayerName(game.turn);
    statusText.textContent = `${name} to move`;
  }
}

function getPlayerName(color){
  return playerNames[color] || (color === 'w' ? 'White' : 'Black');
}

function renderMoveHistory(){
  const list = $('move-history');
  const pill = $('move-count-pill');
  pill.textContent = `${game.history.length} move${game.history.length === 1 ? '' : 's'}`;
  if(game.history.length === 0){
    list.innerHTML = '<div style="color:var(--text-muted);font-size:.82rem;text-align:center;padding:14px 0;font-style:italic">No moves yet</div>';
    return;
  }
  let html = '';
  for(let i=0; i<game.history.length; i++){
    const num = Math.floor(i/2) + 1;
    const isWhite = i % 2 === 0;
    if(isWhite){
      html += `<div class="mh-row"><span class="mh-num">${num}.</span>`;
      html += `<span class="mh-move${i === game.history.length - 1 ? ' current' : ''}">${game.history[i].san}</span>`;
    } else {
      html += `<span class="mh-move${i === game.history.length - 1 ? ' current' : ''}">${game.history[i].san}</span></div>`;
    }
  }
  // If odd number of moves, close the row
  if(game.history.length % 2 === 1){
    html += '<span class="mh-move empty">…</span></div>';
  }
  list.innerHTML = html;
  // Scroll to bottom
  list.scrollTop = list.scrollHeight;
}

function renderAll(){
  renderBoard();
  renderCoordinates();
  renderCaptured();
  renderPlayerMeta();
  renderPlayerDots();
  renderCardsActive();
  renderStatus();
  renderMoveHistory();
  renderTimers();
}

function renderPlayerDots(){
  ['w','b'].forEach(color => {
    const el = getCardElements(color);
    el.dot.style.background = color === 'w' ? '#ffffff' : '#1a1a1a';
    el.dot.style.borderColor = color === 'w' ? 'rgba(0,0,0,.35)' : 'rgba(255,255,255,.25)';
  });
}

function tick(){
  renderTimers();
  requestAnimationFrame(tick);
}

/* ----------- game flow ----------- */
function onSquareClick(r, c){
  if(gameEnded) return;
  const piece = game.board[r][c];

  // If a piece is selected
  if(selected){
    // If clicked on a legal destination, play the move
    const move = legalForSelected.find(m => m.to.row === r && m.to.col === c);
    if(move){
      attemptMove(selected.row, selected.col, move);
      return;
    }
    // If clicked on another own piece, switch selection
    if(piece && game.colorOf(piece) === game.turn){
      selected = { row: r, col: c };
      legalForSelected = game.legalMoves(r, c);
      renderBoard();
      return;
    }
    // Otherwise clear
    selected = null;
    legalForSelected = [];
    renderBoard();
    return;
  }

  // No selection yet — select own piece
  if(piece && game.colorOf(piece) === game.turn){
    selected = { row: r, col: c };
    legalForSelected = game.legalMoves(r, c);
    renderBoard();
  }
}

function attemptMove(fromRow, fromCol, move){
  if(move.promotion){
    pendingPromotion = { from: { row: fromRow, col: fromCol }, move };
    showPromotionModal(game.turn);
    return;
  }
  finalizeMove(fromRow, fromCol, move, null);
}

function finalizeMove(fromRow, fromCol, move, promotionPiece){
  const piece = game.board[fromRow][fromCol];
  // Determine captured for UI bookkeeping before applying
  let capturedPiece = game.board[move.to.row][move.to.col];
  if(move.enPassant){
    const capRow = game.turn === 'w' ? move.to.row + 1 : move.to.row - 1;
    capturedPiece = game.board[capRow][move.to.col];
  }

  game.makeMove(fromRow, fromCol, move, promotionPiece);

  // Bookkeeping: after makeMove, game.turn has switched. The player who just moved
  // (and therefore made the capture) is the OPPOSITE of game.turn.
  if(capturedPiece){
    const justMoved = game.turn === 'w' ? 'b' : 'w';
    captured[justMoved].push(game.typeOf(capturedPiece));
  }

  selected = null;
  legalForSelected = [];

  if(game.status === 'checkmate' || game.status === 'stalemate'){
    onGameOver();
  }
  // Switch timer
  switchTimer();

  renderAll();
  renderTimers();
}

function switchTimer(){
  // The previous player is the one who just moved.
  // After makeMove, game.turn is the next player.
  const justMoved = game.turn === 'w' ? 'b' : 'w';
  // Stop the just-moved timer, add elapsed, mark not running
  const t = timer[justMoved];
  if(t.running){
    t.elapsed += Date.now() - t.lastStart;
    t.running = false;
  }
  // Increment move count
  moveCount[justMoved]++;
  // Start the new player's timer
  const next = game.turn;
  timer[next].running = true;
  timer[next].lastStart = Date.now();
}

function onGameOver(){
  gameEnded = true;
  // Stop both timers
  ['w','b'].forEach(color => {
    const t = timer[color];
    if(t.running){
      t.elapsed += Date.now() - t.lastStart;
      t.running = false;
    }
  });
  showGameOverModal();
}

/* ----------- promotion modal ----------- */
function showPromotionModal(color){
  const modal = $('promotion-modal');
  const choices = $('promotion-choices');
  choices.innerHTML = '';
  const pieces = ['Q','R','B','N'];
  for(const p of pieces){
    const btn = document.createElement('button');
    btn.textContent = color === 'w' ? PIECE_GLYPH[p] : PIECE_GLYPH[p.toLowerCase()];
    btn.title = PIECE_NAME[p.toLowerCase()];
    btn.addEventListener('click', () => {
      modal.classList.remove('active');
      if(pendingPromotion){
        finalizeMove(pendingPromotion.from.row, pendingPromotion.from.col, pendingPromotion.move, p);
      }
      pendingPromotion = null;
    });
    choices.appendChild(btn);
  }
  modal.classList.add('active');
}

/* ----------- game over modal ----------- */
function showGameOverModal(){
  const modal = $('gameover-modal');
  const title = $('gameover-title');
  const sub = $('gameover-subtitle');
  title.classList.remove('win','draw');
  const wName = getPlayerName('w');
  const bName = getPlayerName('b');

  if(game.winner === 'draw'){
    title.textContent = '🤝 Draw';
    title.classList.add('draw');
    sub.textContent = game.status === 'stalemate' ? 'Stalemate — no legal moves but no check.' : 'Game drawn.';
    $('modal-stat-w').classList.remove('win');
    $('modal-stat-b').classList.remove('win');
  } else {
    const winColor = game.winner;
    const winName = winColor === 'w' ? wName : bName;
    title.textContent = `🏆 ${winName} Wins!`;
    title.classList.add('win');
    if(resignedBy){
      const loser = resignedBy === 'w' ? wName : bName;
      sub.textContent = `${loser} resigned. ${winName} wins.`;
    } else {
      sub.textContent = `Checkmate! ${winName} wins the game.`;
    }
    $('modal-stat-w').classList.toggle('win', winColor === 'w');
    $('modal-stat-b').classList.toggle('win', winColor === 'b');
  }

  $('modal-name-w').textContent = wName;
  $('modal-name-b').textContent = bName;
  $('modal-time-w').textContent = formatTime(timer.w.elapsed);
  $('modal-time-b').textContent = formatTime(timer.b.elapsed);
  $('modal-moves-w').textContent = `${moveCount.w} move${moveCount.w === 1 ? '' : 's'}`;
  $('modal-moves-b').textContent = `${moveCount.b} move${moveCount.b === 1 ? '' : 's'}`;

  modal.classList.add('active');
}

/* ----------- new game ----------- */
function newGame(){
  game.reset();
  selected = null;
  legalForSelected = [];
  pendingPromotion = null;
  gameEnded = false;
  resignedBy = null;
  captured.w = [];
  captured.b = [];
  moveCount.w = 0;
  moveCount.b = 0;
  timer.w = { elapsed: 0, lastStart: Date.now(), running: true };
  timer.b = { elapsed: 0, lastStart: 0, running: false };
  $('promotion-modal').classList.remove('active');
  $('gameover-modal').classList.remove('active');
  $('btn-undo').disabled = false;
  renderAll();
  // Restart ticking
  if(!window.__tickStarted){ tick(); window.__tickStarted = true; }
}

/* ----------- resign ----------- */
function resign(){
  if(gameEnded) return;
  const loser = game.turn;
  resignedBy = loser;
  game.winner = loser === 'w' ? 'b' : 'w';
  game.status = 'resigned';
  gameEnded = true;
  // Stop the loser's running timer (don't add the unspent time)
  const t = timer[loser];
  if(t.running){
    t.running = false;
  }
  onGameOver();
  renderAll();
}

/* ----------- undo ----------- */
function undo(){
  if(gameEnded) return;
  if(game.history.length === 0) {
    showToast('No moves to undo');
    return;
  }
  // Capture info from the last move before undoing
  const last = game.history[game.history.length - 1];
  // We need to undo the bookkeeping too. Easiest: reset all bookkeeping and replay.
  // Save names first
  const savedNames = {
    top: $('name-top').value,
    bottom: $('name-bottom').value
  };
  // Reset
  const totalLen = game.history.length;
  game.undo(); // removes last move
  // Now we have one fewer move; recompute captured / moveCount from history
  captured.w = [];
  captured.b = [];
  moveCount.w = 0;
  moveCount.b = 0;
  for(const h of game.history){
    moveCount[h.color]++;
    if(h.captured){
      const capType = game.typeOf(h.captured);
      captured[h.color].push(capType);
    }
  }
  // Recompute timers: split elapsed evenly isn't quite right since we lose the time of the undone move.
  // Approach: subtract the last move's elapsed from the just-moved player.
  // For simplicity in casual play, we approximate: subtract the time of the undone move from the player who made it.
  // We'll subtract a rough estimate: nothing if we're being super accurate, but we'll deduct the time since last switch.
  // Simpler: just leave timers as-is (the undone move's time is small; acceptable for casual play).
  // Actually, let's deduct the most recent switch duration from the player who made the last move.
  // (This is imperfect but better than nothing.)
  // Skip timer adjustment for now — not critical.
  // Reset timer running state: the turn now is the player who is to move (the one who made the last move originally)
  ['w','b'].forEach(color => {
    timer[color].running = false;
    timer[color].lastStart = 0;
  });
  timer[game.turn].running = true;
  timer[game.turn].lastStart = Date.now();
  // Restore names
  $('name-top').value = savedNames.top;
  $('name-bottom').value = savedNames.bottom;
  selected = null;
  legalForSelected = [];
  renderAll();
  showToast('Move undone');
}

/* ----------- flip ----------- */
function flip(){
  flipped = !flipped;
  // Swap which color is associated with each name input
  const oldTop = inputColorMap.top;
  inputColorMap.top = inputColorMap.bottom;
  inputColorMap.bottom = oldTop;
  // Update displayed values in the inputs to match the new color at each position
  $('name-top').value = playerNames[inputColorMap.top];
  $('name-bottom').value = playerNames[inputColorMap.bottom];
  renderCoordinates();
  renderCardsActive();
  renderCaptured();
  renderPlayerMeta();
  renderBoard();
}

/* ----------- toast ----------- */
let toastTimer = null;
function showToast(msg){
  const t = $('toast');
  t.innerHTML = `<span>ℹ</span><span>${msg}</span>`;
  t.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ----------- event bindings ----------- */
$('btn-new').addEventListener('click', newGame);
$('btn-new-2').addEventListener('click', newGame);
$('btn-resign').addEventListener('click', () => {
  if(gameEnded) return;
  const name = getPlayerName(game.turn);
  if(confirm(`${name} resigns. Are you sure?`)) resign();
});
$('btn-undo').addEventListener('click', undo);
$('btn-flip').addEventListener('click', flip);
$('btn-close-gameover').addEventListener('click', () => {
  $('gameover-modal').classList.remove('active');
});

// Keyboard shortcuts (skip when typing in inputs/textareas)
document.addEventListener('keydown', (e) => {
  const tag = e.target && e.target.tagName;
  if(tag === 'INPUT' || tag === 'TEXTAREA') return;
  if(e.key === 'Escape'){
    $('promotion-modal').classList.remove('active');
    $('gameover-modal').classList.remove('active');
  }
  if(e.key === 'n' || e.key === 'N') newGame();
  if(e.key === 'u' || e.key === 'U') undo();
  if(e.key === 'f' || e.key === 'F') flip();
});

/* ----------- init ----------- */
function init(){
  $('name-top').value = playerNames[inputColorMap.top];
  $('name-bottom').value = playerNames[inputColorMap.bottom];
  $('name-top').placeholder = 'Black player name';
  $('name-bottom').placeholder = 'White player name';
  newGame();
}
init();
</script>
