<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>لعبة العربيات</title>
<style>
  :root {
    --color-bg: #0d1117;
    --color-surface: rgba(255,255,255,0.06);
    --color-border: rgba(255,255,255,0.12);
    --color-text: #e6e6e6;
    --color-muted: #888;
    --color-primary: #f5c518;
    --color-danger: #ff4455;
    --color-success: #22cc66;
    --color-blue: #3399ff;
    --radius: 12px;
    --font-ar: 'Cairo', 'Tajawal', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
  body {
    background: var(--color-bg);
    color: var(--color-text);
    font-family: var(--font-ar);
    overflow: hidden;
    width: 100vw; height: 100vh;
    direction: rtl;
  }
  #gameCanvas {
    display: block;
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
  }
  /* ====== SCREENS ====== */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(160deg, #0d1117 0%, #1a2035 100%);
    z-index: 100;
  }
  .screen.hidden { display: none; }

  /* ====== TITLE ====== */
  #title-screen { gap: 20px; }
  .title-logo {
    font-size: clamp(2.5rem, 7vw, 5rem);
    font-weight: 900;
    color: var(--color-primary);
    text-shadow: 0 0 40px rgba(245,197,24,0.5);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .title-sub { color: var(--color-muted); font-size: 1rem; margin-bottom: 20px; }
  .btn-main {
    background: var(--color-primary);
    color: #0d1117;
    border: none;
    padding: 14px 48px;
    border-radius: 50px;
    font-size: 1.2rem;
    font-weight: 700;
    font-family: var(--font-ar);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 24px rgba(245,197,24,0.3);
  }
  .btn-main:hover { transform: scale(1.05); box-shadow: 0 8px 32px rgba(245,197,24,0.5); }
  .btn-main:active { transform: scale(0.97); }

  /* ====== GARAGE (car selection carousel) ====== */
  #garage-screen {
    padding: 16px 12px;
    gap: 14px;
    overflow-y: auto;
    justify-content: flex-start;
    padding-top: 24px;
  }
  .garage-title {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 800;
    color: var(--color-primary);
    text-align: center;
  }

  /* === CAROUSEL WRAPPER === */
  .car-carousel {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    max-width: 480px;
    position: relative;
    user-select: none;
  }
  .carousel-arrow {
    flex-shrink: 0;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(245,197,24,0.15);
    border: 2px solid rgba(245,197,24,0.35);
    color: var(--color-primary);
    font-size: 1.4rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.18s, transform 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .carousel-arrow:active { transform: scale(0.88); background: rgba(245,197,24,0.3); }
  .carousel-card {
    flex: 1;
    min-width: 0;
    background: var(--color-surface);
    border: 2px solid var(--color-primary);
    border-radius: 18px;
    padding: 18px 10px 14px;
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    box-shadow: 0 0 28px rgba(245,197,24,0.12);
    transition: opacity 0.2s, transform 0.2s;
  }
  .carousel-card.slide-out-left  { opacity:0; transform:translateX(-40px) scale(0.92); }
  .carousel-card.slide-out-right { opacity:0; transform:translateX(40px)  scale(0.92); }
  .carousel-card.slide-in        { opacity:1; transform:translateX(0)      scale(1);    }
  #carousel-canvas {
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    display: block;
    width: 100% !important;
    max-width: 200px;
    height: auto !important;
  }
  .carousel-name {
    font-size: 1.15rem;
    font-weight: 800;
    color: var(--color-primary);
    letter-spacing: 0.02em;
  }
  .carousel-stats {
    display: flex; gap: 14px;
    font-size: 0.78rem; color: var(--color-muted);
  }
  .carousel-stat { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .carousel-stat-val { font-size:0.92rem; font-weight:700; color:var(--color-text); }
  .carousel-dots {
    display: flex; gap: 6px; justify-content: center;
  }
  .carousel-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--color-border);
    transition: background 0.2s, transform 0.2s;
    cursor: pointer;
  }
  .carousel-dot.active { background: var(--color-primary); transform: scale(1.4); }

  /* ====== CUSTOMIZATION ====== */
  .customize-panel {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    padding: 16px;
    width: 100%;
    max-width: 700px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .customize-row {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .customize-label {
    font-size: 0.85rem; color: var(--color-muted); min-width: 60px;
  }
  .color-swatches { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-swatch {
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }
  .color-swatch:hover { transform: scale(1.2); }
  .color-swatch.active { border-color: white; }
  .size-slider {
    -webkit-appearance: none;
    width: 150px; height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.15);
    outline: none;
    cursor: pointer;
  }
  .size-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--color-primary);
    cursor: pointer;
  }
  .weapon-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .weapon-btn {
    background: rgba(255,255,255,0.08);
    border: 2px solid var(--color-border);
    color: var(--color-text);
    padding: 6px 14px;
    border-radius: 8px;
    font-family: var(--font-ar);
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .weapon-btn:hover { background: rgba(255,255,255,0.15); }
  .weapon-btn.active { border-color: var(--color-primary); color: var(--color-primary); background: rgba(245,197,24,0.1); }

  /* preview canvas in customize */
  #preview-canvas { border-radius: 10px; border: 1px solid var(--color-border); }

  /* ====== HUD ====== */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    z-index: 50;
    pointer-events: none;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 10px 14px;
  }
  .hud-panel {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 6px 12px;
    font-size: 0.8rem;
    line-height: 1.6;
  }
  .hud-value { color: var(--color-primary); font-weight: 700; font-size: 1rem; }
  .wanted-stars { color: #ff4455; font-size: 1.1rem; letter-spacing: 2px; }

  /* ====== TOUCH CONTROLS ====== */
  #touch-controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    z-index: 50;
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 10px 16px 20px;
    pointer-events: none;
    direction: ltr;
  }
  .ctrl-group { display: flex; flex-direction: column; gap: 6px; pointer-events: all; }
  .ctrl-row { display: flex; gap: 6px; justify-content: center; }
  .ctrl-btn {
    width: 68px; height: 68px;
    background: rgba(0,0,0,0.75);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    color: white;
    font-size: 1.5rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.1s, transform 0.1s;
    touch-action: none;
  }
  .ctrl-btn:active, .ctrl-btn.pressed {
    background: rgba(245,197,24,0.4);
    transform: scale(0.93);
    border-color: var(--color-primary);
  }
  .ctrl-btn.speed-btn { background: rgba(0,180,80,0.35); border-color: rgba(0,220,100,0.5); width: 62px; height: 62px; font-size: 1.2rem; }
  .ctrl-btn.speed-btn.pressed { background: rgba(0,220,100,0.6); }
  .ctrl-btn.weapon-fire {
    width: 78px; height: 78px; border-radius: 50%;
    background: rgba(200,40,40,0.5);
    border-color: rgba(255,80,80,0.7);
    font-size: 1.6rem;
  }
  .ctrl-btn.weapon-fire.pressed { background: rgba(255,80,80,0.8); }
  .ctrl-btn.cannon-fire {
    background: rgba(180,80,0,0.5);
    border-color: rgba(255,140,0,0.7);
  }
  .ctrl-btn.cannon-fire.pressed { background: rgba(255,140,0,0.8); }

  /* ====== GAMEOVER / WIN ====== */
  #gameover-screen {
    gap: 20px; text-align: center;
    background: linear-gradient(160deg, #1a0008 0%, #0d1117 100%);
  }
  .go-title { font-size: clamp(2rem,6vw,4rem); font-weight: 900; color: var(--color-danger); text-shadow: 0 0 30px rgba(255,68,85,0.5); }
  .go-sub { color: var(--color-muted); font-size: 1rem; }
  .go-score { font-size: 1.5rem; font-weight: 700; color: var(--color-primary); }
  #fps-debug {
    position:fixed; top:0; left:0; background:rgba(0,0,0,.7);
    color:#0f0; font:11px/1.5 monospace; padding:4px 8px;
    z-index:9999; pointer-events:none;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- FPS Debug -->
<div id="fps-debug">FPS: --</div>

<!-- TITLE SCREEN -->
<div id="title-screen" class="screen">
  <div class="title-logo">🚗 لعبة العربيات 🚗</div>
  <div class="title-sub">أصنع عربيتك وانطلق في الشوارع!</div>
  <button class="btn-main" onclick="showGarage()">ابدأ اللعبة</button>
</div>

<!-- GARAGE SCREEN -->
<div id="garage-screen" class="screen hidden">
  <div class="garage-title">🏎️ اختر عربيتك</div>

  <!-- CAR CAROUSEL -->
  <div class="car-carousel" id="car-carousel">
    <button class="carousel-arrow" id="carousel-prev" onclick="carouselNav(-1)" aria-label="السابق">&#8249;</button>
    <div class="carousel-card" id="carousel-card">
      <canvas id="carousel-canvas" width="180" height="140"></canvas>
      <div class="carousel-name" id="carousel-name">سيدان</div>
      <div class="carousel-stats" id="carousel-stats"></div>
    </div>
    <button class="carousel-arrow" id="carousel-next" onclick="carouselNav(1)" aria-label="التالي">&#8250;</button>
  </div>
  <div class="carousel-dots" id="carousel-dots"></div>

  <div class="customize-panel">
    <div style="font-weight:700; font-size:1rem; color:var(--color-primary)">🎨 خصص عربيتك</div>

    <div class="customize-row">
      <span class="customize-label">اللون:</span>
      <div class="color-swatches" id="color-swatches"></div>
    </div>

    <div class="customize-row">
      <span class="customize-label">الحجم:</span>
      <input type="range" id="size-slider" class="size-slider" min="0.6" max="1.7" step="0.05" value="1.0">
      <span id="size-label" style="font-size:0.85rem; color:var(--color-muted)">عادي</span>
    </div>

    <div class="customize-row">
      <span class="customize-label">الأسلحة:</span>
      <div class="weapon-btns" id="weapon-btns">
        <button class="weapon-btn" data-weapon="pistol">🔫 مسدس</button>
        <button class="weapon-btn" data-weapon="machine">💥 رشاش</button>
        <button class="weapon-btn" data-weapon="cannon">💣 مدفع</button>
      </div>
    </div>

    <div style="display:flex; gap:12px; align-items:center; justify-content:center; flex-wrap:wrap;">
      <canvas id="preview-canvas" width="160" height="100"></canvas>
      <button class="btn-main" onclick="startGame()" style="font-size:1rem; padding:12px 32px;">
        🚀 ادخل اللعبة
      </button>
    </div>
  </div>
</div>

<!-- GAME CANVAS -->
<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="hud" class="hidden">
  <div class="hud-panel">
    <div>النقاط: <span class="hud-value" id="hud-score">0</span></div>
    <div>السرعة: <span class="hud-value" id="hud-speed">0</span></div>
    <div>الصحة: <span class="hud-value" id="hud-hp" style="color:#22c55e">100%</span></div>
    <div id="hud-combo" style="color:#f5c518; font-weight:bold; display:none">كومبو x<span id="combo-count">1</span></div>
  </div>
  <div class="hud-panel" style="text-align:center">
    <div style="font-size:0.7rem; color:var(--color-muted)">مطلوب من الشرطة</div>
    <div class="wanted-stars" id="hud-wanted">☆☆☆☆☆</div>
  </div>
  <div class="hud-panel">
    <div>السلاح: <span class="hud-value" id="hud-weapon">--</span></div>
    <div style="font-size:0.75rem; color:var(--color-muted)" id="hud-ammo">∞ طلقات</div>
  </div>
  <div id="challenge-display" style="position:absolute; top:60px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); border:2px solid var(--color-primary); border-radius:12px; padding:6px 16px; font-size:0.85rem; color:var(--color-primary); display:none; z-index:50; text-align:center; min-width:200px">
    <div id="challenge-text" style="font-weight:bold"></div>
    <div id="challenge-progress" style="font-size:0.75rem; color:#aaa; margin-top:2px"></div>
  </div>
</div>

<!-- TOUCH CONTROLS -->
<div id="touch-controls" class="hidden">
  <!-- LEFT: speed + weapons -->
  <div class="ctrl-group" id="left-controls">
    <div class="ctrl-row">
      <button class="ctrl-btn speed-btn" id="btn-accel" data-action="accel">⬆️</button>
      <button class="ctrl-btn speed-btn" id="btn-brake" data-action="brake">⬇️</button>
    </div>
    <div class="ctrl-row" id="weapon-fire-row">
      <!-- weapon buttons injected dynamically -->
    </div>
  </div>

  <!-- RIGHT: direction -->
  <div class="ctrl-group" id="right-controls">
    <div class="ctrl-row">
      <div style="width:56px"></div>
      <button class="ctrl-btn" id="btn-up" data-action="up">⬆️</button>
      <div style="width:56px"></div>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn" id="btn-left" data-action="left">⬅️</button>
      <button class="ctrl-btn" id="btn-down" data-action="down">⬇️</button>
      <button class="ctrl-btn" id="btn-right" data-action="right">➡️</button>
    </div>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameover-screen" class="screen hidden">
  <div class="go-title">😱 تم القبض عليك!</div>
  <div class="go-sub">الشرطة لحقت بك</div>
  <div class="go-score">النقاط: <span id="final-score">0</span></div>
  <button class="btn-main" onclick="restartGame()" style="margin-top:10px">🔄 العب مرة أخرى</button>
  <button class="btn-main" onclick="showGarage()" style="background:#333; color:#fff; margin-top:6px">🏎️ غيّر العربية</button>
</div>

<script>
console.log("=== CAR GAME LOADED (v1.1 - ALL MECHANICS & VISUALS FIXED) ===");
// ==================== AUDIO ====================
let audioCtx = null;
function initAudio() {
  if (audioCtx) {
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    return;
  }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') {
    const resume = () => {
      audioCtx.resume().then(() => {
        window.removeEventListener('click', resume);
        window.removeEventListener('touchstart', resume);
      });
    };
    window.addEventListener('click', resume);
    window.addEventListener('touchstart', resume);
  }
}
function playTone(freq, dur, type='square', vol=0.18, detune=0) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  osc.detune.value = detune;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}
function playEngine(speed) {
  if (!audioCtx || Math.random() > 0.06) return;
  const freq = 80 + speed * 1.8;
  playTone(freq, 0.12, 'sawtooth', 0.04, (Math.random()-0.5)*20);
}
function playShoot(weapon) {
  if (!audioCtx) return;
  if (weapon === 'pistol') { playTone(320, 0.12, 'square', 0.25); playTone(180, 0.08, 'sawtooth', 0.2, -50); }
  else if (weapon === 'machine') {
    for (let i=0;i<3;i++) setTimeout(()=>{ playTone(400+Math.random()*100, 0.06, 'square', 0.2); }, i*60);
  } else if (weapon === 'cannon') {
    playTone(80, 0.5, 'sawtooth', 0.4); playTone(60, 0.6, 'sine', 0.35);
    setTimeout(()=>playTone(120, 0.3, 'square', 0.3), 80);
  } else if (weapon === 'electro') {
    playTone(800 + Math.random()*200, 0.08, 'sawtooth', 0.16);
  } else if (weapon === 'flame') {
    playTone(90 + Math.random()*40, 0.06, 'sawtooth', 0.18);
  }
}
function playExplosion() {
  if (!audioCtx) return;
  for(let i=0;i<5;i++) setTimeout(()=>{
    playTone(40+Math.random()*80, 0.3+Math.random()*0.3, 'sawtooth', 0.35);
  }, i*50);
}
let lastSirenTime = 0;
function playSiren() {
  if (!audioCtx) return;
  const now = performance.now();
  if (now - lastSirenTime < 1000) return;
  lastSirenTime = now;
  
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(700, t);
  osc.frequency.linearRampToValueAtTime(900, t+0.25);
  osc.frequency.linearRampToValueAtTime(700, t+0.5);
  g.gain.setValueAtTime(0.06, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.6);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t); osc.stop(t+0.6);
}
function playCrash() {
  if (!audioCtx) return;
  playTone(150, 0.4, 'sawtooth', 0.4); playTone(200, 0.3, 'square', 0.3);
  setTimeout(()=>playTone(100, 0.4, 'sawtooth', 0.3), 100);
}
function playSquishSound() {
  if (!audioCtx) return;
  playTone(180, 0.15, 'sawtooth', 0.25);
  playTone(120, 0.2, 'sine', 0.22);
}

// ==================== CAR TYPES ====================
const CAR_TYPES = [
  // sedan: hood(12px) + cabin(26px) + trunk(14px) = 52px
  { id:'sedan',     name:'سيدان',        w:36, h:56, hoodH:12, trunkH:14, roofY:12, roofH:26, roofW:28, roofX:4, bodyPoints:[[0,0],[36,0],[36,56],[0,56]] },
  // suv: boxy tall body, short hood, long cabin
  { id:'suv',       name:'دفع رباعي',    w:42, h:60, hoodH:10, trunkH:12, roofY:10, roofH:34, roofW:34, roofX:4, bodyPoints:[[0,0],[42,0],[42,60],[0,60]] },
  // sport: low wide, long hood, tiny trunk
  { id:'sport',     name:'سيارة سباق',   w:36, h:54, hoodH:16, trunkH:10, roofY:16, roofH:24, roofW:28, roofX:4, bodyPoints:[[4,0],[32,0],[36,38],[36,54],[0,54],[0,38]] },
  // truck: tall cab + long flatbed
  { id:'truck',     name:'شاحنة',        w:44, h:72, hoodH:8,  trunkH:34, roofY:8,  roofH:28, roofW:36, roofX:4, bodyPoints:[[0,0],[44,0],[44,72],[0,72]] },
  // classic: wide rounded fenders, long hood
  { id:'classic',   name:'كلاسيكي',      w:38, h:60, hoodH:14, trunkH:16, roofY:14, roofH:28, roofW:30, roofX:4, bodyPoints:[[2,0],[36,0],[38,52],[38,60],[0,60],[0,52]] },
  // mini: compact, almost square cabin
  { id:'mini',      name:'صغيرة',        w:30, h:44, hoodH:8,  trunkH:10, roofY:8,  roofH:24, roofW:24, roofX:3, bodyPoints:[[0,0],[30,0],[30,44],[0,44]] },
  // ambulance: long white box body with red cross markings
  { id:'ambulance', name:'إسعاف',        w:42, h:76, hoodH:10, trunkH:4,  roofY:10, roofH:56, roofW:34, roofX:4, bodyPoints:[[0,0],[42,0],[42,76],[0,76]], special:'ambulance' },
  // firetruck: long red ladder truck

const COLORS = ['#e63946','#2196F3','#4CAF50','#FF9800','#9C27B0','#00BCD4','#FFEB3B','#ffffff','#607D8B','#FF5722'];
const COLOR_NAMES = ['أحمر','أزرق','أخضر','برتقالي','بنفسجي','سماوي','أصفر','أبيض','رمادي','برتقالي غامق'];

// ==================== GAME STATE ====================
let playerCar = { type: CAR_TYPES[0], color: COLORS[0], size: 1.0, weapons: [], activeWeapon: 0 };
let gameState = null;
let animId = null;
let lastTime = 0;
let gameRunning = false;
let fpsFrames=0, fpsLast=0, fpsVal=0;

// ==================== GARAGE SETUP ====================
function showTitle() {
  hideAll();
  document.getElementById('title-screen').classList.remove('hidden');
}
function hideAll() {
  ['title-screen','garage-screen','hud','touch-controls','gameover-screen'].forEach(id=>{
    document.getElementById(id).classList.add('hidden');
  });
  gameRunning = false;
  if (animId) { cancelAnimationFrame(animId); animId = null; }
}

function showGarage() {
  initAudio();
  hideAll();
  document.getElementById('garage-screen').classList.remove('hidden');
  buildGarageGrid();
  buildWeaponBtns();
  buildColorSwatches();
  updatePreview();
  document.getElementById('size-slider').addEventListener('input', onSizeChange);
}

let carouselIndex = 0;

const CAR_STATS = {
  sedan:     { speed:'★★★☆☆', armor:'★★☆☆☆', size:'متوسطة' },
  suv:       { speed:'★★☆☆☆', armor:'★★★★☆', size:'كبيرة'  },
  sport:     { speed:'★★★★☆', armor:'★☆☆☆☆', size:'صغيرة'  },

  classic:   { speed:'★★★☆☆', armor:'★★★☆☆', size:'متوسطة' },
  mini:      { speed:'★★★★☆', armor:'★☆☆☆☆', size:'صغيرة'  },
  ambulance: { speed:'★★★★☆', armor:'★★★☆☆', size:'طويلة'  },
  firetruck: { speed:'★★☆☆☆', armor:'★★★★★', size:'ضخمة'   },
  f1:        { speed:'★★★★★', armor:'☆☆☆☆☆', size:'منخفضة' },

  pickup:    { speed:'★★★☆☆', armor:'★★★☆☆', size:'كبيرة'  },
};

function buildGarageGrid() {
  carouselIndex = 0;
  renderCarousel();
  buildCarouselDots();
  setupCarouselSwipe();
}

function renderCarousel(direction) {
  const ct = CAR_TYPES[carouselIndex];
  playerCar.type = ct;

  const card = document.getElementById('carousel-card');
  const cv   = document.getElementById('carousel-canvas');
  const nameEl  = document.getElementById('carousel-name');
  const statsEl = document.getElementById('carousel-stats');

  // Slide animation
  if (direction !== undefined) {
    card.classList.add(direction > 0 ? 'slide-out-left' : 'slide-out-right');
    setTimeout(() => {
      card.classList.remove('slide-out-left', 'slide-out-right');
      card.classList.add('slide-in');
      _fillCarousel(cv, ct, nameEl, statsEl);
      setTimeout(() => card.classList.remove('slide-in'), 220);
    }, 180);
  } else {
    _fillCarousel(cv, ct, nameEl, statsEl);
  }

  // Update dots
  document.querySelectorAll('.carousel-dot').forEach((d, i) => {
    d.classList.toggle('active', i === carouselIndex);
  });
  updatePreview();
}

function _fillCarousel(cv, ct, nameEl, statsEl) {
  const scale = Math.min(180 / (ct.w + 20), 140 / (ct.h + 20));
  cv.width  = Math.round((ct.w + 20) * scale);
  cv.height = Math.round((ct.h + 20) * scale);
  drawCarOnCanvas(cv, ct, playerCar.color, 1.0);
  nameEl.textContent = ct.name;
  const st = CAR_STATS[ct.id] || {};
  statsEl.innerHTML = [
    `<div class="carousel-stat"><div>السرعة</div><div class="carousel-stat-val">${st.speed||'--'}</div></div>`,
    `<div class="carousel-stat"><div>الدرع</div><div class="carousel-stat-val">${st.armor||'--'}</div></div>`,
    `<div class="carousel-stat"><div>الحجم</div><div class="carousel-stat-val">${st.size||'--'}</div></div>`,
  ].join('');
}

function buildCarouselDots() {
  const dotsEl = document.getElementById('carousel-dots');
  dotsEl.innerHTML = '';
  CAR_TYPES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'carousel-dot' + (i === 0 ? ' active' : '');
    d.onclick = () => { carouselIndex = i; renderCarousel(); };
    dotsEl.appendChild(d);
  });
}

function carouselNav(dir) {
  carouselIndex = (carouselIndex + dir + CAR_TYPES.length) % CAR_TYPES.length;
  renderCarousel(dir);
}

function setupCarouselSwipe() {
  const el = document.getElementById('car-carousel');
  let startX = 0;
  el.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive:true });
  el.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) carouselNav(dx < 0 ? 1 : -1);
  }, { passive:true });
}

function buildColorSwatches() {
  const div = document.getElementById('color-swatches');
  div.innerHTML = '';
  COLORS.forEach((c,i) => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (i===0?' active':'');
    sw.style.background = c;
    sw.title = COLOR_NAMES[i];
    sw.onclick = () => {
      document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active'));
      sw.classList.add('active');
      playerCar.color = c;
      // Refresh the carousel canvas with new color
      const cv = document.getElementById('carousel-canvas');
      const ct = CAR_TYPES[carouselIndex];
      if (cv && ct) drawCarOnCanvas(cv, ct, c, 1.0);
      updatePreview();
    };
    div.appendChild(sw);
  });
}

function buildWeaponBtns() {
  const div = document.getElementById('weapon-btns');
  div.querySelectorAll('.weapon-btn').forEach(btn => {
    btn.onclick = () => {
      btn.classList.toggle('active');
      const w = btn.dataset.weapon;
      const idx = playerCar.weapons.indexOf(w);
      if (idx>=0) playerCar.weapons.splice(idx,1); else playerCar.weapons.push(w);
    };
  });
}

function onSizeChange() {
  const v = parseFloat(document.getElementById('size-slider').value);
  playerCar.size = v;
  const labels = ['صغيرة جداً','صغيرة','عادي','كبيرة','كبيرة جداً'];
  const idx = Math.round((v-0.6)/((1.7-0.6)/4));
  document.getElementById('size-label').textContent = labels[Math.min(idx,4)];
  updatePreview();
}

function updatePreview() {
  const cv = document.getElementById('preview-canvas');
  drawCarOnCanvas(cv, playerCar.type, playerCar.color, playerCar.size, playerCar.weapons);
}

function drawCarOnCanvas(cv, type, color, scale, weapons=[]) {
  const ctx = cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#1a2035';
  ctx.fillRect(0,0,cv.width,cv.height);
  const s = scale * Math.min(cv.width/(type.w+20), cv.height/(type.h+20));
  const ox = (cv.width - type.w*s)/2;
  const oy = (cv.height - type.h*s)/2;
  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(s,s);
  drawCarShape(ctx, type, color, weapons);
  ctx.restore();
}

function drawCarShape(ctx, type, color, weapons=[], angle=0) {
  const t = type, w = t.w, h = t.h, hw = w / 2;
  ctx.save();

  // ── Helpers ──────────────────────────────────────────
  const clr = () => { ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0; };

  // ── 1. Drop shadow ───────────────────────────────────
  ctx.shadowColor = 'rgba(0,0,0,0.45)';
  ctx.shadowBlur = 12; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 5;

  // ── 2. Organic body shape ────────────────────────────
  // Front narrower → widens at mid → slightly narrows at rear
  const fw = w * 0.78;  // front tip width
  const rw = w * 0.92;  // rear width
  const fh = h * 0.07;  // front taper zone height
  const rh = h * 0.06;  // rear taper zone height

  const bGrad = ctx.createLinearGradient(0, 0, 0, h);
  bGrad.addColorStop(0,   shadeColor(color, 35));
  bGrad.addColorStop(0.3, color);
  bGrad.addColorStop(0.75, shadeColor(color, -15));
  bGrad.addColorStop(1,   shadeColor(color, -30));
  ctx.fillStyle = bGrad;
  ctx.strokeStyle = shadeColor(color, -50);
  ctx.lineWidth = 1.5;

  ctx.beginPath();
  ctx.moveTo(hw, 0);
  ctx.bezierCurveTo(hw + fw*0.35, 0, hw + fw/2, fh*0.5, hw + fw/2, fh);
  ctx.bezierCurveTo(hw + w/2, h*0.28, hw + rw/2, h*0.6, hw + rw/2, h - rh);
  ctx.bezierCurveTo(hw + rw/2, h - rh*0.2, hw + rw*0.3, h, hw, h);
  ctx.bezierCurveTo(hw - rw*0.3, h, hw - rw/2, h - rh*0.2, hw - rw/2, h - rh);
  ctx.bezierCurveTo(hw - w/2, h*0.6, hw - w/2, h*0.28, hw - fw/2, fh);
  ctx.bezierCurveTo(hw - fw/2, fh*0.5, hw - fw*0.35, 0, hw, 0);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  clr();

  // ── 3. Hood (front section - brighter) ───────────────
  const hoodY = t.hoodH || h * 0.2;
  const hoodGrad = ctx.createLinearGradient(0, 0, 0, hoodY);
  hoodGrad.addColorStop(0, shadeColor(color, 55));
  hoodGrad.addColorStop(1, shadeColor(color, 12));
  ctx.fillStyle = hoodGrad;
  ctx.beginPath();
  ctx.moveTo(hw, 1);
  ctx.bezierCurveTo(hw + fw*0.32, 1, hw + fw/2 - 1, fh*0.5, hw + fw/2 - 1, hoodY);
  ctx.lineTo(hw - fw/2 + 1, hoodY);
  ctx.bezierCurveTo(hw - fw/2 + 1, fh*0.5, hw - fw*0.32, 1, hw, 1);
  ctx.closePath();
  ctx.fill();

  // Hood center crease
  ctx.strokeStyle = 'rgba(0,0,0,0.18)';
  ctx.lineWidth = 0.9;
  ctx.beginPath();
  ctx.moveTo(hw, 4); ctx.lineTo(hw, hoodY - 2);
  ctx.stroke();

  // ── 4. Wheels (flat rectangular style like reference) ─
  const tyW = Math.max(7, w * 0.16);  // tyre width
  const tyH = Math.max(14, h * 0.18); // tyre height
  const wy1 = h * 0.20; // front axle y
  const wy2 = h * 0.68; // rear axle y

  [[-(tyW - 1), wy1], [w - 1, wy1], [-(tyW - 1), wy2], [w - 1, wy2]].forEach(([tx, ty]) => {
    // Tyre body
    ctx.fillStyle = '#111827';
    ctx.beginPath(); ctx.roundRect(tx, ty, tyW, tyH, 3); ctx.fill();
    // Tyre tread lines
    ctx.strokeStyle = '#374151'; ctx.lineWidth = 1;
    for (let yi = ty + 3; yi < ty + tyH - 2; yi += 3.5) {
      ctx.beginPath(); ctx.moveTo(tx + 1, yi); ctx.lineTo(tx + tyW - 1, yi); ctx.stroke();
    }
    // Alloy rim
    const rimGrad = ctx.createLinearGradient(tx, ty, tx + tyW, ty + tyH);
    rimGrad.addColorStop(0, '#f9fafb');
    rimGrad.addColorStop(0.5, '#d1d5db');
    rimGrad.addColorStop(1, '#9ca3af');
    ctx.fillStyle = rimGrad;
    ctx.beginPath(); ctx.roundRect(tx + 1.5, ty + 2.5, tyW - 3, tyH - 5, 1.5); ctx.fill();
    // Spoke lines
    ctx.strokeStyle = '#6b7280'; ctx.lineWidth = 1;
    const cx2 = tx + tyW/2, cy2 = ty + tyH/2;
    for (let s = 0; s < 5; s++) {
      const sa = (s/5)*Math.PI*2 - Math.PI/2;
      ctx.beginPath();
      ctx.moveTo(cx2 + Math.cos(sa)*2, cy2 + Math.sin(sa)*2);
      ctx.lineTo(cx2 + Math.cos(sa)*(tyW*0.35), cy2 + Math.sin(sa)*(tyH*0.32));
      ctx.stroke();
    }
    // Hub
    ctx.fillStyle = '#374151';
    ctx.beginPath(); ctx.arc(cx2, cy2, 2, 0, Math.PI*2); ctx.fill();
  });

  // ── 5. Glass / Cabin (dominant dark area) ────────────
  const glW  = w * (t.glassW || 0.68);
  const glX1 = hw - glW/2;
  const glY1 = hoodY;
  const glY2 = h * (t.glassBot || 0.75);

  const glGrad = ctx.createLinearGradient(0, glY1, 0, glY2);
  glGrad.addColorStop(0,   '#334155');
  glGrad.addColorStop(0.4, '#1e293b');
  glGrad.addColorStop(1,   '#0f172a');
  ctx.fillStyle = glGrad;
  ctx.beginPath();
  ctx.roundRect(glX1, glY1, glW, glY2 - glY1, [5, 5, 3, 3]);
  ctx.fill();

  // Glass shine stripe (diagonal)
  ctx.fillStyle = 'rgba(255,255,255,0.14)';
  ctx.beginPath();
  ctx.moveTo(glX1 + 4, glY1 + 3);
  ctx.lineTo(glX1 + glW * 0.44, glY1 + 3);
  ctx.lineTo(glX1 + glW * 0.28, glY1 + (glY2-glY1) * 0.52);
  ctx.lineTo(glX1 + 3, glY1 + (glY2-glY1) * 0.52);
  ctx.closePath(); ctx.fill();

  // A-pillar
  ctx.strokeStyle = shadeColor(color, -35);
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(glX1 + 3, glY1); ctx.lineTo(glX1 - 0.5, glY1 + 10);
  ctx.moveTo(glX1 + glW - 3, glY1); ctx.lineTo(glX1 + glW + 0.5, glY1 + 10);
  ctx.stroke();

  // ── 6. Roof panel ────────────────────────────────────
  const roofH2 = (glY2 - glY1) * 0.32;
  const roofW2 = glW * 0.80;
  const roofX  = hw - roofW2/2;
  const roofY  = glY1 + (glY2 - glY1) * 0.25;
  ctx.fillStyle = shadeColor(color, -22);
  ctx.beginPath(); ctx.roundRect(roofX, roofY, roofW2, roofH2, [2,2,2,2]); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.fillRect(hw - 3, roofY + 2, 6, roofH2 - 4);

  // ── 7. Trunk (rear section) ───────────────────────────
  const tkGrad = ctx.createLinearGradient(0, glY2, 0, h);
  tkGrad.addColorStop(0, shadeColor(color, 5));
  tkGrad.addColorStop(1, shadeColor(color, -28));
  ctx.fillStyle = tkGrad;
  ctx.beginPath();
  ctx.moveTo(glX1, glY2);
  ctx.lineTo(glX1 + glW, glY2);
  ctx.bezierCurveTo(glX1 + glW, glY2 + 4, hw + rw/2 - 3, h - rh - 2, hw + rw*0.28, h - 1);
  ctx.bezierCurveTo(hw, h + 1, hw - rw*0.28, h - 1, hw - rw/2 + 3, h - rh - 2);
  ctx.bezierCurveTo(glX1, glY2 + 4, glX1, glY2 + 4, glX1, glY2);
  ctx.closePath(); ctx.fill();

  // Trunk crease
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(hw - glW*0.25, glY2 + 3); ctx.lineTo(hw - glW*0.2, h - rh - 5);
  ctx.moveTo(hw + glW*0.25, glY2 + 3); ctx.lineTo(hw + glW*0.2, h - rh - 5);
  ctx.stroke();

  // ── 8. Side mirrors ──────────────────────────────────
  const mY = glY1 + 2, mW = 6, mH = 4;
  ctx.fillStyle = shadeColor(color, -10);
  ctx.strokeStyle = shadeColor(color, -38); ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.roundRect(glX1 - mW - 1, mY, mW, mH, 1); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.roundRect(glX1 + glW + 1, mY, mW, mH, 1); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#bae6fd';
  ctx.fillRect(glX1 - mW, mY + 1, mW - 1.5, mH - 2);
  ctx.fillRect(glX1 + glW + 1.5, mY + 1, mW - 1.5, mH - 2);

  // ── 9. Headlights (LED style) ─────────────────────────
  ctx.fillStyle = '#fef9c3';
  ctx.shadowColor = 'rgba(254,240,138,0.8)'; ctx.shadowBlur = 6;
  const hlW = glW * 0.28;
  ctx.beginPath(); ctx.roundRect(glX1, 2, hlW, 5, 2); ctx.fill();
  ctx.beginPath(); ctx.roundRect(glX1 + glW - hlW, 2, hlW, 5, 2); ctx.fill();
  clr();
  // DRL strip
  ctx.strokeStyle = 'rgba(255,245,180,0.9)'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(glX1 + 2, 4.5); ctx.lineTo(glX1 + hlW - 2, 4.5);
  ctx.moveTo(glX1 + glW - hlW + 2, 4.5); ctx.lineTo(glX1 + glW - 2, 4.5);
  ctx.stroke(); ctx.lineCap = 'butt';

  // ── 10. Taillights ───────────────────────────────────
  ctx.fillStyle = '#ef4444';
  ctx.shadowColor = 'rgba(255,50,50,0.5)'; ctx.shadowBlur = 5;
  ctx.beginPath(); ctx.roundRect(glX1, glY2 - 1, glW * 0.28, 5, 2); ctx.fill();
  ctx.beginPath(); ctx.roundRect(glX1 + glW - glW*0.28, glY2 - 1, glW*0.28, 5, 2); ctx.fill();
  clr();

  // ── 11. Body side highlight crease ───────────────────
  ctx.strokeStyle = 'rgba(255,255,255,0.20)'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(glX1 - 2, glY1 + 8);
  ctx.bezierCurveTo(glX1 - 5, glY1 + h*0.22, glX1 - 5, glY2 - h*0.1, glX1 - 1, glY2 - 4);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(glX1 + glW + 2, glY1 + 8);
  ctx.bezierCurveTo(glX1 + glW + 5, glY1 + h*0.22, glX1 + glW + 5, glY2 - h*0.1, glX1 + glW + 1, glY2 - 4);
  ctx.stroke();

  // ── 12. Type-specific details ─────────────────────────
  // Police two-tone
  if (color === '#1144ff') {
    ctx.fillStyle = 'rgba(255,255,255,0.32)';
    ctx.beginPath(); ctx.roundRect(glX1 + 2, 7, glW - 4, hoodY - 9, 2); ctx.fill();
    ctx.beginPath(); ctx.roundRect(glX1 + 2, glY2 + 2, glW - 4, h - glY2 - rh - 5, 2); ctx.fill();
  }

  // Sport racing stripes
  if (t.id === 'sport' || t.id === 'f1') {
    ctx.fillStyle = 'rgba(255,255,255,0.32)';
    ctx.fillRect(hw - 5, 3, 4, hoodY - 4);
    ctx.fillRect(hw + 1, 3, 4, hoodY - 4);
  }

  // Truck flatbed
  if (t.id === 'truck') {
    ctx.fillStyle = '#374151';
    ctx.fillRect(glX1 + 2, glY2 + 2, glW - 4, h - glY2 - rh - 6);
    ctx.strokeStyle = '#4b5563'; ctx.lineWidth = 1;
    for (let lx = glX1 + 8; lx < glX1 + glW - 4; lx += 5) {
      ctx.beginPath(); ctx.moveTo(lx, glY2+3); ctx.lineTo(lx, h-rh-4); ctx.stroke();
    }
  }

  // Limo extra long side glass panels
  if (t.id === 'limo') {
    ctx.strokeStyle = shadeColor(color, -30); ctx.lineWidth = 1;
    for (let ly3 = glY1 + (glY2-glY1)*0.25; ly3 < glY2 - 4; ly3 += (glY2-glY1)*0.22) {
      ctx.beginPath(); ctx.moveTo(glX1, ly3); ctx.lineTo(glX1 + glW, ly3); ctx.stroke();
    }
  }

  // ── 13. Special vehicles ──────────────────────────────
  if (t.special === 'ambulance') {
    const si = Math.floor(Date.now()/150)%2;
    ctx.fillStyle = si ? '#fbbf24' : '#ef4444';
    ctx.fillRect(glX1 + 2, glY1 - 4, glW - 4, 3);
    ctx.fillStyle = '#ef4444';
    const cy3 = glY1 + (glY2-glY1)/2;
    ctx.fillRect(hw - 8, cy3 - 2.5, 16, 5);
    ctx.fillRect(hw - 2.5, cy3 - 8, 5, 16);
  }

  if (t.special === 'firetruck') {
    const si2 = Math.floor(Date.now()/120)%2;
    ctx.fillStyle = si2 ? '#ef4444' : '#fbbf24';
    ctx.fillRect(glX1 + 2, glY1 - 4, (glW-4)/2, 3);
    ctx.fillStyle = si2 ? '#fbbf24' : '#ef4444';
    ctx.fillRect(hw, glY1 - 4, (glW-4)/2, 3);
    ctx.fillStyle = '#374151';
    ctx.fillRect(hw - 3.5, glY1 + 3, 7, glY2 - glY1 - 6);
  }

  if (t.special === 'f1') {
    // Front wing
    ctx.fillStyle = shadeColor(color, -18);
    ctx.beginPath(); ctx.roundRect(-6, fh + 2, w + 12, 5, 2); ctx.fill();
    // Rear wing
    ctx.fillStyle = '#111827';
    ctx.beginPath(); ctx.roundRect(-5, h - rh - 7, w + 10, 4, 1); ctx.fill();
    ctx.fillRect(-3, h - rh - 15, 3.5, 10);
    ctx.fillRect(w - 0.5, h - rh - 15, 3.5, 10);
    // Open cockpit
    ctx.fillStyle = '#1f2937';
    ctx.beginPath(); ctx.ellipse(hw, glY1 + (glY2-glY1)*0.5, 7, 9, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#7dd3fc';
    ctx.beginPath(); ctx.ellipse(hw, glY1 + (glY2-glY1)*0.44, 4.5, 3.5, 0, 0, Math.PI); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 7px Arial'; ctx.textAlign = 'center';
    ctx.fillText('01', hw, glY2 - 5);
  }

  if (t.special === 'tesla') {
    ctx.fillStyle = 'rgba(125,211,252,0.25)';
    ctx.beginPath(); ctx.roundRect(glX1 + 5, glY1 + 5, glW - 10, glY2 - glY1 - 10, 4); ctx.fill();
    ctx.fillStyle = '#ef4444'; ctx.font = 'bold 7px Arial'; ctx.textAlign = 'center';
    ctx.fillText('T', hw, hoodY - 3);
    ctx.fillStyle = '#22d3ee';
    ctx.beginPath(); ctx.arc(glX1 + glW - 4, glY2 + 2, 2.5, 0, Math.PI*2); ctx.fill();
  }

  if (t.special === 'pickup') {
    ctx.fillStyle = '#374151';
    ctx.fillRect(glX1 + 3, glY2 + 2, glW - 6, h - glY2 - rh - 5);
    ctx.fillStyle = '#4b5563';
    ctx.fillRect(glX1 + 5, glY2 + 4, glW - 10, h - glY2 - rh - 10);
    ctx.fillStyle = '#6b7280';
    ctx.fillRect(glX1 + 3, glY2 + 2, 2.5, h - glY2 - rh - 5);
    ctx.fillRect(glX1 + glW - 5.5, glY2 + 2, 2.5, h - glY2 - rh - 5);
    // Tailgate
    ctx.fillStyle = shadeColor(color, -12);
    ctx.fillRect(glX1 + 3, h - rh - 6, glW - 6, 4);
  }

  // ── 14. Weapons ───────────────────────────────────────
  if (weapons.includes('cannon')) {
    ctx.fillStyle = '#374151'; ctx.fillRect(hw - 3.5, -16, 7, 18);
    ctx.fillStyle = '#1f2937'; ctx.fillRect(hw - 5, -20, 10, 5);
    ctx.fillStyle = '#f5c518'; ctx.fillRect(hw - 2, -21, 4, 1.5);
  }
  if (weapons.includes('machine')) {
    ctx.fillStyle = '#4b5563';
    ctx.fillRect(w - 2, glY1 + 9, 11, 3);
    ctx.fillRect(-9, glY1 + 9, 11, 3);
    ctx.fillStyle = '#1f2937';
    ctx.fillRect(w + 9, glY1 + 8, 2, 5);
    ctx.fillRect(-11, glY1 + 8, 2, 5);
  }
  if (weapons.includes('pistol')) {
    ctx.fillStyle = '#4b5563'; ctx.fillRect(hw - 2, -6, 4, 8);
    ctx.fillStyle = '#1f2937'; ctx.fillRect(hw - 3, -9, 6, 3);
  }

  ctx.restore();
}


function shadeColor(hex, pct) {
  const n = parseInt(hex.replace('#',''), 16);
  let r=((n>>16)&255)+pct, g=((n>>8)&255)+pct, b=(n&255)+pct;
  r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

const WORLD_W = 2400, WORLD_H = 2400;
const TILE = 80;
const ROAD_COLOR = '#42585c', SIDEWALK_COLOR = '#d7c4a3', BUILDING_COLOR = '#1e2535', LINE_COLOR = 'rgba(255,255,255,0.4)';

// World chunks container
function seededRandom(x, y) {
  const sx = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
  return sx - Math.floor(sx);
}

function generateChunk(cx, cy) {
  const map = Array.from({length: 16}, () => Array(16).fill(0));
  
  // Base roads (4 lanes wide: 6, 7, 8, 9)
  for (let r = 0; r < 16; r++) {
    for (let c = 0; c < 16; c++) {
      if ((r >= 6 && r <= 9) || (c >= 6 && c <= 9)) {
        map[r][c] = 1; // road
      } else if (r === 5 || r === 10 || c === 5 || c === 10) {
        map[r][c] = 2; // sidewalk
      }
    }
  }

  const seed = seededRandom(cx, cy);
  
  // Center intersection variation (roundabout, traffic island, etc.)
  if (seed < 0.3) {
    // Roundabout with central island
    for (let r = 7; r <= 8; r++) {
      for (let c = 7; c <= 8; c++) {
        map[r][c] = 3; // roundabout center
      }
    }
    map[6][7] = 2; map[6][8] = 2;
    map[9][7] = 2; map[9][8] = 2;
    map[7][6] = 2; map[8][6] = 2;
    map[7][9] = 2; map[8][9] = 2;
  } else if (seed < 0.55) {
    // Traffic island / median green strip
    for (let r = 0; r < 16; r++) {
      if (r < 5 || r > 10) {
        map[r][7] = 2; map[r][8] = 2;
      }
    }
    for (let c = 0; c < 16; c++) {
      if (c < 5 || c > 10) {
        map[7][c] = 2; map[8][c] = 2;
      }
    }
  } else if (seed < 0.75) {
    // Decorative fountain roundabout
    for (let r = 7; r <= 8; r++) {
      for (let c = 7; c <= 8; c++) {
        map[r][c] = 4; // fountain roundabout
      }
    }
    map[6][7] = 2; map[6][8] = 2;
    map[9][7] = 2; map[9][8] = 2;
    map[7][6] = 2; map[8][6] = 2;
    map[7][9] = 2; map[8][9] = 2;
  }

  const chunkBuildings = [];
  const chunkParks = [];
  
  const quadrants = [
    { cRange: [0, 4], rRange: [0, 4], doorDir: 'down_right' },
    { cRange: [11, 15], rRange: [0, 4], doorDir: 'down_left' },
    { cRange: [0, 4], rRange: [11, 15], doorDir: 'up_right' },
    { cRange: [11, 15], rRange: [11, 15], doorDir: 'up_left' }
  ];

  quadrants.forEach((q, idx) => {
    const qSeed = seededRandom(cx + idx * 7, cy - idx * 13);
    const qx = cx * 1280 + q.cRange[0] * 80;
    const qy = cy * 1280 + q.rRange[0] * 80;
    const qw = 5 * 80;
    const qh = 5 * 80;

    if (qSeed < 0.38) {
      // Park / Garden
      for (let r = q.rRange[0]; r <= q.rRange[1]; r++) {
        for (let c = q.cRange[0]; c <= q.cRange[1]; c++) {
          if (r === q.rRange[0] + 2 || c === q.cRange[0] + 2) {
            map[r][c] = 2; // path
          } else {
            map[r][c] = 0; // grass
          }
        }
      }
      
      const pondX = qx + 200 + (qSeed - 0.2) * 50;
      const pondY = qy + 200 + (qSeed - 0.2) * 50;
      const pondR = 45 + qSeed * 25;
      
      const trees = [
        { x: qx + 60, y: qy + 60 },
        { x: qx + 340, y: qy + 60 },
        { x: qx + 60, y: qy + 340 },
        { x: qx + 340, y: qy + 340 }
      ];
      
      chunkParks.push({
        pond: { x: pondX, y: pondY, r: pondR },
        trees: trees
      });
    } else {
      // Realistic Building
      const bx = qx + 30;
      const by = qy + 30;
      const bw = qw - 60;
      const bh = qh - 60;
      
      const floors = 3 + Math.floor(qSeed * 6);
      const bColor = ['#1e293b', '#334155', '#1c2541', '#2d3748', '#1b263b', '#2c3e50'][Math.floor(qSeed * 6)];
      
      let doorX = bx + bw / 2;
      let doorY = by + bh - 2;
      let stairsDir = 'down';

      if (q.doorDir.includes('up')) {
        doorY = by - 4;
        stairsDir = 'up';
      }

      chunkBuildings.push({
        x: bx, y: by, w: bw, h: bh,
        color: bColor,
        floors: floors,
        door: { x: doorX, y: doorY, w: 24, h: 6 },
        stairsDir: stairsDir,
        garden: {
          x: bx - 20, y: by - 20,
          w: bw + 40, h: bh + 40
        }
      });
    }
  });

  gameState.chunks[`${cx},${cy}`] = {
    map: map,
    buildings: chunkBuildings,
    parks: chunkParks
  };
}

function spawnTraffic() {
  if (!gameState) return;
  const p = gameState.player;
  const pChunkX = Math.floor(p.x / 1280);
  const pChunkY = Math.floor(p.y / 1280);
  
  // Spawn in a random chunk within radius 1 around the player
  const cx = pChunkX + Math.floor(Math.random() * 3 - 1);
  const cy = pChunkY + Math.floor(Math.random() * 3 - 1);
  const key = `${cx},${cy}`;
  
  if (!gameState.chunks[key]) {
    generateChunk(cx, cy);
  }
  
  const chunk = gameState.chunks[key];
  const roadTiles = [];
  for (let r = 0; r < 16; r++) {
    for (let c = 0; c < 16; c++) {
      if (chunk.map[r][c] === 1) roadTiles.push({ r, c });
    }
  }
  
  if (roadTiles.length > 0) {
    const tile = roadTiles[Math.floor(Math.random() * roadTiles.length)];
    const tx = cx * 1280 + tile.c * 80 + 40;
    const ty = cy * 1280 + tile.r * 80 + 40;
    
    // Don't spawn on top of the player
    if (Math.hypot(tx - p.x, ty - p.y) < 220) return;

    // Weighted spawn: common cars 75%, special vehicles 25%
    const specialTypes = ['ambulance','firetruck','f1','tesla','limo','pickup'];
    const commonTypes  = ['sedan','suv','sport','truck','classic','mini'];
    let chosenId;
    if (Math.random() < 0.22) {
      chosenId = specialTypes[Math.floor(Math.random() * specialTypes.length)];
    } else {
      chosenId = commonTypes[Math.floor(Math.random() * commonTypes.length)];
    }
    const chosenType = CAR_TYPES.find(c => c.id === chosenId) || CAR_TYPES[0];

    // Default colours for special vehicles
    const specialColors = {
      ambulance: '#f3f4f6',   // white
      firetruck: '#dc2626',   // fire red
      f1:        '#f5c518',   // racing yellow
      tesla:     '#111827',   // midnight black
      limo:      '#1f2937',   // charcoal black
      pickup:    '#78350f',   // brown
    };
    const tcolor = specialColors[chosenId] || COLORS[Math.floor(Math.random() * COLORS.length)];

    gameState.traffic.push({
      x: tx, y: ty,
      angle: (Math.floor(Math.random() * 4)) * Math.PI / 2,
      speed: chosenId === 'ambulance' ? 90 + Math.random()*40 :
             chosenId === 'firetruck' ? 55 + Math.random()*20 :
             chosenId === 'f1'        ? 130 + Math.random()*50 :
             45 + Math.random() * 65,
      type: chosenType,
      color: tcolor,
      hp: 100,
      state: 'driving',
      size: chosenId === 'limo' ? 0.65 : chosenId === 'firetruck' ? 0.7 : 0.7 + Math.random() * 0.4,
      burnTimer: 0,
      isRacer: chosenId === 'f1' || chosenId === 'sport' || Math.random() < 0.15,
      isAggressive: Math.random() < 0.2,
      id: Math.random()
    });
  }
}

// ==================== GAME LOOP ====================
function startGame() {
  hideAll();
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('touch-controls').classList.remove('hidden');
  buildWeaponFireBtns();
  initGameState();
  setupInput();
  gameRunning = true;
  lastTime = performance.now();
  animId = requestAnimationFrame(gameLoop);
}

function buildWeaponFireBtns() {
  const row = document.getElementById('weapon-fire-row');
  row.innerHTML = '';
  const weapons = playerCar.weapons.length>0 ? playerCar.weapons : ['pistol'];
  const icons = {pistol:'🔫', machine:'💥', cannon:'💣'};
  const wnames = {pistol:'مسدس', machine:'رشاش', cannon:'مدفع'};
  weapons.forEach((w,i) => {
    const btn = document.createElement('button');
    btn.className = 'ctrl-btn weapon-fire' + (w==='cannon'?' cannon-fire':'');
    btn.innerHTML = icons[w];
    btn.title = wnames[w];
    btn.dataset.weapon = w;
    setupTouchBtn(btn, 'fire_'+w);
    row.appendChild(btn);
  });
  // weapon switch
  if (weapons.length>1) {
    const sw = document.createElement('button');
    sw.className = 'ctrl-btn'; sw.innerHTML = '🔄'; sw.title = 'تغيير السلاح';
    sw.onclick = () => {
      if (!gameState) return;
      gameState.player.activeWeapon = (gameState.player.activeWeapon+1)%weapons.length;
      updateHUD();
    };
    row.appendChild(sw);
  }
}

function setupTouchBtn(btn, action) {
  const press = (e) => {
    if (e && e.cancelable) e.preventDefault();
    if (gameState) gameState.touchKeys[action] = true;
    btn.classList.add('pressed');
  };
  const release = (e) => {
    if (e && e.cancelable) e.preventDefault();
    if (gameState) gameState.touchKeys[action] = false;
    btn.classList.remove('pressed');
  };
  btn.addEventListener('touchstart', press, {passive:false});
  btn.addEventListener('touchend', release, {passive:false});
  btn.addEventListener('touchcancel', release, {passive:false});
  btn.addEventListener('mousedown', press);
  btn.addEventListener('mouseup', release);
  btn.addEventListener('mouseleave', release);
}

let inputSetupDone = false;
function setupInput() {
  if (inputSetupDone) return;
  inputSetupDone = true;

  // Direction + accel/brake touch buttons
  ['up','down','left','right','accel','brake'].forEach(action => {
    const btn = document.getElementById('btn-'+action);
    if (btn) setupTouchBtn(btn, action);
  });

  document.addEventListener('keydown', e => {
    if (!gameState) return;
    gameState.keys[e.code] = true;
    // weapon select 1,2,3
    if (e.code==='Digit1') gameState.player.activeWeapon=0;
    if (e.code==='Digit2') gameState.player.activeWeapon=1;
    if (e.code==='Digit3') gameState.player.activeWeapon=2;
    if (e.code==='Space') fireBullet();
    e.preventDefault && (e.key===' ' || e.key==='ArrowUp' || e.key==='ArrowDown') && e.preventDefault();
  });
  document.addEventListener('keyup', e => { if(gameState) gameState.keys[e.code]=false; });
}

function gameLoop(ts) {
  if (!gameRunning) return;
  const dt = Math.min((ts-lastTime)/1000, 0.05);
  lastTime = ts;
  fpsFrames++;
  if (ts-fpsLast>=1000) {
    fpsVal = Math.round(fpsFrames*1000/(ts-fpsLast));
    fpsFrames=0; fpsLast=ts;
    document.getElementById('fps-debug').textContent = `FPS: ${fpsVal}`;
  }
  update(dt);
  render();
  updateHUD();
  animId = requestAnimationFrame(gameLoop);
}

function update(dt) {
  if (!gameState || gameState.phase!=='playing') return;
  const p = gameState.player;
  if (!p.alive) return;

  // Decrement power-up timers
  if (p.shieldTime > 0) p.shieldTime = Math.max(0, p.shieldTime - dt);
  if (p.nitroTime > 0) p.nitroTime = Math.max(0, p.nitroTime - dt);

  const elapsedMinutes = (Date.now() - (gameState.startTime || Date.now())) / 60000;
  const timeSpeedMultiplier = Math.min(1.5, 1.0 + elapsedMinutes * 0.08);

  // Input
  const keys = gameState.keys, tk = gameState.touchKeys;
  const turnLeft  = keys['ArrowLeft']  || keys['KeyA'] || tk['left'];
  const turnRight = keys['ArrowRight'] || keys['KeyD'] || tk['right'];
  const accel     = keys['ArrowUp']    || keys['KeyW'] || tk['up'] || tk['accel'];
  const brake     = keys['ArrowDown']  || keys['KeyS'] || tk['down'] || tk['brake'];
  const fireKeys  = p.weapons.map((_,i)=> tk['fire_'+p.weapons[i]] || false);
  const anyFire   = fireKeys.some(f=>f) || keys['Space'];

  // Steer
  const steerSpeed = 2.5;
  if (turnLeft)  p.angle -= steerSpeed * dt * (0.4 + Math.abs(p.speed)/200);
  if (turnRight) p.angle += steerSpeed * dt * (0.4 + Math.abs(p.speed)/200);

  // Acceleration
  const maxSpeed = (340 * p.size) * (p.nitroTime > 0 ? 1.7 : 1) * timeSpeedMultiplier;
  const accelForce = 400 * (p.nitroTime > 0 ? 2.0 : 1) * timeSpeedMultiplier;
  const brakeForce = 400;
  const friction = 140;
  if (accel) p.speed = Math.min(p.speed + accelForce*dt, maxSpeed);
  else if (brake) p.speed = Math.max(p.speed - brakeForce*dt, -80);
  else p.speed *= (1 - friction/1000 * dt * 60);
  if (Math.abs(p.speed)<1) p.speed=0;

  p.vx = Math.sin(p.angle) * p.speed;
  p.vy = -Math.cos(p.angle) * p.speed;

  // Nitro particle effects
  if (p.nitroTime > 0 && Math.random() < 0.4) {
    const backDist = -p.type.h * p.size * 0.45;
    const px = p.x + Math.sin(p.angle) * backDist;
    const py = p.y - Math.cos(p.angle) * backDist;
    gameState.particles.push({
      x: px, y: py,
      vx: -Math.sin(p.angle) * 120 + (Math.random()-0.5)*30,
      vy: Math.cos(p.angle) * 120 + (Math.random()-0.5)*30,
      color: Math.random() > 0.5 ? '#f97316' : '#3b82f6',
      size: 4 + Math.random()*4,
      life: 0.3,
      maxLife: 0.3,
      alpha: 1
    });
  }

  const newX = p.x + p.vx*dt;
  const newY = p.y + p.vy*dt;

  if (!isWall(newX, p.y, p.type.w*p.size, p.type.h*p.size)) p.x = newX;
  else { p.vx=0; p.speed*=-0.3; }
  if (!isWall(p.x, newY, p.type.w*p.size, p.type.h*p.size)) p.y = newY;
  else { p.vy=0; p.speed*=-0.3; }

  playEngine(Math.abs(p.speed));

  // Fire
  if (anyFire) {
    // find which weapon is being fired from touchkeys
    let wToFire = p.weapons[p.activeWeapon] || p.weapons[0];
    for(let i=0;i<p.weapons.length;i++) if(tk['fire_'+p.weapons[i]]) { wToFire=p.weapons[i]; break; }
    fireBullet(wToFire);
  }

  // Update bullets
  gameState.bullets = gameState.bullets.filter(b => {
    b.x += b.vx*dt; b.y += b.vy*dt;
    b.life -= dt;
    if (b.life<=0) return false;
    if (isWall(b.x,b.y,4,4)) { spawnParticles(b.x,b.y,4,'#ffaa00'); return false; }
    
    if (b.fromPedestrian) {
      // Pedestrian bullets hit: player, traffic, police, and other pedestrians
      if (rectHit(b.x, b.y, p.x, p.y, p.type.w * p.size, p.type.h * p.size)) {
        damagePlayer(12);
        spawnParticles(b.x, b.y, 6, '#ff4400');
