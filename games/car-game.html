      }
      for (let i = gameState.pedestrians.length - 1; i >= 0; i--) {
        const ped = gameState.pedestrians[i];
        if (ped.state === 'dead' || ped.state === 'splatted') continue;
        if (ped.id === b.fromPedId) continue;
        if (Math.hypot(b.x - ped.x, b.y - ped.y) < 20) {
          ped.state = 'splatted';
          ped.deathTime = Date.now();
          playSquishSound();
          spawnParticles(ped.x, ped.y, 10, '#ef4444');
          return false;
        }
      }
      for (let i = gameState.traffic.length - 1; i >= 0; i--) {
        const car = gameState.traffic[i];
        if (car.state === 'destroyed') continue;
        if (rectHit(b.x, b.y, car.x, car.y, car.type.w * car.size, car.type.h * car.size)) {
          hitCar(car, b.weapon);
          spawnParticles(b.x, b.y, 6, '#ffcc00');
          return false;
        }
      }
      for (let i = gameState.police.length - 1; i >= 0; i--) {
        const car = gameState.police[i];
        if (car.state === 'destroyed') continue;
        if (rectHit(b.x, b.y, car.x, car.y, car.type.w * car.size, car.type.h * car.size)) {
          hitCar(car, b.weapon);
          spawnParticles(b.x, b.y, 6, '#ff4455');
          return false;
        }
      }
    } else {
      // Player bullets hit: pedestrians, traffic, or police
      for (let i = gameState.pedestrians.length - 1; i >= 0; i--) {
        const ped = gameState.pedestrians[i];
        if (ped.state === 'dead' || ped.state === 'splatted') continue;
        if (Math.hypot(b.x - ped.x, b.y - ped.y) < 18) {
          ped.state = 'splatted';
          ped.deathTime = Date.now();
          playSquishSound();
          spawnParticles(ped.x, ped.y, 8, b.weapon === 'flame' ? '#f97316' : '#ef4444');
          p.score += 50;
          p.wantedLevel = Math.min(5, p.wantedLevel + 1);
          onPedKilled();
          return false;
        }
      }
      for (let i = gameState.traffic.length - 1; i >= 0; i--) {
        const car = gameState.traffic[i];
        if (car.state === 'destroyed') continue;
        if (rectHit(b.x, b.y, car.x, car.y, car.type.w * car.size, car.type.h * car.size)) {
          hitCar(car, b.weapon);
          spawnParticles(b.x, b.y, 8, b.weapon === 'cannon' ? '#ff6600' : b.weapon === 'flame' ? '#f97316' : '#ffcc00');
          p.score += b.weapon === 'cannon' ? 30 : b.weapon === 'flame' ? 3 : b.weapon === 'machine' ? 10 : 5;
          p.wantedLevel = Math.min(5, p.wantedLevel + 1);
          if (p.wantedLevel >= 2 && gameState.police.length < p.wantedLevel * 2) spawnPolice();
          return false;
        }
      }
      for (let i = gameState.police.length - 1; i >= 0; i--) {
        const car = gameState.police[i];
        if (rectHit(b.x, b.y, car.x, car.y, car.type.w * car.size, car.type.h * car.size)) {
          hitCar(car, b.weapon);
          spawnParticles(b.x, b.y, 8, b.weapon === 'flame' ? '#f97316' : '#ff4455');
          p.score += b.weapon === 'cannon' ? 50 : b.weapon === 'flame' ? 5 : 20;
          return false;
        }
      }
    }
    return true;
  });

  // Update traffic
  gameState.traffic.forEach(car => {
    if (car.state==='destroyed') return;
    if (car.state==='burning') {
      car.burnTimer -= dt;
      // Enhanced fire and smoke particles
      if (Math.random() < 0.6) {
        const fx = car.x + (Math.random()-0.5)*car.type.w*car.size*0.8;
        const fy = car.y + (Math.random()-0.5)*car.type.h*car.size*0.3;
        spawnParticles(fx, fy, 1, Math.random()>0.4 ? '#ff4400' : '#ff8800');
      }
      if (Math.random() < 0.3) {
        const sx = car.x + (Math.random()-0.5)*car.type.w*car.size*0.6;
        const sy = car.y - car.type.h*car.size*0.3;
        gameState.particles.push({
          x: sx, y: sy,
          vx: (Math.random()-0.5)*15,
          vy: -40 - Math.random()*30,
          color: '#555',
          size: 6 + Math.random()*6,
          life: 1.2 + Math.random()*0.8,
          maxLife: 2,
          alpha: 0.6
        });
      }
      if (car.burnTimer<=0) car.state='destroyed';
      return;
    }
    if (car.state==='stopped') return;
    const spd = car.state==='slow'?car.speed*0.25:car.speed;
    
    // Aggressive AI: some cars chase the player or race
    if (car.isRacer && car.state==='driving') {
      const dx = p.x - car.x, dy = p.y - car.y;
      const distToPlayer = Math.hypot(dx, dy);
      // Racers try to get power-ups
      let nearestPU = null, puDist = 400;
      gameState.powerUps.forEach(pu => {
        const d = Math.hypot(pu.x - car.x, pu.y - car.y);
        if (d < puDist) { puDist = d; nearestPU = pu; }
      });
      if (nearestPU && puDist < 300) {
        const targetAngle = Math.atan2(nearestPU.x - car.x, -(nearestPU.y - car.y));
        let da = targetAngle - car.angle;
        while(da>Math.PI) da-=Math.PI*2;
        while(da<-Math.PI) da+=Math.PI*2;
        car.angle += Math.sign(da)*Math.min(Math.abs(da), 2.0*dt);
      } else if (distToPlayer < 500) {
        // Race alongside player
        const targetAngle = Math.atan2(dx, -dy);
        let da = targetAngle - car.angle;
        while(da>Math.PI) da-=Math.PI*2;
        while(da<-Math.PI) da+=Math.PI*2;
        car.angle += Math.sign(da)*Math.min(Math.abs(da), 1.5*dt);
      }
    }
    
    // Aggressive cars occasionally ram nearby traffic
    if (car.isAggressive && car.state==='driving') {
      const dx = p.x - car.x, dy = p.y - car.y;
      const distToPlayer = Math.hypot(dx, dy);
      if (distToPlayer < 600) {
        const targetAngle = Math.atan2(dx, -dy);
        let da = targetAngle - car.angle;
        while(da>Math.PI) da-=Math.PI*2;
        while(da<-Math.PI) da+=Math.PI*2;
        car.angle += Math.sign(da)*Math.min(Math.abs(da), 1.8*dt);
      }
    }
    
    const nx = car.x + Math.sin(car.angle)*spd*dt;
    const ny = car.y - Math.cos(car.angle)*spd*dt;
    let hitX = false, hitY = false;
    if (!isWall(nx, car.y, car.type.w*car.size*0.8, car.type.h*car.size*0.8)) {
      car.x = nx;
    } else {
      hitX = true;
    }
    if (!isWall(car.x, ny, car.type.w*car.size*0.8, car.type.h*car.size*0.8)) {
      car.y = ny;
    } else {
      hitY = true;
    }
    if (hitX || hitY) {
      car.angle += Math.PI/2 + (Math.random()-0.5)*0.5;
    }
  });

  // Player vs Traffic Collisions
  const pRadius = (p.type.w * p.size + p.type.h * p.size) / 4;
  gameState.traffic.forEach(car => {
    if (car.state === 'destroyed') return;
    const tRadius = (car.type.w * car.size + car.type.h * car.size) / 4;
    const dx = p.x - car.x;
    const dy = p.y - car.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const minDist = pRadius + tRadius;
    if (dist < minDist) {
      const overlap = minDist - dist;
      const nx = dx / (dist || 1);
      const ny = dy / (dist || 1);
      
      const targetPx = p.x + nx * overlap * 0.6;
      const targetPy = p.y + ny * overlap * 0.6;
      if (!isWall(targetPx, p.y, p.type.w*p.size, p.type.h*p.size)) p.x = targetPx;
      if (!isWall(p.x, targetPy, p.type.w*p.size, p.type.h*p.size)) p.y = targetPy;
      
      const targetCx = car.x - nx * overlap * 0.4;
      const targetCy = car.y - ny * overlap * 0.4;
      if (!isWall(targetCx, car.y, car.type.w*car.size, car.type.h*car.size)) car.x = targetCx;
      if (!isWall(car.x, targetCy, car.type.w*car.size, car.type.h*car.size)) car.y = targetCy;
      
      if (p.shieldTime > 0) {
        playExplosion();
        spawnParticles(car.x, car.y, 20, '#3b82f6');
        hitCar(car, 'cannon');
      } else {
        if (Math.abs(p.speed) > 30) {
          playCrash();
          spawnParticles((p.x + car.x)/2, (p.y + car.y)/2, 8, '#ffaa00');
          hitCar(car, 'pistol');
        }
        p.speed *= -0.3;
      }
    }
  });

  // Traffic vs Traffic Collisions
  for (let i = 0; i < gameState.traffic.length; i++) {
    const car1 = gameState.traffic[i];
    if (car1.state === 'destroyed') continue;
    const r1 = (car1.type.w * car1.size + car1.type.h * car1.size) / 4;
    for (let j = i + 1; j < gameState.traffic.length; j++) {
      const car2 = gameState.traffic[j];
      if (car2.state === 'destroyed') continue;
      const r2 = (car2.type.w * car2.size + car2.type.h * car2.size) / 4;
      const dx = car1.x - car2.x;
      const dy = car1.y - car2.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const minDist = r1 + r2;
      if (dist < minDist) {
        const overlap = minDist - dist;
        const nx = dx / (dist || 1);
        const ny = dy / (dist || 1);
        
        const targetC1x = car1.x + nx * overlap * 0.5;
        const targetC1y = car1.y + ny * overlap * 0.5;
        const targetC2x = car2.x - nx * overlap * 0.5;
        const targetC2y = car2.y - ny * overlap * 0.5;
        
        if (!isWall(targetC1x, car1.y, car1.type.w*car1.size, car1.type.h*car1.size)) car1.x = targetC1x;
        if (!isWall(car1.x, targetC1y, car1.type.w*car1.size, car1.type.h*car1.size)) car1.y = targetC1y;
        if (!isWall(targetC2x, car2.y, car2.type.w*car2.size, car2.type.h*car2.size)) car2.x = targetC2x;
        if (!isWall(car2.x, targetC2y, car2.type.w*car2.size, car2.type.h*car2.size)) car2.y = targetC2y;
        
        car1.angle += (Math.random() - 0.5) * 0.5;
        car2.angle += (Math.random() - 0.5) * 0.5;
        
        // Aggressive collisions cause damage
        const relSpeed = Math.abs(car1.speed - car2.speed);
        if (relSpeed > 30) {
          car1.hp -= 8;
          car2.hp -= 8;
          spawnParticles((car1.x+car2.x)/2, (car1.y+car2.y)/2, 6, '#ffaa00');
          playCrash();
          if (car1.hp <= 0) { car1.state = 'burning'; car1.burnTimer = 3; playExplosion(); }
          if (car2.hp <= 0) { car2.state = 'burning'; car2.burnTimer = 3; playExplosion(); }
        }
      }
    }
  }

  // Police AI
  gameState.police.forEach(pol => {
    if (pol.state==='destroyed') return;
    playSiren();
    const dx = p.x-pol.x, dy = p.y-pol.y;
    const targetAngle = Math.atan2(dx, -dy);
    let da = targetAngle - pol.angle;
    while(da>Math.PI) da-=Math.PI*2;
    while(da<-Math.PI) da+=Math.PI*2;
    pol.angle += Math.sign(da)*Math.min(Math.abs(da),2.5*dt);
    
    const currentSpeed = pol.speed * timeSpeedMultiplier;
    const pvx = Math.sin(pol.angle)*currentSpeed;
    const pvy = -Math.cos(pol.angle)*currentSpeed;
    const pnx = pol.x + pvx*dt;
    const pny = pol.y + pvy*dt;
    let hitX = false, hitY = false;
    
    if (!isWall(pnx, pol.y, pol.type.w*pol.size*0.8, pol.type.h*pol.size*0.8)) {
      pol.x = pnx;
    } else {
      hitX = true;
    }
    if (!isWall(pol.x, pny, pol.type.w*pol.size*0.8, pol.type.h*pol.size*0.8)) {
      pol.y = pny;
    } else {
      hitY = true;
    }
    
    if (hitX || hitY) {
      pol.angle += Math.PI/4 * (Math.random() > 0.5 ? 1 : -1);
    }

    // catch player?
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (dist < (p.type.w*p.size + pol.type.w*pol.size)*0.8) {
      if (p.shieldTime > 0) {
        pol.state = 'destroyed';
        playExplosion();
        spawnParticles(pol.x, pol.y, 25, '#3b82f6');
        p.score += 200;
      } else {
        damagePlayer(25);
        pol.speed = -40; // recoil
      }
    }
  });

  // Remove destroyed or far-away vehicles
  gameState.traffic = gameState.traffic.filter(c => {
    if (c.state === 'destroyed') return false;
    const dist = Math.hypot(c.x - p.x, c.y - p.y);
    return dist < 1600;
  });
  
  gameState.police = gameState.police.filter(c => {
    if (c.state === 'destroyed') return false;
    const dist = Math.hypot(c.x - p.x, c.y - p.y);
    return dist < 2000;
  });

  while (gameState.traffic.length < 20) {
    spawnTraffic();
  }

  // Particles
  gameState.particles.forEach(p => {
    p.x += p.vx*dt; p.y += p.vy*dt;
    p.vy += 50*dt;
    p.life -= dt; p.alpha = p.life/p.maxLife;
  });
  gameState.particles = gameState.particles.filter(p=>p.life>0);

  // Power-ups spawn, lifetime and collision update
  if (!gameState.powerUpSpawnTimer) gameState.powerUpSpawnTimer = 3;
  gameState.powerUpSpawnTimer -= dt;
  if (gameState.powerUpSpawnTimer <= 0) {
    spawnPowerUp();
    gameState.powerUpSpawnTimer = 3 + Math.random() * 4; // Spawn a power-up every 3-7 seconds
  }

  // Filter out expired power-ups
  gameState.powerUps = (gameState.powerUps || []).filter(pu => {
    return (Date.now() - pu.spawnTime) < pu.duration;
  });

  // Collision with player
  gameState.powerUps.forEach((pu, idx) => {
    const dist = Math.hypot(p.x - pu.x, p.y - pu.y);
    const colDist = pu.size + (p.type.w * p.size * 0.45);
    if (dist < colDist) {
      applyPowerUp(pu);
      onPowerUpCollected();
      // Spawn pickup particle sparkles
      for (let i = 0; i < 15; i++) {
        gameState.particles.push({
          x: pu.x, y: pu.y,
          vx: (Math.random() - 0.5) * 150,
          vy: (Math.random() - 0.5) * 150,
          color: pu.type === 'health' ? '#10b981' : pu.type === 'shield' ? '#3b82f6' : pu.type === 'nitro' ? '#f97316' : '#eab308',
          size: 2 + Math.random() * 3,
          life: 0.5,
          maxLife: 0.5,
          alpha: 1
        });
      }
      playPowerUpSound(pu.type);
      gameState.powerUps.splice(idx, 1);
    }
  });

  // Update lightning arcs life
  gameState.lightningArcs = gameState.lightningArcs.filter(arc => {
    arc.life -= dt;
    return arc.life > 0;
  });

  // Combo system
  if (gameState.comboTimer > 0) {
    gameState.comboTimer -= dt;
    if (gameState.comboTimer <= 0) {
      gameState.combo = 0;
    }
  }

  // Near-miss bonus (driving fast close to traffic without hitting)
  if (Math.abs(p.speed) > 100) {
    let nearMiss = false;
    gameState.traffic.forEach(car => {
      if (car.state === 'destroyed') return;
      const dist = Math.hypot(p.x - car.x, p.y - car.y);
      const minDist = (p.type.w * p.size + car.type.w * car.size) * 0.7;
      if (dist < minDist * 1.5 && dist > minDist * 0.6) {
        nearMiss = true;
      }
    });
    if (nearMiss) {
      gameState.nearMissTimer = (gameState.nearMissTimer || 0) + dt;
      if (gameState.nearMissTimer > 0.5) {
        p.score += 25;
        gameState.nearMissTimer = 0;
        spawnParticles(p.x, p.y, 5, '#eab308');
      }
    } else {
      gameState.nearMissTimer = 0;
    }
  }

  // Challenge system
  if (!gameState.challenges) gameState.challenges = [];
  if (!gameState.challengeTimer) gameState.challengeTimer = 5;
  if (!gameState.challengeIndex) gameState.challengeIndex = 0;
  
  gameState.challengeTimer -= dt;
  if (gameState.challengeTimer <= 0 && gameState.challenges.length === 0) {
    const challengeTypes = [
      { type: 'kill_peds', text: 'اقض على 5 مشاة!', target: 5, progress: 0, reward: 500, timeLimit: 30 },
      { type: 'destroy_cars', text: 'دمّر 3 سيارات!', target: 3, progress: 0, reward: 600, timeLimit: 25 },
      { type: 'collect_powerups', text: 'اجمع 3 جوائز!', target: 3, progress: 0, reward: 400, timeLimit: 35 },
      { type: 'survive', text: 'ابقَ حياً 20 ثانية!', target: 20, progress: 0, reward: 700, timeLimit: 20 },
      { type: 'reach_speed', text: 'صل لسرعة 200!', target: 200, progress: 0, reward: 300, timeLimit: 15 },
      { type: 'kill_police', text: 'اقض على 2 شرطة!', target: 2, progress: 0, reward: 800, timeLimit: 25 },
      { type: 'drift', text: 'انعطف بسرعة عالية 4 مرات!', target: 4, progress: 0, reward: 500, timeLimit: 20 },
    ];
    const idx = gameState.challengeIndex % challengeTypes.length;
    gameState.challengeIndex++;
    const ch = { ...challengeTypes[idx], startTime: Date.now() };
    gameState.challenges.push(ch);
    gameState.challengeTimer = 15 + Math.random() * 10;
  }

  // Update challenge progress
  gameState.challenges = gameState.challenges.filter(ch => {
    const elapsed = (Date.now() - ch.startTime) / 1000;
    if (elapsed > ch.timeLimit) {
      const el = document.getElementById('challenge-display');
      if (el) { el.style.display = 'none'; }
      return false;
    }
    
    if (ch.type === 'survive') {
      ch.progress = Math.min(ch.target, Math.floor(elapsed));
    }
    if (ch.type === 'reach_speed') {
      ch.progress = Math.max(ch.progress, Math.abs(p.speed));
    }
    if (ch.type === 'drift') {
      if (Math.abs(p.speed) > 120 && (keys['ArrowLeft'] || keys['ArrowRight'] || keys['KeyA'] || keys['KeyD'] || tk['left'] || tk['right'])) {
        ch._driftAccum = (ch._driftAccum || 0) + dt;
        if (ch._driftAccum > 1.0) {
          ch.progress++;
          ch._driftAccum = 0;
        }
      }
    }
    
    if (ch.progress >= ch.target) {
      p.score += ch.reward;
      spawnParticles(p.x, p.y, 20, '#f5c518');
      playPowerUpSound('score');
      const el = document.getElementById('challenge-display');
      if (el) { el.style.display = 'none'; }
      return false;
    }
    
    const el = document.getElementById('challenge-display');
    if (el) {
      el.style.display = 'block';
      document.getElementById('challenge-text').textContent = ch.text;
      const remaining = Math.ceil(ch.timeLimit - elapsed);
      document.getElementById('challenge-progress').textContent = `${Math.min(ch.progress, ch.target)}/${ch.target} | ${remaining}ث | جائزة: ${ch.reward}`;
    }
    
    return true;
  });

  // Update and clean up pedestrians
  const now = Date.now();
  gameState.pedestrians = gameState.pedestrians.filter(ped => {
    if (ped.state === 'splatted') {
      // Keep blood on the road for 15 seconds
      return (now - (ped.deathTime || 0)) < 15000;
    }
    const dist = Math.hypot(ped.x - p.x, ped.y - p.y);
    return dist < 1300;
  });

  if (gameState.pedestrians.length < 60 && Math.random() < 0.35) {
    spawnPedestrian();
  }
  gameState.pedestrians.forEach(ped => {
    if (ped.state === 'dead' || ped.state === 'splatted') return;
    
    // Leg swing walking animation
    ped.legSwing += 8 * dt;
    
    // Direction vector
    const vx = Math.sin(ped.angle) * ped.speed;
    const vy = -Math.cos(ped.angle) * ped.speed;
    
    const nx = ped.x + vx * dt;
    const ny = ped.y + vy * dt;
    
    // Collide with buildings
    if (!isWall(nx, ny, 8, 8)) {
      ped.x = nx;
      ped.y = ny;
      if (Math.random() < 0.005) {
        ped.angle += (Math.random() - 0.5) * Math.PI;
      }
    } else {
      // Turn around
      ped.angle += Math.PI + (Math.random() - 0.5) * Math.PI / 2;
    }
    
    // Run away if player or police or traffic approaches fast
    let panic = false;
    const carsToCheck = [gameState.player, ...gameState.traffic, ...gameState.police];
    for (const car of carsToCheck) {
      if (car.state === 'destroyed') continue;
      const spd = car.speed !== undefined ? Math.abs(car.speed) : 0;
      if (spd > 40) {
        const dist = Math.hypot(ped.x - car.x, ped.y - car.y);
        if (dist < 120) {
          panic = true;
          // run away
          ped.angle = Math.atan2(ped.x - car.x, ped.y - car.y);
          ped.speed = 95;
          break;
        }
      }
    }
    if (!panic) {
      ped.speed = 30 + Math.random() * 20;
    }

    // Hostile Pedestrian Shooting AI
    if (ped.isHostile) {
      ped.shootCooldown -= dt;
      const targets = [gameState.player, ...gameState.traffic, ...gameState.police].filter(car => car && car.state !== 'destroyed');
      let closestTarget = null;
      let minDist = 250;
      targets.forEach(car => {
        const d = Math.hypot(ped.x - car.x, ped.y - car.y);
        if (d < minDist) {
          minDist = d;
          closestTarget = car;
        }
      });
      
      // Also target other hostile pedestrians (gang warfare)
      if (!closestTarget || minDist > 150) {
        gameState.pedestrians.forEach(otherPed => {
          if (otherPed === ped || otherPed.state === 'dead' || otherPed.state === 'splatted') return;
          if (otherPed.isHostile && otherPed.color !== ped.color) {
            const d = Math.hypot(ped.x - otherPed.x, ped.y - otherPed.y);
            if (d < minDist) {
              minDist = d;
              closestTarget = otherPed;
            }
          }
        });
      }
      
      if (closestTarget) {
        const targetAngle = Math.atan2(closestTarget.x - ped.x, closestTarget.y - ped.y);
        ped.angle = targetAngle;
        ped.speed = 0;
        
        if (ped.shootCooldown <= 0) {
          ped.shootCooldown = 0.8 + Math.random() * 1.0;
          
          const angle = targetAngle;
          const spd = 360;
          const vx = Math.sin(angle) * spd;
          const vy = -Math.cos(angle) * spd;
          
          const isPedTarget = closestTarget.legSwing !== undefined;
          
          gameState.bullets.push({
            x: ped.x + Math.sin(angle) * 12,
            y: ped.y - Math.cos(angle) * 12,
            vx: vx,
            vy: vy,
            weapon: 'pistol',
            life: 1.2,
            size: 3.5,
            color: '#ffbb00',
            fromPedestrian: true,
            fromPedId: ped.id
          });
          
          playShoot('pistol');
        }
      }
    }
  });

  // Check pedestrian vs car collisions (run over)
  const cars = [gameState.player, ...gameState.traffic, ...gameState.police];
  gameState.pedestrians.forEach(ped => {
    if (ped.state === 'dead' || ped.state === 'splatted') return;
    for (const car of cars) {
      if (car.state === 'destroyed') continue;
      const carRadius = car === gameState.player ? 26 : 22;
      if (Math.hypot(ped.x - car.x, ped.y - car.y) < carRadius) {
        ped.state = 'splatted';
        ped.deathTime = Date.now();
        playSquishSound();
        spawnParticles(ped.x, ped.y, 15, '#ef4444');
        if (car === gameState.player) {
          p.score += 50;
          p.wantedLevel = Math.min(5, p.wantedLevel + 1);
          onPedKilled();
        }
        break;
      }
    }
  });
}

function spawnPowerUp() {
  if (!gameState || (gameState.powerUps || []).length >= 12) return;
  const p = gameState.player;
  const pChunkX = Math.floor(p.x / 1280);
  const pChunkY = Math.floor(p.y / 1280);
  
  // Pick a random chunk near the player
  const cx = pChunkX + Math.floor(Math.random() * 3 - 1);
  const cy = pChunkY + Math.floor(Math.random() * 3 - 1);
  const key = `${cx},${cy}`;
  
  if (!gameState.chunks[key]) {
    generateChunk(cx, cy);
  }
  
  const chunk = gameState.chunks[key];
  const roadTiles = [];
  for (let r = 0; r < 16; r++) {
    for (let c = 0; c < 16; c++) {
      if (chunk.map[r][c] === 1) roadTiles.push({ r, c });
    }
  }
  
  if (roadTiles.length > 0) {
    const tile = roadTiles[Math.floor(Math.random() * roadTiles.length)];
    const px = cx * 1280 + tile.c * 80 + 40 + (Math.random() - 0.5) * 20;
    const py = cy * 1280 + tile.r * 80 + 40 + (Math.random() - 0.5) * 20;
    
    const dist = Math.hypot(px - p.x, py - p.y);
    if (dist > 150) {
      const types = ['health', 'shield', 'nitro', 'score', 'electro', 'flame'];
      const type = types[Math.floor(Math.random() * types.length)];
      gameState.powerUps.push({
        id: Math.random(),
        x: px, y: py,
        type: type,
        spawnTime: Date.now(),
        duration: 18000 + Math.random() * 7000,
        size: 16
      });
    }
  }
}

function applyPowerUp(pu) {
  if (!gameState) return;
  const p = gameState.player;
  if (pu.type === 'health') {
    // Wanted Level decrease & Health Restore
    p.wantedLevel = Math.max(0, p.wantedLevel - 1);
    p.hp = 100;
    p.score += 100;
  } else if (pu.type === 'shield') {
    p.shieldTime = 10;
  } else if (pu.type === 'nitro') {
    p.nitroTime = 6;
  } else if (pu.type === 'score') {
    p.score += 500;
  } else if (pu.type === 'electro') {
    if (!p.weapons.includes('electro')) p.weapons.push('electro');
    p.ammo.electro = (p.ammo.electro || 0) + 40;
    p.activeWeapon = p.weapons.indexOf('electro');
  } else if (pu.type === 'flame') {
    if (!p.weapons.includes('flame')) p.weapons.push('flame');
    p.ammo.flame = (p.ammo.flame || 0) + 80;
    p.activeWeapon = p.weapons.indexOf('flame');
  }
}

function playPowerUpSound(type) {
  if (typeof audioCtx === 'undefined' || !audioCtx) return;
  const t = audioCtx.currentTime;
  if (type === 'health') {
    playTone(330, 0.1, 'sine', 0.15);
    setTimeout(() => playTone(440, 0.1, 'sine', 0.15), 100);
    setTimeout(() => playTone(554, 0.15, 'sine', 0.15), 200);
  } else if (type === 'shield') {
    try {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(800, t + 0.3);
      g.gain.setValueAtTime(0.15, t);
      g.gain.linearRampToValueAtTime(0.001, t + 0.3);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(); osc.stop(t + 0.3);
    } catch(e) {}
  } else if (type === 'nitro') {
    playTone(400, 0.08, 'sawtooth', 0.15);
    setTimeout(() => playTone(600, 0.08, 'sawtooth', 0.15), 80);
    setTimeout(() => playTone(900, 0.12, 'sawtooth', 0.15), 160);
  } else if (type === 'score') {
    playTone(987, 0.08, 'sine', 0.12);
    setTimeout(() => playTone(1318, 0.2, 'sine', 0.12), 80);
  } else if (type === 'electro') {
    playTone(600, 0.1, 'sawtooth', 0.15);
    setTimeout(() => playTone(800, 0.1, 'sawtooth', 0.15), 100);
    setTimeout(() => playTone(1000, 0.15, 'sawtooth', 0.15), 200);
  } else if (type === 'flame') {
    playTone(200, 0.15, 'sawtooth', 0.18);
    setTimeout(() => playTone(300, 0.15, 'sawtooth', 0.18), 100);
  }
}

function drawPowerUps() {
  if (!gameState || !gameState.powerUps) return;
  gameState.powerUps.forEach(pu => {
    const age = Date.now() - pu.spawnTime;
    const timeLeft = pu.duration - age;
    if (timeLeft < 3000 && Math.floor(timeLeft / 150) % 2 === 0) {
      return;
    }
    
    ctx.save();
    ctx.translate(pu.x, pu.y);
    const hover = Math.sin(Date.now() * 0.005) * 4;
    ctx.translate(0, hover);

    let color = '#3b82f6';
    let icon = '🎁';
    let label = '';
    if (pu.type === 'health') { color = '#10b981'; icon = '🔧'; label = 'صحة'; }
    else if (pu.type === 'shield') { color = '#3b82f6'; icon = '🛡️'; label = 'درع'; }
    else if (pu.type === 'nitro') { color = '#f97316'; icon = '⚡'; label = 'نيترو'; }
    else if (pu.type === 'score') { color = '#eab308'; icon = '💰'; label = 'جائزة'; }
    else if (pu.type === 'electro') { color = '#a855f7'; icon = '🔌'; label = 'كهرباء'; }
    else if (pu.type === 'flame') { color = '#ef4444'; icon = '🔥'; label = 'نار'; }

    // Outer glow ring
    ctx.shadowColor = color;
    ctx.shadowBlur = 15 + Math.sin(Date.now() * 0.01) * 5;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(0, 0, pu.size + 4, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Spinning dashed ring
    const rot = (Date.now() * 0.002) % (Math.PI*2);
    ctx.save();
    ctx.rotate(rot);
    ctx.setLineDash([6, 6]);
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, pu.size + 8, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Background circle
    const bgGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, pu.size);
    bgGrad.addColorStop(0, 'rgba(30, 41, 59, 0.95)');
    bgGrad.addColorStop(1, 'rgba(15, 23, 42, 0.9)');
    ctx.fillStyle = bgGrad;
    ctx.beginPath();
    ctx.arc(0, 0, pu.size, 0, Math.PI*2);
    ctx.fill();

    // Colored border
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(0, 0, pu.size, 0, Math.PI*2);
    ctx.stroke();

    // Star shape behind icon for score type
    if (pu.type === 'score') {
      ctx.save();
      ctx.rotate(rot * 0.5);
      ctx.fillStyle = 'rgba(234, 179, 8, 0.3)';
      ctx.beginPath();
      for (let si = 0; si < 5; si++) {
        const sa = (si * 2 * Math.PI / 5) - Math.PI/2;
        const sr = pu.size * 0.8;
        const ir = pu.size * 0.35;
        ctx.lineTo(Math.cos(sa) * sr, Math.sin(sa) * sr);
        const ma = sa + Math.PI / 5;
        ctx.lineTo(Math.cos(ma) * ir, Math.sin(ma) * ir);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // Icon
    ctx.fillStyle = '#fff';
    ctx.font = '15px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(icon, 0, -1);

    // Label below
    ctx.fillStyle = color;
    ctx.font = 'bold 7px Cairo, Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(label, 0, pu.size + 10);

    // Arrow pointing down to power-up
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.4 + Math.sin(Date.now() * 0.008) * 0.3;
    ctx.beginPath();
    ctx.moveTo(0, -pu.size - 12);
    ctx.lineTo(-5, -pu.size - 6);
    ctx.lineTo(5, -pu.size - 6);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.restore();
  });
}

let lastFireTime = {};
function fireBullet(weapon) {
  if (!gameState) return;
  const p = gameState.player;
  if (!p.weapons.length) return;
  const w = weapon || p.weapons[p.activeWeapon] || p.weapons[0];
  const now = performance.now();
  const cooldowns = {pistol:400, machine:100, cannon:1200, electro:180, flame:50};
  const cd = cooldowns[w]||400;
  if ((now-(lastFireTime[w]||0)) < cd) return;
  lastFireTime[w] = now;
  playShoot(w);

  // Decrement limited ammo
  if (p.ammo && p.ammo[w] !== undefined && p.ammo[w] !== Infinity) {
    p.ammo[w] = Math.max(0, p.ammo[w] - 1);
    if (p.ammo[w] <= 0) {
      // Remove weapon from list and switch back
      const idx = p.weapons.indexOf(w);
      if (idx !== -1) {
        p.weapons.splice(idx, 1);
        p.activeWeapon = Math.max(0, p.activeWeapon - 1);
      }
    }
  }

  const spawnDist = p.type.h * p.size * 0.5;
  const startX = p.x + Math.sin(p.angle) * spawnDist;
  const startY = p.y - Math.cos(p.angle) * spawnDist;

  if (w === 'electro') {
    // Target nearest 3 enemies (police, traffic, pedestrians) in 220px range
    const targets = [];
    const maxZapDist = 220;
    
    gameState.police.forEach(pol => {
      if (pol.state !== 'destroyed' && Math.hypot(p.x - pol.x, p.y - pol.y) < maxZapDist) {
        targets.push({ type: 'car', obj: pol, dist: Math.hypot(p.x - pol.x, p.y - pol.y) });
      }
    });
    gameState.traffic.forEach(car => {
      if (car.state !== 'destroyed' && Math.hypot(p.x - car.x, p.y - car.y) < maxZapDist) {
        targets.push({ type: 'car', obj: car, dist: Math.hypot(p.x - car.x, p.y - car.y) });
      }
    });
    gameState.pedestrians.forEach(ped => {
      if (ped.state !== 'dead' && ped.state !== 'splatted' && Math.hypot(p.x - ped.x, p.y - ped.y) < maxZapDist) {
        targets.push({ type: 'ped', obj: ped, dist: Math.hypot(p.x - ped.x, p.y - ped.y) });
      }
    });
    
    targets.sort((a, b) => a.dist - b.dist);
    const zaps = targets.slice(0, 3);
    
    zaps.forEach(target => {
      gameState.lightningArcs.push({
        fromX: startX, fromY: startY,
        toX: target.obj.x, toY: target.obj.y,
        life: 0.15
      });
      
      if (target.type === 'car') {
        hitCar(target.obj, 'electro');
        spawnParticles(target.obj.x, target.obj.y, 4, '#c084fc');
      } else {
        target.obj.state = 'splatted';
        target.obj.deathTime = Date.now();
        playSquishSound();
        spawnParticles(target.obj.x, target.obj.y, 6, '#c084fc');
        p.score += 50;
        if (Math.random() < 0.25) {
          p.wantedLevel = Math.min(5, p.wantedLevel + 1);
        }
      }
    });
    return;
  }

  if (w === 'flame') {
    const a = p.angle + (Math.random() - 0.5) * 0.25;
    const spd = 320 + Math.random() * 80;
    const wx = Math.sin(a) * spd, wy = -Math.cos(a) * spd;
    
    gameState.bullets.push({
      x: startX, y: startY,
      vx: wx + p.vx * 0.3, vy: wy + p.vy * 0.3,
      weapon: 'flame',
      life: 0.45,
      size: 6 + Math.random() * 8,
      color: Math.random() > 0.4 ? '#f97316' : '#ef4444'
    });
    return;
  }

  const speeds = {pistol:500, machine:600, cannon:400};
  const count = w==='machine'?3:1;
  const spread = w==='machine'?0.12:0;
  for(let i=0;i<count;i++) {
    const a = p.angle + (Math.random()-0.5)*spread;
    const spd = speeds[w]+(Math.random()-0.5)*50;
    const wx = Math.sin(a)*spd, wy=-Math.cos(a)*spd;
    gameState.bullets.push({
      x:startX, y:startY,
      vx:wx+p.vx*0.3, vy:wy+p.vy*0.3,
      weapon:w,
      life: w==='cannon'?2.5:1.5,
      size: w==='cannon'?8:w==='machine'?3:4,
      color: w==='cannon'?'#ff6600':w==='machine'?'#ffff00':'#ffdd00',
    });
  }
}

function hitCar(car, weapon) {
  const dmg = {pistol:15, machine:25, cannon:100, electro:30, flame:6}[weapon]||15;
  car.hp = Math.max(0, car.hp - dmg);
  if (car.hp<=0) {
    playExplosion();
    spawnParticles(car.x, car.y, 20, '#ff4400');
    if (weapon==='cannon') { car.state='destroyed'; }
    else if (weapon==='machine') { car.state='burning'; car.burnTimer=3; }
    else if (weapon==='flame') { car.state='burning'; car.burnTimer=4; }
    else { car.state='slow'; }
    onCarDestroyed();
    // Check if it's a police car
    if (gameState.police.includes(car)) onPoliceKilled();
  } else {
    if (weapon==='cannon') { car.state='burning'; car.burnTimer=2; playCrash(); }
    else if (weapon==='flame') { car.state='burning'; car.burnTimer=3; }
    else if (weapon==='electro') { car.state='slow'; }
    else { car.state='slow'; }
  }
}

function spawnParticles(x, y, n, color) {
  for(let i=0;i<n;i++) {
    const angle = Math.random()*Math.PI*2;
    const spd = 30+Math.random()*120;
    gameState.particles.push({
      x, y,
      vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
      life: 0.3+Math.random()*0.7, maxLife:1,
      alpha:1, color,
      size: 2+Math.random()*5,
    });
  }
}

function onPedKilled() {
  if (!gameState) return;
  gameState.combo = (gameState.combo || 0) + 1;
  gameState.comboTimer = 3;
  const bonus = Math.floor(50 * (1 + (gameState.combo - 1) * 0.5));
  gameState.player.score += Math.max(0, bonus - 50);
  gameState.challenges.forEach(ch => {
    if (ch.type === 'kill_peds') ch.progress++;

function onCarDestroyed() {

function onPoliceKilled() {

function onPowerUpCollected() {

function isWall(x, y, w, h) {
  const chunkCol = Math.floor(x / 1280);
  const chunkRow = Math.floor(y / 1280);
  
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const key = `${chunkCol + dx},${chunkRow + dy}`;
      const chunk = gameState.chunks[key];
      if (!chunk) continue;
      
      // 1. Check building rectangles
      for (const b of chunk.buildings) {
        const marginX = w / 2;
        const marginY = h / 2;
        if (x >= b.x - marginX && x <= b.x + b.w + marginX &&
            y >= b.y - marginY && y <= b.y + b.h + marginY) {
          return true;
        }
      }
      
      // 2. Check park ponds (square) and trees
      for (const p of chunk.parks) {
        // Square pond collision
        const pr = p.pond.r + w/3;
        if (x >= p.pond.x - pr && x <= p.pond.x + pr &&
            y >= p.pond.y - pr && y <= p.pond.y + pr) return true;
        
        for (const t of p.trees) {
          const distToTree = Math.hypot(x - t.x, y - t.y);
          if (distToTree < 16 + w/3) return true;
        }
      }
      
      // 3. Check roundabout center islands
      let hasRoundabout = false;
      for (let r = 7; r <= 8; r++) {
        for (let c = 7; c <= 8; c++) {
          if (chunk.map[r][c] === 3 || chunk.map[r][c] === 4) {
            hasRoundabout = true;
          }
        }
      }
      if (hasRoundabout) {
        const centerX = (chunkCol + dx) * 1280 + 7.5 * 80;
        const centerY = (chunkRow + dy) * 1280 + 7.5 * 80;
        const innerR = 40;
        const distToCenter = Math.hypot(x - centerX, y - centerY);
        if (distToCenter < innerR + w/3) return true;
      }
    }
  }
  return false;
}

function rectHit(bx, by, cx, cy, cw, ch) {
  return bx>cx-cw/2 && bx<cx+cw/2 && by>cy-ch/2 && by<cy+ch/2;
}

function damagePlayer(amount) {
  if (!gameState || !gameState.player.alive) return;
  const p = gameState.player;
  if (p.shieldTime > 0) return; // Shield blocks all damage
  p.hp = Math.max(0, p.hp - amount);
  spawnParticles(p.x, p.y, 6, '#ef4444');
  if (audioCtx) playTone(140, 0.08, 'sawtooth', 0.2);
  if (p.hp <= 0) {
    gameOver();
  }
}

function gameOver() {
  if (!gameState) return;
  gameState.player.alive = false;
  gameState.phase = 'gameover';
  gameRunning = false;
  playExplosion();
  document.getElementById('final-score').textContent = gameState.player.score;
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('touch-controls').classList.add('hidden');
  document.getElementById('gameover-screen').classList.remove('hidden');
}

function restartGame() {
  hideAll();
  startGame();
}

// ==================== RENDER ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function render() {
  if (!gameState) return;
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.width / dpr;
  const cssH = canvas.height / dpr;
  ctx.clearRect(0,0,cssW,cssH);
  const p = gameState.player;
  // Camera: center on player
  const camX = p.x - cssW/2;
  const camY = p.y - cssH/2;

  ctx.save();
  ctx.translate(-camX, -camY);

  // Draw world
  drawWorld(camX, camY);

  // Pedestrians (drawn on ground under cars)
  drawPedestrians();

  // Traffic
  gameState.traffic.forEach(car => drawCar(car, false));
  // Police
  gameState.police.forEach(pol => drawPolice(pol));
  // Power-ups
  drawPowerUps();
  // Player
  if (p.alive) drawPlayer(p);
  // Bullets
  drawBullets();
  // Particles
  drawParticles();
  // Lightning arcs (drawn on top)
  drawLightningArcs();

  ctx.restore();
}

function drawWorld(camX, camY) {
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.width / dpr;
  const cssH = canvas.height / dpr;
  
  // Identify visible chunks
  const startChunkX = Math.floor(camX / 1280);
  const endChunkX   = Math.floor((camX + cssW) / 1280);
  const startChunkY = Math.floor(camY / 1280);
  const endChunkY   = Math.floor((camY + cssH) / 1280);

  const getTile = (ccx, ccy, row, col) => {
    if (row < 0) { row = 15; ccy--; }
    else if (row > 15) { row = 0; ccy++; }
    if (col < 0) { col = 15; ccx--; }
    else if (col > 15) { col = 0; ccx++; }
    const k = `${ccx},${ccy}`;
    return gameState.chunks[k] ? gameState.chunks[k].map[row][col] : 0;
  };

  const drawFence = (x1, y1, x2, y2) => {
    ctx.save();
    // Fence shadow
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 3.5;
    ctx.beginPath();
    ctx.moveTo(x1 + 3, y1 + 3);
    ctx.lineTo(x2 + 3, y2 + 3);
    ctx.stroke();
    
    // Fence rail
    ctx.strokeStyle = '#475569';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    
    // Vertical poles
    ctx.strokeStyle = '#64748b';
    ctx.lineWidth = 1.2;
    const len = Math.hypot(x2 - x1, y2 - y1);
    const steps = Math.floor(len / 8);
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const bx = x1 + (x2 - x1) * t;
      const by = y1 + (y2 - y1) * t;
      const px = -(y2 - y1) / len * 7;
      const py = (x2 - x1) / len * 7;
      ctx.beginPath();
      ctx.moveTo(bx, by);
      ctx.lineTo(bx + px, by + py);
      ctx.stroke();
    }
    ctx.restore();
  };

  // 1. Draw visible ground tiles (roads, sidewalks, grass)
  for (let cy = startChunkY; cy <= endChunkY; cy++) {
    for (let cx = startChunkX; cx <= endChunkX; cx++) {
      const key = `${cx},${cy}`;
      if (!gameState.chunks[key]) {
        generateChunk(cx, cy);
      }
      const chunk = gameState.chunks[key];
      const chunkX = cx * 1280;
      const chunkY = cy * 1280;
      
      for (let r = 0; r < 16; r++) {
        for (let c = 0; c < 16; c++) {
          const tile = chunk.map[r][c];
          const tx = chunkX + c * 80;
          const ty = chunkY + r * 80;
          
          if (tile === 0) {
            ctx.fillStyle = '#1e3a24'; // Grass
            ctx.fillRect(tx, ty, 80, 80);
            
            // Draw subtle grass blades
            const seed = Math.abs(tx * 33 + ty * 73) % 100;
            ctx.fillStyle = '#14532d';
            if (seed % 3 === 0) {
              ctx.fillRect(tx + 20, ty + 20, 2, 6);
              ctx.fillRect(tx + 22, ty + 18, 2, 8);
            } else if (seed % 3 === 1) {
              ctx.fillRect(tx + 50, ty + 50, 2, 8);
              ctx.fillRect(tx + 52, ty + 48, 2, 6);
            }
          } else if (tile === 1) {
            ctx.fillStyle = ROAD_COLOR;
            ctx.fillRect(tx, ty, 80, 80);
            
            // Curbs (dark borders separating road from sidewalks/grass)
            ctx.strokeStyle = '#253335';
            ctx.lineWidth = 6;
            
            if (getTile(cx, cy, r - 1, c) !== 1) {
              ctx.beginPath(); ctx.moveTo(tx, ty + 3); ctx.lineTo(tx + 80, ty + 3); ctx.stroke();
            }
            if (getTile(cx, cy, r + 1, c) !== 1) {
              ctx.beginPath(); ctx.moveTo(tx, ty + 77); ctx.lineTo(tx + 80, ty + 77); ctx.stroke();
            }
            if (getTile(cx, cy, r, c - 1) !== 1) {
              ctx.beginPath(); ctx.moveTo(tx + 3, ty); ctx.lineTo(tx + 3, ty + 80); ctx.stroke();
            }
            if (getTile(cx, cy, r, c + 1) !== 1) {
              ctx.beginPath(); ctx.moveTo(tx + 77, ty); ctx.lineTo(tx + 77, ty + 80); ctx.stroke();
            }
            
            // Vertical road lanes
            if (c === 7 || c === 8) {
              ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
              ctx.lineWidth = 2.5;
              ctx.setLineDash([12, 12]);
              ctx.beginPath();
              ctx.moveTo(tx + 40, ty);
              ctx.lineTo(tx + 40, ty + 80);
              ctx.stroke();
              ctx.setLineDash([]);
            }
            // Horizontal road lanes
            if (r === 7 || r === 8) {
              ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
              ctx.lineWidth = 2.5;
              ctx.setLineDash([12, 12]);
              ctx.beginPath();
              ctx.moveTo(tx, ty + 40);
              ctx.lineTo(tx + 80, ty + 40);
              ctx.stroke();
              ctx.setLineDash([]);
            }
          } else if (tile === 2) {
            ctx.fillStyle = SIDEWALK_COLOR;
            ctx.fillRect(tx, ty, 80, 80);
            
            // 4x4 stone tile grid grout lines
            ctx.strokeStyle = '#bfa57f';
            ctx.lineWidth = 1.5;
            for (let i = 20; i < 80; i += 20) {
              ctx.beginPath(); ctx.moveTo(tx + i, ty); ctx.lineTo(tx + i, ty + 80); ctx.stroke();
              ctx.beginPath(); ctx.moveTo(tx, ty + i); ctx.lineTo(tx + 80, ty + i); ctx.stroke();
            }

            // Draw fences at boundaries
            if (getTile(cx, cy, r - 1, c) === 0) drawFence(tx, ty, tx + 80, ty);
            if (getTile(cx, cy, r + 1, c) === 0) drawFence(tx, ty + 80, tx + 80, ty + 80);
            if (getTile(cx, cy, r, c - 1) === 0) drawFence(tx, ty, tx, ty + 80);
            if (getTile(cx, cy, r, c + 1) === 0) drawFence(tx + 80, ty, tx + 80, ty + 80);
          } else if (tile === 3 || tile === 4) {
            ctx.fillStyle = ROAD_COLOR;
            ctx.fillRect(tx, ty, 80, 80);
          }
        }
      }
    }
  }

  // 2. Draw visible park layouts (ponds, trees)
  for (let cy = startChunkY; cy <= endChunkY; cy++) {
    for (let cx = startChunkX; cx <= endChunkX; cx++) {
      const key = `${cx},${cy}`;
      const chunk = gameState.chunks[key];
      if (!chunk) continue;
      
      chunk.parks.forEach(park => {
        const pr = park.pond.r;
        const px = park.pond.x - pr, py = park.pond.y - pr;
        const ps = pr * 2;
        ctx.save();

        // Stone border (square)
        ctx.fillStyle = '#64748b';
        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(px - 5, py - 5, ps + 10, ps + 10, 4);
        ctx.fill(); ctx.stroke();

        // Water fill (square pool with gradient)
        const pGrad = ctx.createLinearGradient(px, py, px + ps, py + ps);
        pGrad.addColorStop(0,   '#38bdf8');
        pGrad.addColorStop(0.5, '#0284c7');
        pGrad.addColorStop(1,   '#075985');
        ctx.fillStyle = pGrad;
        ctx.beginPath();
        ctx.roundRect(px, py, ps, ps, 3);
        ctx.fill();

        // Pool lane lines
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1.5;
        for (let ly2 = py + ps*0.25; ly2 < py + ps - 4; ly2 += ps * 0.25) {
          ctx.beginPath(); ctx.moveTo(px + 3, ly2); ctx.lineTo(px + ps - 3, ly2); ctx.stroke();
        }

        // Water shine
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.beginPath();
        ctx.roundRect(px + 4, py + 4, ps * 0.4, 4, 2);
        ctx.fill();

        ctx.restore();
        
        // Draw Trees
        park.trees.forEach(t => {
          ctx.save();
          ctx.shadowColor = 'rgba(0,0,0,0.3)';
          ctx.shadowBlur = 4;
          ctx.shadowOffsetY = 4;
          
          ctx.fillStyle = '#78350f';
          ctx.beginPath();
          ctx.arc(t.x, t.y, 6, 0, Math.PI*2);
          ctx.fill();
          
          ctx.shadowColor = 'transparent';
          ctx.fillStyle = '#15803d';
          ctx.beginPath();
          ctx.arc(t.x, t.y, 16, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = '#22c55e';
          ctx.beginPath();
          ctx.arc(t.x - 3, t.y - 3, 10, 0, Math.PI*2);
          ctx.fill();
          ctx.restore();
        });
      });
    }
  }

  // 2.5 Draw roundabouts at intersections
  for (let cy = startChunkY; cy <= endChunkY; cy++) {
    for (let cx = startChunkX; cx <= endChunkX; cx++) {
      const key = `${cx},${cy}`;
      const chunk = gameState.chunks[key];
      if (!chunk) continue;
      
      // Check if this chunk has roundabout center tiles (type 3 or 4)
      let hasRoundabout = false;
      let roundaboutType = 0;
      for (let r = 7; r <= 8; r++) {
        for (let c = 7; c <= 8; c++) {
          if (chunk.map[r][c] === 3 || chunk.map[r][c] === 4) {
            hasRoundabout = true;
            roundaboutType = chunk.map[r][c];
          }
        }
      }
      
      if (hasRoundabout) {
        const centerX = cx * 1280 + 7.5 * 80;
        const centerY = cy * 1280 + 7.5 * 80;
        const outerR = 75;
        const innerR = 40;
        
        ctx.save();
        
        // Outer curb ring
        ctx.fillStyle = '#64748b';
        ctx.beginPath();
        ctx.arc(centerX, centerY, outerR + 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Road ring (drivable circle)
        ctx.fillStyle = ROAD_COLOR;
        ctx.beginPath();
        ctx.arc(centerX, centerY, outerR, 0, Math.PI * 2);
        ctx.fill();
        
        // Circular lane arrows
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.arc(centerX, centerY, (outerR + innerR) / 2, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        
        // Direction arrows on the ring
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        const arrowAngles = [0, Math.PI/2, Math.PI, Math.PI*1.5];
        const arrowR = (outerR + innerR) / 2;
        arrowAngles.forEach(a => {
          ctx.save();
          ctx.translate(centerX + Math.cos(a) * arrowR, centerY + Math.sin(a) * arrowR);
          ctx.rotate(a + Math.PI/2);
          ctx.beginPath();
          ctx.moveTo(0, -5);
          ctx.lineTo(4, 2);
          ctx.lineTo(-4, 2);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        });
        
        // Inner island curb
        ctx.fillStyle = '#475569';
        ctx.beginPath();
        ctx.arc(centerX, centerY, innerR + 4, 0, Math.PI * 2);
        ctx.fill();
        
        if (roundaboutType === 3) {
          // Green island with small tree
          ctx.fillStyle = '#1e3a24';
          ctx.beginPath();
          ctx.arc(centerX, centerY, innerR, 0, Math.PI * 2);
          ctx.fill();
          
          // Small decorative tree
          ctx.fillStyle = '#78350f';
          ctx.beginPath();
          ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#15803d';
          ctx.beginPath();
          ctx.arc(centerX, centerY, 14, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#22c55e';
          ctx.beginPath();
          ctx.arc(centerX - 3, centerY - 3, 9, 0, Math.PI * 2);
          ctx.fill();
          
          // Flowers around tree
          const flowerColors = ['#f43f5e', '#eab308', '#a855f7', '#3b82f6'];
          for (let fi = 0; fi < 6; fi++) {
            const fa = fi * Math.PI / 3;
            const fx = centerX + Math.cos(fa) * 28;
            const fy = centerY + Math.sin(fa) * 28;
            ctx.fillStyle = flowerColors[fi % flowerColors.length];
            ctx.beginPath();
            ctx.arc(fx, fy, 3, 0, Math.PI * 2);
            ctx.fill();
          }
        } else {
          // Fountain roundabout (type 4)
          ctx.fillStyle = '#94a3b8';
          ctx.beginPath();
          ctx.arc(centerX, centerY, innerR, 0, Math.PI * 2);
          ctx.fill();
          
          // Fountain pool
          const fGrad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, innerR - 4);
          fGrad.addColorStop(0, '#38bdf8');
          fGrad.addColorStop(0.5, '#0284c7');
          fGrad.addColorStop(1, '#075985');
          ctx.fillStyle = fGrad;
          ctx.beginPath();
          ctx.arc(centerX, centerY, innerR - 4, 0, Math.PI * 2);
          ctx.fill();
          
          // Water spray animation
          const sprayTime = Date.now() * 0.003;
          ctx.fillStyle = 'rgba(255,255,255,0.4)';
          for (let si = 0; si < 4; si++) {
            const sa = sprayTime + si * Math.PI / 2;
            const sr = 8 + Math.sin(sprayTime * 2 + si) * 5;
            ctx.beginPath();
            ctx.arc(centerX + Math.cos(sa) * sr, centerY + Math.sin(sa) * sr, 2.5, 0, Math.PI * 2);
            ctx.fill();
          }
          
          // Center jet
          ctx.fillStyle = 'rgba(255,255,255,0.5)';
          ctx.beginPath();
          ctx.arc(centerX, centerY, 3 + Math.sin(sprayTime * 3) * 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
        
        ctx.restore();
      }
    }
  }

  // 3. Draw visible building gardens, stairs, and 3D extruded bodies
  for (let cy = startChunkY; cy <= endChunkY; cy++) {
    for (let cx = startChunkX; cx <= endChunkX; cx++) {
      const key = `${cx},${cy}`;
      const chunk = gameState.chunks[key];
      if (!chunk) continue;

      chunk.buildings.forEach(b => {
        // Garden lawn
        ctx.fillStyle = '#166534';
        ctx.fillRect(b.garden.x, b.garden.y, b.garden.w, b.garden.h);
        
        // Hedges outline
        ctx.fillStyle = '#15803d';
        for (let gx = b.garden.x; gx < b.garden.x + b.garden.w; gx += 16) {
          ctx.beginPath(); ctx.arc(gx, b.garden.y, 5, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(gx, b.garden.y + b.garden.h, 5, 0, Math.PI*2); ctx.fill();
        }
        for (let gy = b.garden.y; gy < b.garden.y + b.garden.h; gy += 16) {
          ctx.beginPath(); ctx.arc(b.garden.x, gy, 5, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(b.garden.x + b.garden.w, gy, 5, 0, Math.PI*2); ctx.fill();
        }

        // Stairs
        ctx.fillStyle = '#9ca3af';
        ctx.strokeStyle = '#4b5563';
        ctx.lineWidth = 1;
        const stairCount = 3;
        const sx = b.door.x - b.door.w/2 - 4;
        const sy = b.door.y + (b.stairsDir === 'down' ? b.door.h : -4);
        for (let i = 0; i < stairCount; i++) {
          const stepOffset = i * 3;
          const stepW = b.door.w + 8 - i * 4;
          const stepH = 3;
          ctx.fillRect(sx + i*2, sy + (b.stairsDir === 'down' ? stepOffset : -stepOffset), stepW, stepH);
          ctx.strokeRect(sx + i*2, sy + (b.stairsDir === 'down' ? stepOffset : -stepOffset), stepW, stepH);
        }

        // Door
        ctx.fillStyle = '#78350f';
        ctx.fillRect(b.door.x - b.door.w/2, b.door.y, b.door.w, b.door.h);
        ctx.strokeStyle = '#451a03';
        ctx.strokeRect(b.door.x - b.door.w/2, b.door.y, b.door.w, b.door.h);
        ctx.beginPath();
        ctx.moveTo(b.door.x, b.door.y);
        ctx.lineTo(b.door.x, b.door.y + b.door.h);
        ctx.stroke();

        // 3D Wall Extrusion
        const offset = b.floors * 4.5;
        
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 12;
        ctx.shadowOffsetX = 6;
        ctx.shadowOffsetY = 10;

        // Dark side walls
        ctx.fillStyle = shadeColor(b.color, -20);
        ctx.beginPath();
        ctx.moveTo(b.x, b.y);
        ctx.lineTo(b.x - offset, b.y - offset);
        ctx.lineTo(b.x - offset, b.y + b.h - offset);
        ctx.lineTo(b.x, b.y + b.h);
        ctx.closePath(); ctx.fill();

        ctx.beginPath();
        ctx.moveTo(b.x, b.y + b.h);
        ctx.lineTo(b.x - offset, b.y + b.h - offset);
        ctx.lineTo(b.x + b.w - offset, b.y + b.h - offset);
        ctx.lineTo(b.x + b.w, b.y + b.h);
        ctx.closePath(); ctx.fill();

        // Draw windows on side walls
        const floorHeight = offset / b.floors;
        ctx.fillStyle = 'rgba(15, 23, 42, 0.75)';
        for (let f = 0; f < b.floors; f++) {
          const factor = (f + 0.5) * floorHeight;
          const fx = b.x - factor;
          const fy1 = b.y - factor;
          
          const wCountY = Math.floor(b.h / 18);
          for (let wIdx = 0; wIdx < wCountY; wIdx++) {
            const wy = fy1 + 8 + wIdx * 18;
            ctx.fillStyle = 'rgba(15, 23, 42, 0.8)';
            ctx.fillRect(fx - 4, wy - 3, 8, 6);
            if (seededRandom(b.x + f, wy) > 0.45) {
              ctx.fillStyle = '#fef08a';
              ctx.fillRect(fx - 3, wy - 2, 6, 4);
            }
          }
        }
        for (let f = 0; f < b.floors; f++) {
          const factor = (f + 0.5) * floorHeight;
          const fy = b.y + b.h - factor;
          const fx1 = b.x - factor;
          
          const wCountX = Math.floor(b.w / 18);
          for (let wIdx = 0; wIdx < wCountX; wIdx++) {
            const wx = fx1 + 8 + wIdx * 18;
            ctx.fillStyle = 'rgba(15, 23, 42, 0.8)';
            ctx.fillRect(wx - 4, fy - 3, 8, 6);
            if (seededRandom(b.y + f, wx) > 0.45) {
              ctx.fillStyle = '#fef08a';
              ctx.fillRect(wx - 3, fy - 2, 6, 4);
            }
          }
        }
        ctx.restore();

        // Roof Slab
        ctx.fillStyle = shadeColor(b.color, 15);
        ctx.fillRect(b.x - offset, b.y - offset, b.w, b.h);
        ctx.strokeStyle = shadeColor(b.color, 35);
        ctx.lineWidth = 1.5;
        ctx.strokeRect(b.x - offset, b.y - offset, b.w, b.h);

        // Draw concrete roof tile grids (GTA 2 style)
        ctx.save();
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.lineWidth = 1;
        const rx = b.x - offset;
        const ry = b.y - offset;
        for (let gx = rx + 12; gx < rx + b.w - 12; gx += 16) {
          ctx.beginPath();
          ctx.moveTo(gx, ry);
          ctx.lineTo(gx, ry + b.h);
          ctx.stroke();
        }
        for (let gy = ry + 12; gy < ry + b.h - 12; gy += 16) {
          ctx.beginPath();
          ctx.moveTo(rx, gy);
          ctx.lineTo(rx + b.w, gy);
          ctx.stroke();
        }
        ctx.restore();

        // Helipad decoration
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(rx + b.w/2, ry + b.h/2, 20, 0, Math.PI*2);
        ctx.stroke();
        
        ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('H', rx + b.w/2, ry + b.h/2);

        // Skylight panels
        ctx.fillStyle = 'rgba(15, 23, 42, 0.3)';
        ctx.fillRect(rx + 20, ry + 20, 30, 20);
        ctx.fillRect(rx + b.w - 50, ry + 20, 30, 20);
      });
    }
  }
}
let windowsInit = false;

function drawCar(car, isPolice) {
  if (car.state==='destroyed') return;
  ctx.save();
  ctx.translate(car.x, car.y);
  ctx.rotate(car.angle);
  const s = car.size;
  const t = car.type;
  ctx.scale(s,s);
  ctx.translate(-t.w/2, -t.h/2);
  if (car.state==='burning') {
    ctx.globalAlpha = 0.7+Math.sin(Date.now()*0.01)*0.3;
  }
  drawCarShape(ctx, t, car.color, []);
  ctx.restore();
  // Burn effect
  if (car.state==='burning') {
    ctx.save();
    // Smoke cloud
    const smokeAlpha = 0.3 + Math.sin(Date.now()*0.003)*0.1;
    ctx.globalAlpha = smokeAlpha;
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(car.x, car.y - 15*s, 18*s, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(car.x - 8*s, car.y - 22*s, 12*s, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(car.x + 10*s, car.y - 18*s, 10*s, 0, Math.PI*2);
    ctx.fill();
    
    // Fire glow
    ctx.globalAlpha = 0.7 + Math.sin(Date.now()*0.01)*0.2;
    const grad = ctx.createRadialGradient(car.x,car.y,2,car.x,car.y,30*s);
    grad.addColorStop(0,'rgba(255,200,50,0.9)');
    grad.addColorStop(0.3,'rgba(255,100,0,0.7)');
    grad.addColorStop(0.7,'rgba(255,30,0,0.3)');
    grad.addColorStop(1,'rgba(100,0,0,0)');
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.arc(car.x,car.y,30*s,0,Math.PI*2); ctx.fill();
    
    // Flame tongues
    ctx.globalAlpha = 0.8;
    const flameTime = Date.now() * 0.008;
    for (let fi = 0; fi < 5; fi++) {
      const fAngle = (fi / 5) * Math.PI * 2 + flameTime;
      const fLen = 12 + Math.sin(flameTime + fi*2) * 6;
      const fx = car.x + Math.cos(fAngle) * 8 * s;
      const fy = car.y + Math.sin(fAngle) * 5 * s - 5*s;
      const fGrad = ctx.createRadialGradient(fx, fy, 0, fx, fy, fLen*s);
      fGrad.addColorStop(0, 'rgba(255,220,50,0.9)');
      fGrad.addColorStop(0.5, 'rgba(255,80,0,0.6)');
      fGrad.addColorStop(1, 'rgba(200,0,0,0)');
      ctx.fillStyle = fGrad;
      ctx.beginPath();
      ctx.arc(fx, fy - fLen*s*0.3, fLen*s*0.5, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
  // HP bar
  if (car.hp<100 && car.state!=='destroyed') {
    ctx.save();
    ctx.fillStyle='#333';
    ctx.fillRect(car.x-20, car.y-t.h*s/2-12, 40, 5);
    ctx.fillStyle = car.hp>50?'#22cc66':car.hp>25?'#ffaa00':'#ff4455';
    ctx.fillRect(car.x-20, car.y-t.h*s/2-12, car.hp*0.4, 5);
    ctx.restore();
  }
}

function drawPolice(pol) {
  if (pol.state==='destroyed') return;
  ctx.save();
  ctx.translate(pol.x, pol.y);
  ctx.rotate(pol.angle);
  const s = pol.size, t = pol.type;
  ctx.scale(s,s);
  ctx.translate(-t.w/2,-t.h/2);
  drawCarShape(ctx, t, pol.color, []);
  
  // High-quality modern lightbar on the roof
  const barY = t.roofY + t.roofH/2 - 2;
  // Black base bar mount
  ctx.fillStyle = '#111827';
  ctx.fillRect(t.roofX - 2, barY, t.roofW + 4, 4);
  
  // Flashing strobe lights
  const si = Math.floor(Date.now()/120)%2;
  // Left light (Red/Blue strobe)
  ctx.fillStyle = si ? '#ef4444' : '#3b82f6';
  ctx.fillRect(t.roofX + 2, barY - 1, t.roofW/2 - 3, 3);
  // Right light (Blue/Red strobe)
  ctx.fillStyle = si ? '#3b82f6' : '#ef4444';
  ctx.fillRect(t.roofX + t.roofW/2 + 1, barY - 1, t.roofW/2 - 3, 3);
  
  // Middle siren speaker horn
  ctx.fillStyle = '#9ca3af';
  ctx.fillRect(t.roofX + t.roofW/2 - 2, barY - 2, 4, 3);
  
  ctx.restore();
}

function drawPlayer(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle);
  const s = p.size, t = p.type;
  ctx.scale(s,s);
  ctx.translate(-t.w/2,-t.h/2);
  drawCarShape(ctx, t, p.color, p.weapons);
  ctx.restore();

  // Draw player shield bubble
  if (p.shieldTime > 0) {
    ctx.save();
    ctx.translate(p.x, p.y);
    const pulse = Math.sin(Date.now() * 0.015) * 3;
    const r = (p.type.h * p.size * 0.6) + pulse;
    
    ctx.shadowColor = '#00bbff';
    ctx.shadowBlur = 15;
    ctx.strokeStyle = `rgba(56, 189, 248, ${0.4 + Math.sin(Date.now() * 0.01) * 0.15})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI*2);
    ctx.stroke();

    ctx.fillStyle = 'rgba(56, 189, 248, 0.1)';
    ctx.fill();
    ctx.restore();
  }

  // Direction indicator
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.15)';
  ctx.lineWidth=1;
  ctx.setLineDash([4,4]);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.lineTo(p.x+Math.sin(p.angle)*60, p.y-Math.cos(p.angle)*60);
  ctx.stroke();
  ctx.restore();
}

function drawBullets() {
  gameState.bullets.forEach(b => {
    ctx.save();
    if (b.weapon==='cannon') {
      const grad = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.size);
      grad.addColorStop(0,'#ffff00'); grad.addColorStop(1,'#ff4400');
      ctx.fillStyle=grad;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.size,0,Math.PI*2); ctx.fill();
    } else if (b.weapon==='flame') {
      const grad = ctx.createRadialGradient(b.x, b.y, 1, b.x, b.y, b.size);
      grad.addColorStop(0, '#fef08a');
      grad.addColorStop(0.3, '#f97316');
      grad.addColorStop(1, 'rgba(239, 68, 68, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle = b.color;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.size/2,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });
}

function drawParticles() {
  gameState.particles.forEach(pt => {
    ctx.save();
    ctx.globalAlpha = pt.alpha;
    ctx.fillStyle = pt.color;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.size*pt.alpha,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawPedestrians() {
  if (!gameState || !gameState.pedestrians) return;
  gameState.pedestrians.forEach(ped => {
    if (ped.state === 'splatted') {
      ctx.save();
      ctx.fillStyle = 'rgba(180, 20, 20, 0.7)';
      ctx.beginPath();
      ctx.arc(ped.x, ped.y, 16, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(150, 10, 10, 0.6)';
      ctx.beginPath();
      ctx.arc(ped.x - 6, ped.y + 5, 6, 0, Math.PI * 2);
      ctx.arc(ped.x + 8, ped.y - 4, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      return;
    }
    
    ctx.save();
    ctx.translate(ped.x, ped.y);
    ctx.rotate(ped.angle);
    
    const swing = Math.sin(ped.legSwing) * 5;
    const armSwing = Math.sin(ped.legSwing) * 4;
    
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.roundRect(-5, 4 + swing, 4.5, 8, 1.5);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(0.5, 4 - swing, 4.5, 8, 1.5);
    ctx.fill();
    
    ctx.fillStyle = '#2d1b00';
    ctx.beginPath();
    ctx.roundRect(-5.5, 10 + swing, 5.5, 4, 2);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(0, 10 - swing, 5.5, 4, 2);
    ctx.fill();
    
    ctx.fillStyle = ped.color;
    ctx.beginPath();
    ctx.roundRect(-7, -8, 14, 14, 3);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    
    ctx.fillStyle = ped.isHostile ? 'rgba(180,30,30,0.3)' : 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.roundRect(-6, -7, 12, 6, 2);
    ctx.fill();
    
    ctx.fillStyle = ped.skinColor || '#ffdbac';
    ctx.beginPath();
    ctx.roundRect(-8, -3 + armSwing, 3.5, 9, 1.5);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(4.5, -3 - armSwing, 3.5, 9, 1.5);
    ctx.fill();
    
    if (ped.isHostile) {
      ctx.fillStyle = '#1a1a2e';
      ctx.save();
      ctx.translate(6, -5 - armSwing);
      ctx.fillRect(0, 0, 2.5, 7);
      ctx.fillRect(0, -1, 7, 2.5);
      ctx.fillStyle = '#555';
      ctx.fillRect(6.5, -1.5, 2, 3);
      ctx.restore();
    }
    
    ctx.fillStyle = ped.skinColor || '#ffdbac';
    ctx.beginPath();
    ctx.arc(0, -12, 6.5, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#451a03';
    ctx.beginPath();
    ctx.arc(0, -14, 5.5, Math.PI, 0);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, -12, 6.5, 2.5, 0, Math.PI * 0.85, Math.PI * 0.15, true);
    ctx.fill();
    
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.arc(-2.5, -12.5, 1.2, 0, Math.PI * 2);
    ctx.arc(2.5, -12.5, 1.2, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-2.2, -13, 0.5, 0, Math.PI * 2);
    ctx.arc(2.8, -13, 0.5, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.strokeStyle = ped.isHostile ? '#8b0000' : '#c4704a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, -10, 2.5, 0.1, Math.PI - 0.1);
    ctx.stroke();
    
    if (ped.isHostile) {
      ctx.fillStyle = 'rgba(255,0,0,0.6)';
      ctx.beginPath();
      ctx.arc(0, -20, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 5px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('!', 0, -20);
    }
    
    ctx.restore();
  });
}

function drawLightningArcs() {
  if (!gameState || !gameState.lightningArcs) return;
  ctx.save();
  gameState.lightningArcs.forEach(arc => {
    ctx.strokeStyle = '#c084fc';
    ctx.shadowColor = '#a855f7';
    ctx.shadowBlur = 10;
    ctx.lineWidth = 2.5;
    
    ctx.beginPath();
    ctx.moveTo(arc.fromX, arc.fromY);
    
    const segments = 5;
    const dx = arc.toX - arc.fromX;
    const dy = arc.toY - arc.fromY;
    const dist = Math.hypot(dx, dy);
    if (dist > 5) {
      for (let i = 1; i < segments; i++) {
        const t = i / segments;
        const baseX = arc.fromX + dx * t;
        const baseY = arc.fromY + dy * t;
        const perpX = -dy / dist;
        const perpY = dx / dist;
        const offset = (Math.random() - 0.5) * 16;
        ctx.lineTo(baseX + perpX * offset, baseY + perpY * offset);
      }
    }
    ctx.lineTo(arc.toX, arc.toY);
    ctx.stroke();
    
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.shadowBlur = 0;
    ctx.stroke();
  });
  ctx.restore();
}

// ==================== HUD ====================
const WEAPON_NAMES = {pistol:'🔫 مسدس', machine:'💥 رشاش', cannon:'💣 مدفع', electro:'⚡ سلاح كهرباء', flame:'🔥 قاذف اللهب'};
const STAR_ON='★', STAR_OFF='☆';
function updateHUD() {
  if (!gameState) return;
  const p = gameState.player;
  document.getElementById('hud-score').textContent = p.score;
  document.getElementById('hud-speed').textContent = Math.round(Math.abs(p.speed));
  
  const hpEl = document.getElementById('hud-hp');
  if (hpEl) {
    hpEl.textContent = Math.round(p.hp) + '%';
    hpEl.style.color = p.hp > 50 ? '#22c55e' : p.hp > 25 ? '#eab308' : '#ef4444';
  }
  
  const wanted = '★'.repeat(p.wantedLevel) + '☆'.repeat(5-p.wantedLevel);
  document.getElementById('hud-wanted').textContent = wanted;
  
  const w = p.weapons[p.activeWeapon]||p.weapons[0]||'--';
  let weaponText = WEAPON_NAMES[w]||w;
  if (p.ammo && p.ammo[w] !== undefined && p.ammo[w] !== Infinity) {
    weaponText += ` (${p.ammo[w]} طلقة)`;
  }
  if (p.shieldTime > 0) {
    weaponText += ` | 🛡️ درع (${Math.ceil(p.shieldTime)}ث)`;
  }
  if (p.nitroTime > 0) {
    weaponText += ` | ⚡ نيترو (${Math.ceil(p.nitroTime)}ث)`;
  }
  document.getElementById('hud-weapon').textContent = weaponText;
  
  // Combo display
  const comboEl = document.getElementById('hud-combo');
  if (comboEl) {
    if (gameState.combo > 1 && gameState.comboTimer > 0) {
      comboEl.style.display = 'block';
      document.getElementById('combo-count').textContent = gameState.combo;
      comboEl.style.transform = `scale(${1 + Math.min(gameState.combo * 0.05, 0.5)})`;
    } else {
      comboEl.style.display = 'none';
    }
  }
}

// ==================== EXPOSE TEST HOOKS ====================
window.render_game_to_text = () => {
  if (!gameState) return JSON.stringify({phase:'garage'});
  const p = gameState.player;
  return JSON.stringify({
    phase: gameState.phase,
    player: {x:Math.round(p.x),y:Math.round(p.y),speed:Math.round(p.speed),angle:p.angle.toFixed(2),alive:p.alive},
    score: p.score, wanted: p.wantedLevel,
    bullets: gameState.bullets.length,
    traffic: gameState.traffic.filter(c=>c.state!=='destroyed').length,
    police: gameState.police.filter(c=>c.state!=='destroyed').length,
  });
};
window.advanceTime = (ms) => {
  const steps = Math.max(1, Math.round(ms/(1000/60)));
  for(let i=0;i<steps;i++) update(1/60);
  render();
};

// ==================== INIT ====================
showTitle();
