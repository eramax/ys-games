<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YS Games — بدون إنترنت</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #090d16; color: #f3f4f6; padding: 24px; text-align: center;
    }
    .card {
      max-width: 400px; background: rgba(17,24,39,0.9); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 32px 24px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 12px; color: #60a5fa; }
    p { color: #9ca3af; line-height: 1.7; margin-bottom: 20px; font-size: 0.95rem; }
    button {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff;
      font-weight: 700; font-size: 1rem; cursor: pointer;
    }
    button:disabled { opacity: 0.5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📡 مطلوب اتصال بالإنترنت</h1>
    <p>هذه أول مرة تشغّل فيها التطبيق. يجب تحميل ملفات الألعاب مرة واحدة عبر الإنترنت، ثم يمكنك اللعب بدون اتصال.</p>
    <button id="retry-btn" onclick="retry()">إعادة المحاولة</button>
  </div>
  <script>
    function retry() {
      if (window.AndroidBridge && AndroidBridge.retryLoad) {
        AndroidBridge.retryLoad();
      } else {
        location.reload();
      }
    }
  </script>
</body>
</html>
