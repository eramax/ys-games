<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>YS Games — تحميل</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, #1e293b 0%, #090d16 55%);
      color: #f3f4f6; font-family: system-ui, 'Segoe UI', sans-serif;
      padding: 24px; text-align: center;
    }
    .update-card {
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
    }
    .logo {
      font-size: 2.5rem; margin-bottom: 8px;
      animation: float 2.5s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    h1 {
      font-size: 1.35rem; margin-bottom: 6px;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle { color: #9ca3af; font-size: 0.92rem; line-height: 1.6; margin-bottom: 20px; }
    #update-msg { color: #9ca3af; font-size: 0.88rem; min-height: 1.4em; margin-bottom: 4px; }
    .update-bar {
      height: 10px; background: #1f2937; border-radius: 10px;
      overflow: hidden; margin: 14px 0 8px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .update-bar div {
      height: 100%; width: 0;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      transition: width 0.25s ease;
      border-radius: 10px;
    }
    .pct { font-size: 0.8rem; color: #60a5fa; font-weight: 700; }
    .hint { margin-top: 18px; font-size: 0.78rem; color: #6b7280; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="update-card">
    <div class="logo">🎮</div>
    <h1>تحميل الألعاب</h1>
    <p class="subtitle">مرة واحدة فقط — ثم العب بدون إنترنت</p>
    <p id="update-msg">جاري التحميل...</p>
    <div class="update-bar"><div id="update-bar-fill"></div></div>
    <div class="pct" id="pct-label">0%</div>
    <p class="hint">لا تغلق التطبيق حتى يكتمل التحميل</p>
  </div>
  <script>
    function onGamesUpdateProgress(p, m) {
      var bar = document.getElementById('update-bar-fill');
      var pct = Math.max(0, Math.min(100, p | 0));
      if (bar) bar.style.width = pct + '%';
      var lbl = document.getElementById('pct-label');
      if (lbl) lbl.textContent = pct + '%';
      if (m) document.getElementById('update-msg').textContent = m;
    }
    function onGamesUpdateComplete(ok, m) {
      if (m) document.getElementById('update-msg').textContent = m;
      if (ok) onGamesUpdateProgress(100, 'اكتمل التحميل — جاري الفتح...');
    }
  </script>
</body>
</html>
