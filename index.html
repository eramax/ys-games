<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة ألعاب YS Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #090d16;
      --panel-dark: rgba(17, 24, 39, 0.75);
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.5);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --border-color: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Tajawal', 'Outfit', sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      overflow-x: hidden;
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 40%);
    }

    /* Portal Container */
    .portal-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 1rem;
      transition: opacity 0.3s ease;
    }

    header {
      text-align: center;
      margin-bottom: 3.5rem;
      animation: fadeInDown 0.8s ease;
    }

    .logo {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 4px 20px rgba(139, 92, 246, 0.25);
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .tagline {
      color: var(--text-muted);
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }

    /* Download APK Button */
    .download-apk-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: rgba(59, 130, 246, 0.12);
      border: 1px solid rgba(59, 130, 246, 0.35);
      color: #60a5fa;
      padding: 0.7rem 1.4rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.1);
    }

    .download-apk-btn:hover {
      background: #2563eb;
      color: #ffffff;
      border-color: #3b82f6;
      box-shadow: 0 0 25px rgba(37, 99, 235, 0.5);
      transform: translateY(-3px);
    }

    .download-apk-btn:active {
      transform: translateY(-1px);
    }

    /* Games Grid */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2.5rem;
      animation: fadeInUp 0.8s ease;
    }

    .game-card {
      background: var(--panel-dark);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .game-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      opacity: 0.8;
      z-index: 2;
    }

    .game-card:hover {
      transform: translateY(-8px);
      border-color: rgba(59, 130, 246, 0.4);
      box-shadow: 0 15px 35px rgba(59, 130, 246, 0.18);
    }

    /* Game Cover Image */
    .game-cover {
      width: 100%;
      height: 180px;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .game-card:hover .game-cover {
      transform: scale(1.05);
    }

    .game-card-content {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex-grow: 1;
      margin-top: 1rem;
    }

    .game-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.8rem;
    }

    .game-icon {
      font-size: 2.2rem;
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .game-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: #ffffff;
    }

    .game-desc {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 1.8rem;
    }

    .play-btn {
      width: 100%;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #ffffff;
      border: none;
      padding: 0.9rem;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
      transition: all 0.2s ease;
    }

    .play-btn:hover {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.45);
      transform: scale(1.02);
    }

    .play-btn:active {
      transform: scale(0.98);
    }

    /* Full-screen Game Frame Container */
    #game-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #000000;
      z-index: 9999;
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #game-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Floating Return Button */
    .home-floating-btn {
      position: fixed;
      top: 15px;
      right: 15px;
      width: 48px;
      height: 48px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      cursor: pointer;
      z-index: 10000;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: all 0.2s ease;
    }

    .home-floating-btn:hover {
      background: #1e293b;
      transform: scale(1.1);
      border-color: var(--accent);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    /* Animations */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Loading State */
    .loading-spinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 0;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Floating Button inside Game Mode -->
  <div class="home-floating-btn" id="btn-back-to-menu" title="الرجوع للرئيسية" onclick="closeGame()">🏠</div>

  <div class="portal-container" id="portal">
    <header>
      <div class="logo">YS GAMES</div>
      <div class="tagline">جميع ألعابك المفضلة في مكان واحد بدون تعقيد</div>
      <a href="ys-games-app.apk" class="download-apk-btn" download>
        <span>تحميل تطبيق الأندرويد</span>
        <span>🤖</span>
      </a>
    </header>

    <div id="games-list">
      <div class="loading-spinner">
        <div class="spinner"></div>
        <p style="color:var(--text-muted)">جاري تحميل قائمة الألعاب...</p>
      </div>
    </div>
  </div>

  <!-- Game container frame -->
  <div id="game-container">
    <iframe id="game-frame" allow="autoplay; fullscreen; keyboard-map"></iframe>
  </div>

  <script>
    async function fetchGames() {
      const listDiv = document.getElementById('games-list');
      try {
        const response = await fetch('games.json');
        if (!response.ok) throw new Error('فشل جلب قائمة الألعاب');
        const games = await response.json();
        renderGames(games);
      } catch (err) {
        console.error(err);
        listDiv.innerHTML = `
          <div style="text-align:center; padding: 3rem 1rem; color:#ef4444;">
            <p style="font-size:1.2rem; font-weight:bold; margin-bottom:1rem;">⚠️ عذراً، تعذر تحميل الألعاب حالياً</p>
            <p style="color:var(--text-muted); font-size:0.95rem;">تأكد من اتصالك بالإنترنت ثم أعد المحاولة.</p>
            <button onclick="fetchGames()" class="play-btn" style="max-width:200px; margin: 1.5rem auto 0;">إعادة المحاولة</button>
          </div>
        `;
      }
    }

    function renderGames(games) {
      const listDiv = document.getElementById('games-list');
      if (!games || games.length === 0) {
        listDiv.innerHTML = '<p style="text-align:center; color:var(--text-muted)">لا توجد ألعاب متوفرة حالياً.</p>';
        return;
      }

      let html = '<div class="games-grid">';
      games.forEach(game => {
        html += `
          <div class="game-card">
            ${game.image ? `<div style="overflow:hidden; border-radius: 19px 19px 0 0; margin: -1.5rem -1.5rem 0 -1.5rem;"><img class="game-cover" src="${game.image}" alt="${game.title}"></div>` : ''}
            <div class="game-card-content">
              <div>
                <div class="game-header" style="${game.image ? 'margin-bottom:0.5rem;' : ''}">
                  ${!game.image ? `<div class="game-icon">${game.icon || '🎮'}</div>` : ''}
                  <div class="game-title" style="${game.image ? 'font-size:1.2rem;' : ''}">${game.title}</div>
                </div>
                <p class="game-desc">${game.description || ''}</p>
              </div>
              <button class="play-btn" onclick="playGame('${game.url}')">
                <span>شغل اللعبة</span>
                <span>🎮</span>
              </button>
            </div>
          </div>
        `;
      });
      html += '</div>';
      listDiv.innerHTML = html;
    }

    function playGame(url) {
      const portal = document.getElementById('portal');
      const container = document.getElementById('game-container');
      const frame = document.getElementById('game-frame');
      
      portal.style.opacity = '0';
      setTimeout(() => {
        portal.style.display = 'none';
        container.style.display = 'block';
        frame.src = url;
        setTimeout(() => {
          container.style.opacity = '1';
        }, 50);
      }, 300);
    }

    function closeGame() {
      const portal = document.getElementById('portal');
      const container = document.getElementById('game-container');
      const frame = document.getElementById('game-frame');

      container.style.opacity = '0';
      setTimeout(() => {
        container.style.display = 'none';
        frame.src = '';
        portal.style.display = 'block';
        setTimeout(() => {
          portal.style.opacity = '1';
        }, 50);
      }, 300);
    }

    // Start fetching games
    fetchGames();
  </script>
</body>
</html>
