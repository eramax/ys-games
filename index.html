<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة ألعاب YS Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #090d16;
      --panel-dark: rgba(17, 24, 39, 0.75);
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.5);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --border-color: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Tajawal', 'Outfit', sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      overflow-x: hidden;
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 40%);
    }

    /* Portal Container */
    .portal-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 1rem;
      transition: opacity 0.3s ease;
    }

    header {
      text-align: center;
      margin-bottom: 3.5rem;
      animation: fadeInDown 0.8s ease;
    }

    .logo {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 4px 20px rgba(139, 92, 246, 0.25);
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .tagline {
      color: var(--text-muted);
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }

    /* Download APK Button */
    .download-apk-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: rgba(59, 130, 246, 0.12);
      border: 1px solid rgba(59, 130, 246, 0.35);
      color: #60a5fa;
      padding: 0.7rem 1.4rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.1);
    }

    .download-apk-btn:hover {
      background: #2563eb;
      color: #ffffff;
      border-color: #3b82f6;
      box-shadow: 0 0 25px rgba(37, 99, 235, 0.5);
      transform: translateY(-3px);
    }

    .download-apk-btn:active {
      transform: translateY(-1px);
    }

    .update-btn {
      display: none;
      align-items: center;
      gap: 0.6rem;
      background: rgba(16, 185, 129, 0.12);
      border: 1px solid rgba(16, 185, 129, 0.35);
      color: #34d399;
      padding: 0.7rem 1.4rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      margin-inline-start: 0.5rem;
      transition: all 0.3s ease;
    }

    .update-btn:hover { background: #059669; color: #fff; }
    .header-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem; align-items: center; }

    #update-overlay {
      display: none; position: fixed; inset: 0; z-index: 20000;
      background: rgba(9, 13, 22, 0.92); align-items: center; justify-content: center; padding: 24px;
    }
    #update-overlay.show { display: flex; }
    .update-card {
      background: rgba(17,24,39,0.95); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 28px; max-width: 360px; width: 100%; text-align: center;
    }
    .update-bar { height: 8px; background: #1f2937; border-radius: 8px; overflow: hidden; margin: 16px 0; }
    .update-bar div { height: 100%; width: 0; background: #3b82f6; transition: width 0.2s; }

    /* Games Grid */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2.5rem;
      animation: fadeInUp 0.8s ease;
    }

    .game-card {
      background: var(--panel-dark);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .game-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      opacity: 0.8;
      z-index: 2;
    }

    .game-card:hover {
      transform: translateY(-8px);
      border-color: rgba(59, 130, 246, 0.4);
      box-shadow: 0 15px 35px rgba(59, 130, 246, 0.18);
    }

    /* Game Cover Image */
    .game-cover {
      width: 100%;
      height: 180px;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .game-card:hover .game-cover {
      transform: scale(1.05);
    }

    .game-card-content {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex-grow: 1;
      margin-top: 1rem;
    }

    .game-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.8rem;
    }

    .game-icon {
      font-size: 2.2rem;
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .game-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: #ffffff;
    }

    .game-desc {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 1.8rem;
    }

    .play-btn {
      width: 100%;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #ffffff;
      border: none;
      padding: 0.9rem;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
      transition: all 0.2s ease;
    }

    .play-btn:hover {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.45);
      transform: scale(1.02);
    }

    .play-btn:active {
      transform: scale(0.98);
    }

    /* Full-screen Game Frame Container */
    #game-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #000000;
      z-index: 9999;
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #game-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Floating Return Button */
    .home-floating-btn {
      position: fixed;
      top: 15px;
      right: 15px;
      width: 48px;
      height: 48px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      cursor: pointer;
      z-index: 10000;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: all 0.2s ease;
    }

    .home-floating-btn:hover {
      background: #1e293b;
      transform: scale(1.1);
      border-color: var(--accent);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    /* Animations */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Loading State */
    .loading-spinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 0;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="update-overlay">
    <div class="update-card">
      <div style="font-size:2.2rem;margin-bottom:6px;">🎮</div>
      <h2 style="margin-bottom:8px;color:#60a5fa;">تحديث الألعاب</h2>
      <p id="update-msg" style="color:#9ca3af;font-size:0.9rem;">جاري التحميل...</p>
      <div class="update-bar"><div id="update-bar-fill"></div></div>
      <p id="update-pct" style="color:#60a5fa;font-size:0.85rem;font-weight:700;margin-top:6px;">0%</p>
    </div>
  </div>

  <!-- Floating Button inside Game Mode -->
  <div class="home-floating-btn" id="btn-back-to-menu" title="الرجوع للرئيسية" onclick="closeGame()">🏠</div>

  <div class="portal-container" id="portal">
    <header>
      <div class="logo">YS GAMES</div>
      <div class="tagline">جميع ألعابك المفضلة في مكان واحد بدون تعقيد</div>
      <div class="header-actions">
        <a href="ys-games-app.apk" id="apk-download-btn" class="download-apk-btn" download>
          <span>تحميل تطبيق الأندرويد</span>
          <span>🤖</span>
        </a>
        <button type="button" id="update-btn" class="update-btn" title="تحميل أحدث نسخة للعب بدون إنترنت">🔄 تحديث</button>
      </div>
    </header>

    <div id="games-list">
      <div class="loading-spinner">
        <div class="spinner"></div>
        <p style="color:var(--text-muted)">جاري تحميل قائمة الألعاب...</p>
      </div>
    </div>
  </div>

  <!-- Game container frame -->
  <div id="game-container">
    <iframe id="game-frame" allow="autoplay; fullscreen; keyboard-map"></iframe>
  </div>

  <script src="js/ys-platform.js"></script>
  <script>
    const EMBEDDED_GAMES = [
      {"id":"car-game","title":"Retro City Racing","description":"قم بقيادة سيارتك الكلاسيكية في شوارع المدينة العشوائية اللانهائية، وتجنب الشرطة والمشاة والسيارات الأخرى!","url":"games/car-game.html","image":"games/images/car-game.png"},
      {"id":"chess","title":"Chess · Two Players","description":"لعبة شطرنج كاملة بين لاعبين على نفس الجهاز.","url":"games/chess.html","image":"games/images/chess.svg"},
      {"id":"millionaire","title":"من سيربح المليون؟","description":"لعبة أسئلة وأجوبة للأطفال بأسلوب البرنامج الشهير!","url":"games/millionaire.html","image":"games/images/millionaire.png"},
      {"id":"resturant","title":"مطعم السمك على البحر","description":"لعبة مطعم سمك ثلاثية الأبعاد على الشاطئ!","url":"games/resturant.html","image":"games/images/resturant.webp"}
    ];

    async function fetchGames() {
      const listDiv = document.getElementById('games-list');
      try {
        const response = await fetch('games.json');
        if (!response.ok) throw new Error('فشل جلب قائمة الألعاب');
        const games = await response.json();
        renderGames(games);
      } catch (err) {
        console.warn('using embedded games', err);
        if (EMBEDDED_GAMES.length) {
          renderGames(EMBEDDED_GAMES);
        } else {
          listDiv.innerHTML = `
            <div style="text-align:center; padding: 3rem 1rem; color:#ef4444;">
              <p style="font-size:1.2rem; font-weight:bold; margin-bottom:1rem;">⚠️ عذراً، تعذر تحميل الألعاب حالياً</p>
              <p style="color:var(--text-muted); font-size:0.95rem;">تأكد من اتصالك بالإنترنت ثم أعد المحاولة.</p>
              <button onclick="fetchGames()" class="play-btn" style="max-width:200px; margin: 1.5rem auto 0;">إعادة المحاولة</button>
            </div>
          `;
        }
      }
    }

    function renderGames(games) {
      const listDiv = document.getElementById('games-list');
      if (!games || games.length === 0) {
        listDiv.innerHTML = '<p style="text-align:center; color:var(--text-muted)">لا توجد ألعاب متوفرة حالياً.</p>';
        return;
      }

      let html = '<div class="games-grid">';
      games.forEach(game => {
        html += `
          <div class="game-card">
            ${game.image ? `<div style="overflow:hidden; border-radius: 19px 19px 0 0; margin: -1.5rem -1.5rem 0 -1.5rem;"><img class="game-cover" src="${game.image}" alt="${game.title}"></div>` : ''}
            <div class="game-card-content">
              <div>
                <div class="game-header" style="${game.image ? 'margin-bottom:0.5rem;' : ''}">
                  ${!game.image ? `<div class="game-icon">${game.icon || '🎮'}</div>` : ''}
                  <div class="game-title" style="${game.image ? 'font-size:1.2rem;' : ''}">${game.title}</div>
                </div>
                <p class="game-desc">${game.description || ''}</p>
              </div>
              <button class="play-btn" onclick="playGame('${game.url}')">
                <span>شغل اللعبة</span>
                <span>🎮</span>
              </button>
            </div>
          </div>
        `;
      });
      html += '</div>';
      listDiv.innerHTML = html;
    }

    function playGame(url) {
      const portal = document.getElementById('portal');
      const container = document.getElementById('game-container');
      const frame = document.getElementById('game-frame');
      
      portal.style.opacity = '0';
      setTimeout(() => {
        portal.style.display = 'none';
        container.style.display = 'block';
        frame.src = url;
        setTimeout(() => {
          container.style.opacity = '1';
        }, 50);
      }, 300);
    }

    function closeGame() {
      const portal = document.getElementById('portal');
      const container = document.getElementById('game-container');
      const frame = document.getElementById('game-frame');

      container.style.opacity = '0';
      setTimeout(() => {
        container.style.display = 'none';
        frame.src = '';
        portal.style.display = 'block';
        setTimeout(() => {
          portal.style.opacity = '1';
        }, 50);
      }, 300);
    }

    // App mode (Android WebView)
    const urlParams = new URLSearchParams(window.location.search);
    const isApp = urlParams.get('app') === 'true' || !!window.AndroidBridge;
    if (isApp) {
      const btn = document.getElementById('apk-download-btn');
      if (btn) btn.style.display = 'none';
      const upd = document.getElementById('update-btn');
      if (upd) upd.style.display = 'inline-flex';
    }

    function showUpdateOverlay(show) {
      document.getElementById('update-overlay').classList.toggle('show', !!show);
    }

    YSApp.onUpdateProgress((pct, msg) => {
      showUpdateOverlay(true);
      document.getElementById('update-bar-fill').style.width = pct + '%';
      const pctEl = document.getElementById('update-pct');
      if (pctEl) pctEl.textContent = Math.round(pct) + '%';
      if (msg) document.getElementById('update-msg').textContent = msg;
    });

    document.addEventListener('ys-games-updated', e => {
      showUpdateOverlay(false);
      if (e.detail.ok) {
        YSSave.setMeta({ cachedVersion: e.detail.version || Date.now() });
        fetchGames();
        alert('✅ ' + (e.detail.message || 'تم التحديث'));
      } else if (e.detail.message) {
        alert('❌ ' + e.detail.message);
      }
    });

    document.getElementById('update-btn').onclick = () => {
      if (!YSApp.isOnline()) {
        alert('❌ لا يوجد اتصال بالإنترنت');
        return;
      }
      if (YSApp.triggerUpdate()) {
        showUpdateOverlay(true);
        document.getElementById('update-msg').textContent = 'جاري تحميل الألعاب...';
      } else {
        alert('التحديث متاح من تطبيق الأندرويد فقط');
      }
    };

    if (isApp && YSApp.isOnline()) {
      YSApp.checkForUpdate('version.json').then(info => {
        if (info.updateAvailable) {
          const upd = document.getElementById('update-btn');
          if (upd) upd.textContent = '🔄 تحديث متاح';
        }
      });
    }

    fetchGames();
  </script>
</body>
</html>
